<title>My Trip — 2008</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f3ef;
    --sidebar-bg:#16181f;
    --sidebar-w: 300px;
    --text:      #2c2c2c;
    --muted:     #888;
    --border:    #e2ddd6;
    --header-h:  60px;
    --p1: #5b8dd9; --p1l: #dce9f8;
    --p2: #3cb97a; --p2l: #d4f1e4;
    --p3: #e8a020; --p3l: #fdecd2;
    --p4: #9b6dcc; --p4l: #ecddf7;
    --p5: #e05a5a; --p5l: #fad8d8;
    --p6: #2ab5a0; --p6l: #cef0ea;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top header ─────────────────────────────── */
  .app-header {
    height: var(--header-h);
    background: #1a1c26;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    flex-shrink: 0;
    z-index: 10;
  }
  .app-header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .03em; }
  .app-header .meta { font-size: .8rem; color: #aaa; }
  .part-tabs {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }
  .part-tab {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: .72rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    opacity: .55;
    transition: opacity .15s;
    color: #fff;
  }
  .part-tab:hover { opacity: .85; }
  .part-tab.active { opacity: 1; }

  /* ── Body ───────────────────────────────────── */
  .app-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    overflow-y: auto;
    flex-shrink: 0;
    padding-bottom: 40px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 2px; }

  .part-group { padding: 0; }
  .part-group-header {
    padding: 14px 18px 8px;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #666;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0;
    background: var(--sidebar-bg);
    z-index: 1;
  }
  .part-group-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .day-node {
    display: flex;
    align-items: flex-start;
    padding: 5px 16px 5px 18px;
    cursor: pointer;
    position: relative;
    transition: background .12s;
  }
  .day-node:hover { background: #1e2030; }
  .day-node.active { background: #22253a; }

  /* vertical connector line */
  .day-node::before {
    content: '';
    position: absolute;
    left: 29px;
    top: 0; bottom: 0;
    width: 2px;
    background: #2a2d3a;
  }
  .day-node:first-of-type::before { top: 50%; }
  .day-node:last-of-type::before  { bottom: 50%; }

  .day-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border: 2px solid transparent;
    transition: transform .12s;
  }
  .day-node.active .day-dot { transform: scale(1.3); border-color: rgba(255,255,255,.3); }

  .day-node-text {
    margin-left: 10px;
    min-width: 0;
  }
  .day-node-text .d-num {
    font-size: .65rem;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .day-node-text .d-date {
    font-size: .78rem;
    color: #ccc;
    white-space: nowrap;
  }
  .day-node-text .d-place {
    font-size: .68rem;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 210px;
  }

  /* ── Main content ───────────────────────────── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px 60px;
    min-width: 0;
  }

  /* Intro pane */
  .intro-pane {
    max-width: 720px;
  }
  .intro-pane h2 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .intro-pane .subtitle {
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 24px;
  }
  .intro-pane p {
    line-height: 1.75;
    color: #444;
    margin-bottom: 14px;
    font-size: .95rem;
  }
  .parts-overview {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
    gap: 14px;
    margin-top: 32px;
  }
  .part-card {
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    border-left: 4px solid;
  }
  .part-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .part-card .pc-title { font-weight: 700; font-size: .92rem; margin-bottom: 4px; }
  .part-card .pc-range { font-size: .75rem; color: #666; }
  .part-card .pc-days  { font-size: .72rem; color: #888; margin-top: 6px; }

  /* Day pane */
  .day-pane { max-width: 760px; }

  .day-hero {
    margin-bottom: 28px;
  }
  .day-hero .part-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 10px;
    color: #fff;
  }
  .day-hero h2 {
    font-size: 1.9rem;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .day-hero .day-meta {
    font-size: .88rem;
    color: var(--muted);
  }
  .day-hero .day-route {
    font-size: 1rem;
    font-weight: 600;
    color: #444;
    margin-top: 4px;
  }

  /* Nav arrows */
  .day-nav {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .day-nav button {
    padding: 5px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: .8rem;
    cursor: pointer;
    color: var(--text);
    transition: background .1s;
  }
  .day-nav button:hover { background: var(--border); }
  .day-nav button:disabled { opacity: .3; cursor: default; }

  /* Section heading */
  .section-heading {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #aaa;
    margin: 28px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Timeline entries */
  .tl-list { display: flex; flex-direction: column; gap: 6px; }
  .tl-entry {
    border-radius: 8px;
    background: #fff;
    border-left: 3px solid transparent;
    font-size: .84rem;
    overflow: hidden;
  }
  .tl-entry-header {
    display: grid;
    grid-template-columns: 70px 90px 1fr;
    gap: 0 12px;
    align-items: baseline;
    padding: 8px 12px;
  }
  .tl-entry.receipt  { border-color: #e8a020; }
  .tl-entry.call_out { border-color: #5b8dd9; }
  .tl-entry.call_in  { border-color: #3cb97a; }
  .tl-entry.brochure { border-color: #9b6dcc; }
  .tl-entry.map      { border-color: #2ab5a0; }
  .tl-entry.journal  { border-color: #e05a5a; }
  .tl-entry.email    { border-color: #9b6dcc; }
  .tl-time  { color: var(--muted); font-size: .77rem; font-variant-numeric: tabular-nums; }
  .tl-place { color: #666; font-size: .77rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-desc  { color: var(--text); line-height: 1.4; }
  .tl-type-badge {
    display: inline-block;
    font-size: .63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .tl-type-badge.receipt  { background:#fdecd2; color:#b5700a; }
  .tl-type-badge.call_out { background:#dce9f8; color:#2a5fa8; }
  .tl-type-badge.call_in  { background:#d4f1e4; color:#1a7a44; }
  .tl-type-badge.brochure { background:#ecddf7; color:#6a3aa0; }
  .tl-type-badge.map      { background:#cef0ea; color:#176b5f; }
  .tl-type-badge.journal  { background:#fad8d8; color:#a02020; }
  .tl-type-badge.email    { background:#ecddf7; color:#6a3aa0; }
  .tl-type-badge.other    { background:#eee; color:#555; }

  /* Expandable rows */
  .tl-entry.expandable > .tl-entry-header { cursor: pointer; }
  .tl-entry.expandable > .tl-entry-header:hover { background: #f7f5f2; }

  /* Expanded content panels */
  .tl-expanded {
    display: none;
    border-top: 1px solid #f0ece6;
    padding: 12px 16px 14px;
    background: #fdfcfb;
  }
  .tl-expanded.visible { display: block; }

  /* Journal and email body — same treatment as story text */
  .tl-journal-body p,
  .tl-email-body p {
    line-height: 1.8;
    color: #3a3a3a;
    margin-bottom: 16px;
    font-size: .95rem;
  }
  .tl-journal-body p:last-child,
  .tl-email-body p:last-child { margin-bottom: 0; }

  /* Email to/subject header */
  .tl-email-meta {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 2px 10px;
    font-size: .78rem;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
  }
  .tl-email-label { color: #aaa; font-weight: 600; text-align: right; }
  .tl-email-value { color: #666; }

  /* Story */
  .story-text p {
    line-height: 1.8;
    color: #3a3a3a;
    margin-bottom: 16px;
    font-size: .95rem;
  }

  /* No story placeholder */
  .no-story {
    color: #bbb;
    font-style: italic;
    font-size: .88rem;
    padding: 10px 0;
  }

  /* Scrollbar */
  .main::-webkit-scrollbar { width: 5px; }
  .main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>

to the story and then you can project how the rest of it might go :)"], "parts": [{"id": 1, "title": "The First Two Weeks", "time_range": "August 29 - September 11, 2008", "place_range": "Maynard, MA to Winnipeg, MB", "days": [{"day": 1, "day_of_week": "Friday", "date": "Friday, August 29", "place_range": "Maynard, MA to Brooklyn, NY", "part": 1, "timeline": [{"type": "receipt", "time": "5:45PM", "place": "stow, ma 01775", "description": "2 bags of ice, bottle of water and atm withdrawal for $64.39 at shaw's (115 great road)"}, {"type": "call_out", "time": "6:37PM", "place": "Charlton MA", "description": "to voice mail for 2  minutes"}, {"type": "call_out", "time": "6:39PM", "place": "Charlton MA", "description": "to laura for 2  minutes"}, {"type": "call_out", "time": "6:41PM", "place": "Charlton MA", "description": "to sarah for 1  minute"}, {"type": "receipt", "time": "6:46PM", "place": "charlton, ma 01507", "description": "cancun burrito for $7.65 at fresh city (site 6w masspike)"}, {"type": "receipt", "time": "6:59PM", "place": "charlton, ma", "description": "gas for $35.10 at gulf (mass turnpike / charlton west)"}, {"type": "call_out", "time": "8:23PM", "place": "North Bran CT", "description": "to bill t for 2  minutes"}, {"type": "call_out", "time": "8:31PM", "place": "North Have CT", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "10:12PM", "place": "Brooklyn NY", "description": "to sarah for 1  minute"}, {"type": "call_out", "time": "10:13PM", "place": "Brooklyn NY", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "10:14PM", "place": "Brooklyn NY", "description": "to sarah for 1  minute"}, {"type": "call_out", "time": "10:15PM", "place": "Brooklyn NY", "description": "to sarah for 1  minute"}, {"type": "call_out", "time": "10:19PM", "place": "Brooklyn NY", "description": "to sarah for 1  minute"}, {"type": "call_out", "time": "10:20PM", "place": "Brooklyn NY", "description": "to john t for 1  minute"}, {"type": "call_in", "time": "10:24PM", "place": "Brooklyn NY", "description": "from sarah for 1  minute"}, {"type": "call_out", "time": "10:27PM", "place": "Brooklyn NY", "description": "to laura for 2  minutes"}], "story": ["I sat in my running car outside my Maynard, Massachusetts home. It was the last Friday evening of August, 2008, and I was on the verge of a break from reality that, due to its breadth and timing, I had been anticipating as my \"graduation from childhood.\" Shifting the car into reverse, I backed off the gravel driveway, onto the sidestreet adjacent to the property, and with that, it was underway.", "I pulled to the corner, then left on the main street, past the front of the house and watching it disappear in the rearview. I wouldn't to see the house again for another ten weeks.", "My wife Laura was inside. I wouldn't see her again for five. She was planning to fly out and meet me on the road. She had a plane ticket to Austin, Texas for Friday, October 3, and a return trip scheduled for two weeks later out of Oakland, California. This meant we were going to travel the Southwest together, something we had done twice before.", "We had just said our goodbyes. She cried, which surprised me. It was endearing. It also made me feel a little guilty for being so excited to be leaving, though I think we both knew there was no turning back at this point. This trip was something I had been focused on doing in some form for years. \"Just remember I love you,\" I told her, holding her by the shoulders. It felt really good to say that. I didn't do it often enough. \"You're gonna make me cry again,\" she revealed after a pause, then managed an abbreviated laugh.", "At a high level, my only real plan was to drive around the United States a lot, and maybe Canada and Mexico some. I had blocked off ten weeks in which to do so, taking leave from the computer programming job I had held for more than six years.", "I knew I wanted to focus on the exploration of population centers, rather than on natural settings or tourist attractions, and without a more specific plan, I was going to visit the states I hadn't yet been to, which I had whittled down to just six... three in the north: West Virginia, Michigan, and North Dakota; and three in the south: Louisiana, Mississippi, and Alabama. In truth, I had actually been to half of those, on account of a flight layover in Michigan and short driving clips in Alabama and West Virginia, but I didn't feel comfortable counting those experiences, and regardless, the trip I was embarking on was an opportunity to erase all doubt. Given the time of year, I was planning to do the northern states first, before it got too cold, and to do the southern states as part of the return trip.", "My envisioned route was also shaped by a number of prospects involving family, friends, and friends of friends in other parts of the country, some of whom lived there, and some who conveniently would be visiting such places. My first commitment was to the wedding of a pair of friends taking place that weekend in Pennsylvania. After that, I would continue on to the D.C. area to visit a brother and two close friends. I would then head for outside Chicago, to catch up with a team of friends playing in an ultimate frisbee tournament the following weekend. Three weeks later I was slated to attend The Austin City Limits music festival with one of my D.C. friends. Weeks six and seven were for Laura and I to go from Austin to Oakland. Then it was Florida, where my Mom and my sister's family would be vacationing. My last plot point was a short stay with a friend at his mother's house in Florence, Alabama. Finally, I would race home in time to be at work on the second Monday in November. I was estimating the trip would cover close to 12,000 miles.", "My car was nothing special. It was a black 1999 Ford Escort sedan, with the passenger side mirror dangling by the wires that used to control it. I had owned the car for almost ten years, which at thirty-two meant almost a third of my life, and almost two thirds of my driving life. All but 12 of its miles were mine. We were no strangers to the road, having been as far east as the ferry dock at North Sydney, Nova Scotia, and as far west as on Pacific sand in Washington state. Still, we had never done anything remotely this ambitious. As I pulled away on that Friday evening, I was sure to take note of the odometer reading, so that I could track distance throughout the trip:", "140,317", "I continued through the center of Maynard, angling to catch up with the westbound highways across the state. Maynard is square between four of the primary thoroughfares of eastern Massachusetts, but not right on any of them. Those four are comprised of two spokes out of, and both perimeters around, the city of Boston, from which Maynard is about 25 miles to the west, shading north.", "I pulled into a familiar shopping plaza after just a few minutes. It was almost 6PM. Clear of the house, I got out of the car to have a smoke. I had rekindled the habit somewhat, and somewhat secretly, in the weeks leading up to leaving. For most of the previous four or five years I had successfully concentrated all of my smoking between Thanksgiving and New Years, and didn't smoke at all for almost 11 months a year. That previous winter, though, I decided to avoid a return to full smoking form, opting instead to become an occasional smoker and to ditch the calendar regulations. Only in the last half of that August did I commit to smoking again, figuring that traveling alone may be the last convenient time of my life to do so, given that Laura didn't like me doing it.", "For as long as my cigarette lasted, I leaned against a column away from the entrance to Star Market to take in the scene, constrasting the activity I witnessed with my own imminent undertaking. I imagined what I saw was routines. It was mothers and children mostly, with shopping carriages, amid an air of errands on the Friday opening to the long weekend that anually marks the end of the summer. It was cloudy, and raining intermittently. I twisted the top off the cigarette, stomped out the ash, threw the remainder into a nearby trash bin, and walked back across the parking lot to the car. Already somewhat disengaged, I felt like a visitor on the trailing edge of my own childhood.", "The car was my new home, and you could tell peering into the windows. A large bundle of sticks from the yard rested on the passenger seat, with some extra firewood from recent camping trips in the foot well. A large gray plastic cooler with a white cover and the word \"beer\" written across the top in marker was pressed between the front and back seats on the passenger side. Various travel bags were conspicuously piled on, and on top of them, an old acoustic guitar. I didn't know how to play it, but figured I might try to teach myself along the way.", "On the driver side back seat sat a wooden contraption resembling a stool, with two sturdy legs and a flat, carpeted surface. This contraption would enable me to sleep in the car. My friend J and I spent a night in his garage building it, and outfitting the car for this very purpose. With the driver seat pushed fully forward, the driver side back seat pulled down, and the contraption standing upright in the well between, I was able to lay fully extended, feet touching the back of the trunk, head resting on the stand. With the sleeping pad and blankets spread across, it wasn't even that uncomfortable.", "My plan for the evening was to stay at my friend John's place in New York City, in the Williamsburg neighborhood of Brooklyn. I had visited him there just enough times so that I couldn't remember exactly how many times, and was looking forward to more dedicated hangout time.", "I took 117 west until I reached 495, where I skirted south an exit or two in order to catch I-290 west. I popped in one of two mix tapes my cousin and close friend Bill T had made for me for the trip. He knew my car had only a tape player, and claimed he enjoyed the throwback experience of making a couple mixes. He had told me one was high-energy, and the other more mellow. I purposefully avoided reading the liner notes and luckily chose the former; of course I wanted to kick off the adventure amped.", "I ran the full length of I-290, past the old brick buildings and colleges of downtown Worcester, then merged onto the Mass Pike westbound. The travel plaza with the Fresh City in it happened to fall on the short stretch of the Pike that coincided with my route, which was perfect; I hadn't eaten yet, and I had been wanting one of their Southwest burritos ever since I took a bite of Laura's the last time we stopped there.", "It did not disappoint.", "On the way back to the car I stopped for another smoke. I didn't want to smoke in the car, and I didn't mind getting out to smoke. I noticed I had two cell messages; one from Laura, and one from John.", "\"It's not a good sign that you're already not answering your phone!\" Laura had told my voicemail. She obviously wasn't aware of how loudly I was playing Bill's mix. I called her back to have her repeat her message, and to tell me that she was fine, even though she had cried. I sort of suspected that, but it was cute that she wanted to be clear about it, and that she had called so shortly after I had left.", "John's message informed me that his cell wasn't working, and so he left another number at which to reach him. I left a message at that number telling him I'd be arriving some time around ten.", "Back on the road. I-84 west, into Connecticut. I was enjoying Bill's tape. I knew and liked most of the songs, but it wasn't until the opening notes of Anthrax's \"Black Lodge\" that I called him to congratulate him on a job well done, and to tell him my trip was underway.", "The trip to New York City across southern New England was a familiar one. West on I-84 into Hartford, then south on I-91 to New Haven, then south on I-95, where exits count down to the New York border as traffic volume increases and as Metro North stations and majestic office complexes sprout up on either side.", "The approach to the city varies depending on destination, but this time I rode I-95 straight into the impossibly vast urbanscape, among the signature thirty-story apartment complexes, until construction-affected traffic ahead of exits 6 A and B validated my preconception to take the Bronx-Whitestone brigde onto Long Island. I eventually caught the Long Island Expressway inbound, racing through the winding concrete channel it was set in, before climbing onto the elevated Brooklyn-Queens Expressway, where my exit for Morgan and Meeker was the first one.", "This exit had given me trouble before, and so I was sure to deliberate over the online map before leaving, thus I was well-equipped. I followed the ramp straight down onto Meeker and under the cover of the expressway for a block or two before breaking right onto Morgan, then shifted over a block when my street ran out. I eventually found Greenpoint Ave at its industrial end, which I followed in the direction of Manhattan until it began to resemble a living neighborhood, and a vaguely familiar one at that.", "I turned left after passing Manhattan Ave and looped around the block until I was on it. This was the address I looking for. I parked, got out, and as instructed called John's friend's phone, only to leave another message. Until I could reach him there was nothing I could do, other than to lean against the car and light up another smoke, of course.", "The scene started coming back to me. Across the street was the ornate stone church at the end of a three-way intersection, pressed between cement facades all six stories high and defiantly revealing nothing about what lay behind. Ground levels were outfitted for commercial use, guarded against the night by iron grates and steel doors. A touch of spraypaint, garbage, and passers-by finished the impression. For such an urban scene, it was rather serene.", "I continued to try the number, and eventually John answered. I told him I was, \"parked on Manhattan, by the end of Noble Street.\"", "\"We're on Noble,\" he reacted. \"We'll be there in... thirty seven seconds.\"", "It took longer than that. After a minute or so, I called Laura to let her know I had made it to New York. We were still on the phone when John and his girlfriend Sarah came around the corner. I don't know why I hadn't suspected it was Sarah's phone I had been calling.", "\"John's here, so I'm gonna go... I'll call you tomorrow... bye.\"", "After a handshake from John and a hug from Sarah, we moved my car onto a sidestreet where it would not be illegally parked come morning. We ascended the stairs to John's second floor apartment and collected ourselves over glasses of water before heading out to The Pencil Factory, a nearby bar they frequented. We entered via the door on the corner into a small, dark room, where the dog of a patron lay on the unfinished wood floor.", "We ordered from the bar after scanning the tap list posted behind, then settled in at an empty table with our pints. We toasted to the first night of my trip, which was shaping up exactly as I'd hoped.", "John and Sarah described the German festival they had attended earlier, and I gathered they had already had quite a bit to drink. We went on to talk about various other aspects of their neighborhood, including the school they both teach at, and the best venues for live music. We also talked a bit about John's roommate Bernard, whom John had been in contact with via cell during our time there. John was working on convincing Bernard, who was apparently drinking elsewhere, to come meet us, while Sarah pointed out for me the woman at the bar with whom Bernard had something going.", "After every drink, I escaped to the corner outside for a smoke. By the time Sarah asked if I had an extra one, I was out.", "Eventually Bernard arrived. It was the first time I had met him. He came across as an introvert, contradicted by his self-assuredness; somewhat dry, though accessible and even captivating.", "We got to talking about music. John and Bernard defended their love of The Hold Steady, claiming the music was pure fun, despite Sarah's dismissal. Sarah admitted an affinity for Josh Ritter, which John and I complemented with stories about a mutual friend who worked on his tour.", "Later, we got to talking about my trip. I explained my short term projection, including the wedding resort in Pennsylvania, a pair of nights in D.C., and then Chicago via West Virginia.", "\"You remember Emily?\" John asked, clarifying, \"the D.J. at Sean and Alicia's wedding in Seattle?\"", "\"Yeah,\" I responded. \"I mean, I only met her that one time, but whatever.\"", "\"She lives in Morgantown. I could give you her number if you need a place to stay.\"", "Bernard added that he had stayed with Emily once while traveling cross-country, and that it had worked out quite well. Apparently she was unassuming, hospitable, and in his case, the respite was timely.", "\"Yeah, I kinda knew she lived there,\" I told them, which was the truth. She was the only person I had ever met from Morgantown, and it registered because, when it came up that one time I had met her, we went on to talk about the Joni Mitchell song about Morgantown. \"I might take you up on that,\" I added.", "Sarah left. John, Bernard, and I decided to move to another bar. The entrance to this next place was on the old loading dock to a large building, which furthered my general impression of Williamsburg as formerly industrial, repurposed as hip, and so vast it couldn't get crowded. \"How could such a fantastic scene be so underpopulated?\" I wondered, but it was.", "We walked in to the tune of \"Don't You Want Me\" by The Human League, followed by \"Situation\" by Yaz. The DJ was an edgy young black woman that we shared a chance laugh with at one point. We stayed a while, almost closing the place out before returning to their apartment some time after 3AM. Laying on the couch in the middle room with the lights out and my head spinning was a very pleasant experience."]}, {"day": 2, "day_of_week": "Saturday", "date": "Saturday, August 30", "place_range": "Brooklyn, NY to Pocono Manor, PA", "part": 1, "timeline": [{"type": "receipt", "time": "", "place": "Paterson, NJ 07522", "description": "at super tech car wash & oil change (126 W Broadway)"}, {"type": "call_in", "time": "9:11AM", "place": "Brooklyn NY", "description": "from paul d for 2  minutes"}, {"type": "call_out", "time": "1:21PM", "place": "Elmwood PA NJ", "description": "to paul d for 2  minutes"}, {"type": "receipt", "time": "1:41PM", "place": "paterson, nj", "description": "atm withdrawal for $101.50 (460 chamberlain ave)"}, {"type": "call_out", "time": "3:20PM", "place": "Newfoundla NJ", "description": "to laura for 6  minutes"}, {"type": "call_out", "time": "3:28PM", "place": "Newfoundla NJ", "description": "to steveo for 1  minute"}, {"type": "call_in", "time": "3:43PM", "place": "Newfoundla NJ", "description": "from steveo for 2  minutes"}, {"type": "receipt", "time": "4:02PM", "place": "rockaway, nj 07866", "description": "asics sneakers for $69.99 at foot locker / rockaway mall (301 mt hope ave)"}, {"type": "receipt", "time": "5:16PM", "place": "stroundburg, pa 18360", "description": "lime, garlic, jalapenos, mozzarella, canned goods, cereal, bread, cheese, tortilla, salsa, p + j for $57.55 at shop rite (3rd & mcconnell st)"}, {"type": "call_out", "time": "5:59PM", "place": "Mountainho PA", "description": "to tate for 1  minute"}, {"type": "call_out", "time": "6:00PM", "place": "East Strou PA", "description": "to craig for 2  minutes"}, {"type": "call_out", "time": "9:54PM", "place": "Stroudsbur PA", "description": "to laura for 3  minutes"}], "story": ["I woke up on John's couch plenty late and plenty hung over. It was almost noon by the time he, Bernard, and I were out the door and on our way to Acapulco's for breakfast. We debated for a moment whether to walk or drive, but ultimately decided to walk, which I told them was in line with my general strategy for the trip; I wanted to absorb the urban scenes by walking or running as much as possible.", "John and Bernard pointed out their favorite places along the way, while I acclimated to what was quite a different neighborhood by day. It was livelier, almost thriving, with open businesses and lots of people out and about. I think the demographic was close to a wholesale swap, too; the hipsters had been traded for a primarily Eastern European population.", "Like the neighborhood, Bernard seemed to have undergone a mild transformation by daylight. In the morning, he was a little less brazen, graciously accepting his hangover. I found myself wanting to reach out to him, but short on what to say.", "Acapulco's was nothing fancy. It was Mexican cuisine in an atmosphere more akin to a deli or a sub shop than to a restaurant. We took a booth near the front, and I passively watched the small television above the door, grateful for the coffee.", "I went with the chorizo omelette, but when the food arrived, I was immediately jealous of Bernard's juevos rancheros, so much so that I ordered my own side of the red sauce; that's where the magic was. I was also the beneficiary of Bernard's leftover guacamole. The meal was inexpensive and absolutely fantastic. I openly wished I had such a place so nearby I could use on a regular basis.", "We went back to the apartment, where I opened John's laptop to scan the online map. I was headed for Pocono Manor in Pennsylvania, and discovered that my immediate task was to get onto I-80 west, which didn't look much harder than simply crossing the George Washington Bridge.", "John offered me his box of tapes. \"Take 'em. Really, I don't listen to them anymore. They've seriously been sitting here for, like, years.\" he said. I held the resistance until he got me with, \"how 'bout this: just take three.\" I took a Neil Young tape that had two of his early albums on it, a recording of a radio show John and our mutual friend Paul hosted during college, and a mix tape that Emily had given John entitled \"Road Trippin',\" with painted across it a black stripe divided by a hashed white line.", "Still recovering from the previous night, and aware of the hot, humid forecast, John and Bernard were settling in for an early afternoon viewing of \"Anchorman.\" As I left, they had already begun laughing at all the right parts in unison, which was very cute. I wondered how often they did this.", "My car was where I had moved it to the night before, and where it looked out of place on the city street due to the abundance of random stuff inside, particularly the large bundle of sticks. I had worried a little whether it would survive the night, especially given the advertisement for \"beer\" on the cooler, but there was no sign of forced entry.", "I navigated my way around the perimeter of the neighborhood, eventually cruising below the base of the Williamsburg Bridge. I wanted to take the bridge to Manhattan, and so I reversed course briefly before retreating away from the water and finding my way onto it. Once across, I took a premature right into a small, crowded neighborhood, forcing me reverse course again before finally righting myself northbound on a primary drive. I crossed Houston, hitting all the lights in stride, recalling a previous Manhattan driving experience featuring the same traffic engineering phenomenon.", "I found my way onto FDR Drive and was surprised at how easy it was to get onto and across the George Washington Bridge. Once across, I made my way onto I-80 westbound with ease, and, surprisingly, without hitting a single toll. Having never before crossed New Jersey on I-80, the sense of adventure was high.", "I had plenty of time to get to Pocono Manor, believing the festivities began at six thirty, and so barely clear of New York, compelled by dark metal spires visible from the highway, I took the next exit, backtracking my way into Paterson, New Jersey.", "After tracing my way along a park-lined stream and into a hilly residential area, I was finally tracking in the direction of the center I sought. Before reaching it, however, I took the opportunity to get an oil change, just one of the errands I had deferred until after the trip began. \"Out in under ten minutes,\" read the ad on the wall of the garage, which turned out to be accurate.", "I made my way into the active downtown scene, which was laid out before me on a slight incline. The sky was crowded out by mixed use buildings, lining both sides of a street packed with cars, buses, and pedestrians. Traffic was a crawl, and so half way up I decided to break left, where I parked at a meter off-center and walked back to the busy area in the heat.", "I wanted to find the spires, and to pick up supplies, including running sneakers, but ultimately I found joy in simply immersing myself in the scene. The streets, sidewalks, and shops were teeming with people, mostly Hispanic, some black. I tried on sneakers at three different places, including two sidewalk sales. The Nikes were only thirty dollars, but the incline at the front didn't leave room for my toes. Still, engaging the locals was a satisfying experience, even for a purpose as mundane as purchasing sneakers.", "I did eventually find the dark spires; they were affixed to the top of government buildings in a less crowded part of downtown, closer to the highway. After finding them, I continued walking, choosing whatever direction looked the most interesting. The exploration was thrilling; it was exactly what I wanted my trip to be. Upon reaching a complicated intersection near an elevated rail station, I decided I had seen plenty and moved to close my walking loop, approaching the car from the opposite side I left it. I paused for a moment to take a pull of lukewarm water from a gallon I had stowed in the trunk before climbing into the car and onto the road again.", "It took me a while to figure out how to get back on I-80 west, but eventually I was on course, listening to the old recording of John's and Paul's college radio show that I had taken from John that morning. The recording seemed vaguely familiar, and though it took quite some time, I eventually confirmed that it was the same broadcast I had received a copy of from Paul during college over ten years prior. Some of the songs were unmistakably the same: \"Supervixen\" by Garbage, \"Black Boys on Mopeds\" by Sinead O'Connor, and that \"Dime a Dozen\" song that was current when the show aired. The real giveaway, though, was the commercial for the Bridgewater State College radio station, in which the perpetrator repeatedly scans the radio only to have it land on \"The Macarena\" each time. The punchline is that he gets increasingly frustrated until the audio finally surrenders to the sound of a bomb exploding.", "I decided to call Paul. Initially, I had been planning to spend the first night of my trip at his house, instead of John's. Paul lived in Hoboken, but as it turned out, he was spending the long weekend on the Jersey Shore, and so our plans fell through. I contemplated swinging by to see him before heading to Pennsylvania, but I had gotten too late a start.", "When a shopping mall worthy of two dedicated highway exits presented, I knew I'd find my running shoes there. I pulled into the lot and parked in front of a satellite row of restaurants, where I got out to stretch my legs and make two separate phone calls, one to Laura and one to my mom. All the while I was talking, I debated whether I would partake of the establishments in front of me, but ultimately refrained, considering the expenditure and the diet implications.", "I pulled the car closer to the mall, and this time the sneaker purchase was a go: Asics for about 60 bucks. I was fine with that. I was trying to keep my spending to under a hundred dollars per day, and wondered whether I should consider the sneakers a capital expense, thus off the books.", "I pulled away from the mall, again on I-80 westbound, and an hour or so later I was at Del Water Gap. It was such an odd natural formation, consisting of a rock slab that appeared flat across the top, then smoothly rounded downward on the left, where the highway plunged likewise before crossing the Delaware River into Pennsylvania.", "Once in Pennsylvania, I pulled off one of the first exits, intent on making a supermarket run, yet another errand I had postponed. The town was East Stroudsburg, and the state road through it wound along the river that divided it. I briefly considered getting out for a jog or a walk, but it was getting on time, and so I made as quick as possible a strike on the first shopping plaza I found. The return trip across the parking lot was a test of strength, in exchange for an overstock of soda and canned goods, most of which ended up in the well behind the passenger seat and below the cooler. That space that became the default dry store in my new home.", "After just a few more exits I was off the highway for good, locked in to the directions I had gotten with the original wedding invitation. Twenty minutes and a few turns later, I was pulling onto the grounds of the Inn at Pocono Manor.", "The wedding was scheduled for the next day. It was the marriage of two of my good friends: Linda and Vog. I had met both of them at college, and had gotten to know them playing on the ultimate frisbee team together. A lot of the rest of the team would be there, many of whom were good friends, and so I was very much looking forward to the festivities.", "I parked in the lot, again amused at the sight of my car as I walked away from it, towards to the front door of the Inn. I didn't take anything with me, didn't have a reservation, and hadn't thought much about what to do when I got there, so I wasn't sure what to expect. Fortunately, almost immediately upon entering the lobby, I made eye contact with my old friend Jim, sitting on the arm of a sofa. Jim and I had grown up on the same street, gone to the same college, and been in each others' weddings, so though I didn't see him as much as I used to, it never mattered; it was always good to see him. I led with a \"hey,\" big smile on my face.", "\"What's up,\" he smiled back.", "\"When did you get here?\"", "\"Eh, few hours ago.\"", "\"You drive?\"", "\"Yeah, from Sherry's parent's... near Albany... wasn't too bad.\"", "His wife Sherry, a good friend of mine since they met at college, was sitting on the couch. \"Hi Rich,\" she said, also smiling, and standing up for a hug, after which I settled in on the opposite couch to catch up.", "\"Anybody else here?\"", "\"Yeah, a lot of us, actually...\"", "I hadn't realized I could have arrived earlier... oh well.", "More familiar faces appeared, and it blew up into an all-out hangout session. There was Pete and Meg, the slightly younger couple who had held the fort in Troy for a number of years post college, providing the rest of us a standing opportunity to return to the school, most commonly for the annual Thanksgiving showdown with the current frisbee team. Pete and Meg had recently moved to Connecticut, which though tragic, was probably for the best, since it impaired our ability to play \"you were born in 198- what?!\" at college parties, and more recently, the 90s edition. They broke the news that they were having a baby.", "Reed and Meghan also came by, in from Minnesota. I told them I was headed their way, and so Reed gave me his cell number, telling me to call when I got close. I memorized the number, at least until I could write it down, not sure I would end up using it.", "Alicia had made the trip from Fort Lauderdale. \"Hey, I didn't know you were gonna be here,\" I offered, excited. \"Yup, I'm here,\" she said with a smile and a short laugh. \"Well alright.\"", "My brother Greg's wife Laura was there, but my brother Greg was not. Laura had gone to college with us, Greg hadn't, and though Greg was friends with all of us, another long-time friend of his was getting married in Massachusetts the same day Linda and Vog were. Coincidentally, my Laura would also be at that Massachusetts wedding, meaning my brother and I traded Lauras for the weekend.", "Tate, Suz, and their newborn Tegan were there, as were Craig and Alicia, who together represented my friends from college that I still saw on a pretty regular basis. I had actually lived with Tate and Suz before moving in with Laura, and we continued to spend time afterwards. Craig and Alicia had just moved back east after spending a few years in the mountains of Colorado, where I visited them once.", "When Tate found out I didn't have a room to stay in, he offered the extra bed in his. I hinted that I wanted to be sure it was cool, newborn baby and everything, but pretty much accepted. Sherry laughed, and asked what I would have done if nobody had offered. I told her things usually just work out for me.", "\"Yeah, I kinda hate that about you,\" Tate said, though as I pointed out, he was the enabler.", "After about twenty minutes of hanging out in the lobby, Maura and Kirk and Abby and Adrian came along. I had dated both Maura and Abby at different times during college, and remained good friends with both of them. When they said they were headed for the bar, I decided to join them.", "We each ordered a drink; red wine for me. I openly expressed surprise that smoking was allowed at the bar, and was told that the Pennsylvania law allowing it was just two weeks away from changing. Abby detected my excitement, and Maura was already aware I had rededicated myself to smoking, but I told them I had smoked my share the night before, and I didn't have any anyway.", "The party moved outside as the scheduled \"night-before\" cookout began. Guests regrouped around tables and chairs on a patio set under a large tree and next to a swimming pool. In an adjacent function room, food and beverage stations were established, as was my drink for the night once I discovered the ice chest containing Guinness Stout bottles. I had a burger and eventually sampled most of the rest of the food, going back a few times for the pesto mozzerella balls.", "Darkness set in as we ate, drank, and laughed. I had a wonderful time conversing with just about every one of the aforementioned people, plus a few others, including some I hadn't seen in a very long time, even since college in some cases. Linda and Vog made their rounds; it was nice to get a chance to say hi to the honorees.", "Later, a campfire was set, which I sat by until I passed out. Collecting myself, I grabbed a room key from Tate, then found my way to the room and was asleep before he and Suz made it back with Tegan."]}, {"day": 3, "day_of_week": "Sunday", "date": "Sunday, August 31", "place_range": "Pocono Manor, PA", "part": 1, "timeline": [{"type": "call_out", "time": "10:41AM", "place": "Pocono Sum PA", "description": "to reed for 1  minute"}, {"type": "call_out", "time": "3:55PM", "place": "Mountainho PA '", "description": "to craig for 1  minute"}, {"type": "call_out", "time": "8:02PM", "place": "Mountainho PA", "description": "to laura for 2  minutes"}], "story": ["Upon waking, it occurred to me almost immediately that Tate, Suz, and Tegan might want family time, and so I was out and about early. Furthermore, I knew the order of the day was to play some disc golf, and so I wanted to check the lobby to see if anyone else was around. Vog, like myself, was big on disc golf, and so despite that he was preoccupied with wedding details, he was sure to prepare directions to a few nearby courses for the rest of us.", "I found Jim in the lobby. I think he was surprised to see me up so early. We schemed about how to get out to a course and play, but word was that others were slowly stirring and also wanted in. This complicated matters, and delayed us a bit, but eventually we settled on a nice sevensome, consisting of Jim and myself along with Craig, Reed, Pete and Meghan, plus Sherry, who didn't want to play but did want to hang out.", "On our way through the parking lot we stopped at my car, to retrieve my bag of discs and to exhibit my sleeping arrangement. Craig mentioned that transporting firewood was generally inadvisable, for unwanted pests may stow away, something I hadn't realized.", "The course we were headed for was named Yetter Park. We made our way there in two vehicles, rolling a few miles east on the interstate, back in the direction I had come in the night before. Off the highway, we struggled with the directions, but eventually found the dirt lot we were looking for. The course began just beyond the backyard of a white house, where two people in chairs sat clearly visible from the rather unimpressive first tee... not a promising start. But, the course did become nicer as we delved into the woods, following along a sunny stream for part of the front nine.", "On the fifth, Craig planted a disc in the stream with an errant throw, then waded in to retrieve it.", "For most of the time, Jim and I were contending for the lead, with the others a little behind. Ultimately, Reed, using his \"lid\" (the derrogatory term used by the disc golf community to refer to an ultimate frisbee disc), snuck up on both of us and won the day.", "Reed had always been a nice guy. He had always been very competitive as well. I liked that combination on him, for I was free to compete hard against him, never having to tread lightly nor to fear retribution. For him to win, though, was unfortunate, for it was vexing to have somebody so competitive beat you and then also beat you at being nice.", "When we got back to Inn, he beat me in ping pong too.", "I began to prepare for the wedding. I went to the car to grab the bottom half of the only nice suit I owned from my \"closet,\" or the open-faced piece of luggage set on the right side of the trunk. I also grabbed the nice pair of black shoes I had brought specifically for the occasion, then went back to the room and showered. Tate and Suz continued to be gracious hosts, but I once again deferred to their family time, grabbing my shirt and tie and heading for Craig and Alicia's room. As I was leaving, Tate had placed Tegan in the middle of the bed and was tickling her belly with his head and face, causing her to emit sounds of unbridled happiness.", "I spent the forty five or so minutes leading up to the wedding with Craig and Alicia, using their iron, watching their television, and occasionally peering out the window at the site of the ceremony, just off the back of the Inn, outside. When it got on time, we made our way out together. At that time, the only available seats were those exposed to blinding late afternoon sun, but thankfully, before the ceremony began, the sun fell enough that the shade of the Inn advanced to cover everybody.", "Vog took his place at the front. He often wore a thick, black beard, but was clean-shaven for the occasion, looking sharp. He might have been nervous, but it was hard to tell, for he tended to appear serious, on account of being some combination of genuine and reserved. His brother was with him, looking remarkably like him, but with long hair. Tate was with him too, dressed like Vog's brother; I hadn't realized Tate was going to be in the wedding.", "A bride's maid emerged from the Inn and the ceremony was underway. She stepped carefully down the stairs etched into the hill between the Inn and the back of the congregation, then walked slowly down the aisle. When she was finished, another maid repeated the procedure, and one by one the rest followed.", "Then the music changed. All necks craned in the direction of the top of the stairs as Linda appeared in all her beauty. She followed in the path of her maids, turning all heads at the same slow pace she moved, smiling all the while. I had known Linda for more than twelve years, and I don't know that I had ever been more genuinely happy for her than I was right then.", "During recitation of the vows, it was Vog's turn for a profound moment. He paused momentarily in the middle of a sentence, appearing to well up while not wanting the congregation hear it in his voice. To behold this was truly a visceral experience; it was rare to see that emotion on him, and it was powerful.", "Immediately following the ceremony, we all moved back inside the Inn for the reception, forming into drink lines and spreading out across the bar, some of us spilling into the hallway. Staff pedaled delicious appetizers; I kept my eye out for the asparagus wrapped in pastry, which stood out from among the others.", "There was a photo booth in one of the foyers, into which we crowded about twelve of us for four hilarious shots. Across the foyer was a pictoral history of Linda's and Vog's relationship, complete with captions, which I studied. We took to our tables inside the main hall where, among other formalities, Vog's brother gave a heartfelt toast, his mannerisms resembling those of the Vog I knew. The meal was a vegetarian dish involving a mushroom tower, and I ended up eating more than I was served, borrowing from the plates of others.", "My brother's Laura became my de facto date. At one point, Maura shared with me that she suspected Laura was pregnant, citing as evidence a subtle distinction in the way Laura was carrying herself. The fact that Laura was not drinking was no giveaway, for Laura didn't drink, which made Maura's prediction particularly bold.", "I spoke with Chung, another friend from college, in from California with his wife Antonia and their baby, Sophie. When I told him I was planning to be in California mid-October, he invited me to Sophie's first birthday party, which they were planning to throw at around that time. I told him I'd keep it in mind, in case I could work it out.", "Later in the evening, I called my Laura to compare the respective weddings we were at. It was fun to reveal and discover who we were spending time with, for we each knew a lot of the guests at both weddings.", "As the reception formally wound down, factions of guests formed across the grounds of the Inn, with people partaking in various post-festivities. I stepped outside to smoke a cigar with a crowd of others doing the same, then later joined another sub-party for a late night dip in the pool. Eventually, with no strong sense of where the party was, I decided to call it a night and retire to the room."]}, {"day": 4, "day_of_week": "Monday", "date": "Monday, September 1", "place_range": "Pocono Manor, PA to Alexandria, VA", "part": 1, "timeline": [{"type": "receipt", "time": "8:40AM", "place": "pocono manor, pa", "description": "atm withdrawal for $122.00 at pocono manor / gift shop"}, {"type": "call_out", "time": "8:45AM", "place": "Pocono Sum PA", "description": "to voice mail for 1  minute"}, {"type": "receipt", "time": "10:17AM", "place": "swiftwater, pa", "description": "gas for $31.45 at exxon express pay / orion fuel llc (rt 611 & 314 e)"}, {"type": "call_out", "time": "12:51PM", "place": "Harrisburg PA", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "12:53PM", "place": "Harrisburg PA", "description": "to mike for 3  minutes"}, {"type": "call_out", "time": "12:57PM", "place": "Harrisburg PA", "description": "to laura for 14  minutes"}, {"type": "call_out", "time": "4:17PM", "place": "Oxon Hill MD", "description": "to mike for 3  minutes"}, {"type": "call_out", "time": "4:27PM", "place": "Alexandria VA", "description": "to laura for 3  minutes"}, {"type": "call_in", "time": "4:48PM", "place": "Alexandria VA", "description": "from rodney for 3  minutes"}], "story": ["I woke up excited, looking forward to the brunch, and also to resuming the adventure, eager to travel highways I had never before been on. By the end of the day, I would be in the D.C. area, specifically Alexandria, Virginia, where I would meet my brother Michael and spend the night at his apartment. At 25, Michael was the second youngest of my five siblings, all of which were younger than me. He was working for the United States Navy and had only recently been stationed near Washington, where I had yet to visit him.", "I was planning to stick around D.C. for the following night too, to catch up with two of my best friends, Steveo and Spoth. Both had attended the same wedding that Greg and my Laura had the previous night, back in Massachusetts, and so both would be, like myself, traveling to D.C. that day; Steveo by plane, and Spoth in his car.", "Steveo had been living in D.C. for a while, where I had visited him enough to see two of three apartments he serially inhabited there, though I had yet to see his current place. Spoth hadn't yet lived in D.C., but his trip that day was to be his transition of residence. He was enrolled at Johns Hopkins in an international studies program, and therefore slated to live in D.C. for at least a year.", "After two nights, I would leave Washington, on a much different trajectory than I'd entered, pointed northwest towards the mountains of West Virginia instead of south, thus rendering D.C. the first major turning point of the trip.", "The brunch was held in a function room within the Inn, and offered a buffet of hot and cold food, including crepes, which turned out to be my favorite aspect. I had not said that aloud when Abby coincidentally offered me the rest of hers, saving me a return trip to the station. By the time I finished eating, most people had gathered, including Linda and Vog, providing the opportunity to engage everybody one last time. I captalized, wrapping up my goodbyes and making a relatively early exit.", "I walked out of the Inn and into another hot and sunny day, leaving Pocono Manor \"the back way,\" or opposite the direction I had come in. As expected, I caught I-380 south in order to rejoin I-80 west. I had been on I-80 across most of Pennsylvania before, albeit in the opposite direction, and knowing that, it didn't quite feel adventurous until mid-morning, when I broke southwest on I-81 towards Harrisburg. My intent was to alter course at Harrisburg, trading I-81 and a southwest heading for I-83 southeast towards Baltimore; then, before reaching Baltimore, to change course again, for Washington.", "Harrisburg proved much larger than I'd expected, and so I was pleasantly surprised. Shortly after switching from I-81 to I-83, the highway rose to share the sky with billboards and the upper stories of old buildings. Overwhelmed by the edification, I could not resist a short detour, to see the city at close range. I exited the elevated highway onto a perpendicular and less elevated multi-lane street, which steadily declined until touching down to become an interlocking thatch in a grid of well-maintained city blocks. I drove through slowly, head swiveling to pan my vision, surveying the urban beauty while trying to remain wary of traffic lights and other moving vehicles.", "After making a left and advancing a few blocks, I reached a breathtaking impass; scores of people fanning out to either side, protected by removable barriers, all silhouetted against a gaping, empty backdrop, where the city appeared to have been carved away. I had reached the banks of the Susquehanna River, which on that day were grounds for a Harrisburg arts festival. In an instant, what I'd intended to be a drive-by was calling for a ground offensive.", "I failed to find parking in view of the festival, and so I wheeled my car back to near where I had gotten off the highway, settling for a meter spot on the elevated connector. After donating a few quarters, I sat on the short barrier behind the sidewalk for a smoke, peering down at the dead-end street below in the uncomfortable midday heat.", "I called my brother Michael to discuss the plan for the evening. I told him I was in Harrisburg, and that I'd probably be there for an hour or so before getting back on the road. Though I couldn't say with confidence, I suspected I had detected a tone of disappointment in his voice, perhaps for not being closer, or for further delaying and effectively shortening our time together.", "I moved quickly to make a sweep of the festival, still shooting for a mid-afternoon arrival in Alexandria. As I approached, the amplified sounds of a live band caught my attention. They were playing a tune that registered as familiar before I could figure out what it was, perhaps because a woman was singing lead... it was Crosby, Stills, Nash, and Young's \"Ohio,\" which I had also heard on the radio that day, forcing me to consider it an early entrant for the soundtrack of the trip. Unfortunately, the song turned out to be the band's last, as they thanked the crowd and started breaking down the stage. I walked away, mingling with the masses on the sidewalk along the river bank.", "There were several pedestrian bridges spanning the deep, wide chasm in which the river ran; I walked half way across one of them to disorient myself. Returning to the bank, I walked among the artists' tents, mindful to remember the names of two artists that caught my attention: \"Dan Westfall\" and \"Paul Shatz.\" Both were in the business of monochrome photography, and both had a number of pieces exhibiting great composition of contrasting textures.", "I went back to the music stage, hoping to catch a song or two from the next band. Unfortunately, they seemed to be having technical difficulties, cutting their first song half way through... or perhaps that was a sound check? I started to wonder what it would be like to play at such a festival, turning my thoughts to my band back home. I was the singer in a four-piece, and we had just played our second show before I left. It was the first band I had ever been in, which made me feel like a kid at thirty-two, except that I was in the process of graduating from childhood, of course. Developing the band was one of the foremost reasons to look forward to the time beyond my return home.", "I left the festival before that next band really got started. Climbing back into the car, I was on my way, but before returning to the highway, I drove across ten or twelve blocks of downtown, stealing a glance down every sidestreet and at the green-tinted dome of the state capital building. Two right turns and a stretch of traffic later, I was on I-83 southbound, cruising in the direction of Baltimore. Along the way, I found York, Pennsylvania to be, like Harrisburg, substiantially more developed than I expected, but in its case I managed to ward off the urge to inspect, holding steady on the highway and rolling right by.", "I had my eye out for I-695, Baltimore's outermost loop, which I-83 conveniently joined. When the two roads split, I remained on I-695, skirting my way around Baltimore. I broke away on I-95, marking a return to familiar interstate chords, and where in scanning the radio I noticed there weren't many unused frequencies.", "When I-95 became the Capital Beltway, I began to circle Washington clockwise. I called Michael from the car to find out how to get to where I would meet him. He explained that he was in a park between the Patomac and the George Washington Parkway, which I needed to get on southbound just across the river.", "I followed Michael's instructions closely enough, and eventually found my way on to the George Washington Parkway. When it seemed I had been on it long enough, I pulled into a parking area and called Michael again. This time we worked together to guide my car to a parking spot near the picnic table he had already staked out. I grabbed an ultimate disc, jumped out of the car, and had just started walking across the grass towards the river when Michael emerged from the shade of a large tree. I threw the disc in his direction, then followed the throw to move in for the handshake-hug combination and greetings.", "\"This is cool,\" I said, gesturing across the park.", "\"Yeah, it's nice. I live, like, just right across the parkway. Use this place all the time... it's like another backyard, only bigger.\"", "The park was indeed fantastic. Large, shady trees sparsely placed on a nice lawn, extending for miles, with a bike trail, plenty of parking, and a great view across the wide, muddy Patomac. Michael pointed out the building complex in which he worked, across the river near the opposite end of the clearly visible Beltway bridge I had just crossed. Even on a beautiful Monday afternoon, the park was not nearly crowded, so Michael and I separated, squaring off to throw the disc.", "Michael had mentioned that his friends might stop by, and eventually, two of them did; Fred and Mary. We were introduced, and the four of us spent some time by the picnic table conversing while Michael worked the hibachi, preparing burgers and dogs for all of us. Michael also offered us Miller Lite, in can form, that he had packed into a small cooler. I cracked one open, as did Fred.", "After eating, we broke out the bocce set Michael had brought. We played a few games, mixing up teams, and I never lost. Later, the four of us dropped the bocce in favor of the disc, forming a large diamond and throwing a bit. Michael and I tried for a time to explain the forehand throw to Fred and Mary.", "In all, hours passed. As it drew late, Fred and Mary had another place to be, and so we broke down the picnic and walked back to the parking lot to say our goodbyes.", "I followed Michael's car out of the parking lot to the street in front of his apartment, discovering that he hadn't lied about how nearby it was; had he not needed to transport the hibachi and the cooler, he no doubt would have walked. I spent an extra few minutes out in front of his place to have another smoke, then made my way in with a few things from the car, including the perishables from the cooler, since I was in need of an ice replenishment.", "The apartment was built in to the third and highest floor of a brick block of living space, and was quite nice inside; a little sparse, but clean, with nice furniture, and a guest room with a futon for me.", "We watched news and talked for a bit. I found out that he was not drinking, which meant the beer cooler he had prepared was for the rest of us, and the leftovers in the fridge were for me; that was thoughtful. We managed to get into a healthy spiritual debate, and I found out that we have different views on things, which was interesting. When the topic turned to politics, we didn't debate as much, but we did determine we were likely on opposite sides of the general election that was two months away.", "Since Michael was a very early riser, he turned in at a relatively early hour, relinquishing the remote control and making a standing offer to use the laptop for the Internet. I went out for one more smoke before settling into the couch for a little more television, then shortly thereafter turned in myself."]}, {"day": 5, "day_of_week": "Tuesday", "date": "Tuesday, September 2", "place_range": "Alexandria, VA to Washington, DC", "part": 1, "timeline": [{"type": "email", "time": "5:39AM", "place": "alexandria, va", "description": "to \"Laura Sanda\" <laura@...> with subject \"Re: Day Three\"", "content": {"to": "\"Laura Sanda\" <laura@...>", "subject": "Re: Day Three", "body": "wow, what an awesome email! thanks. trash day! good job with that. ... i'm at mike's, planning to urban hike dc today then catch up w/steveo and maybe spoth later. sounds like a good plan, watching the stars from the yard. it'll be nice and fall-like by the time i get back."}}, {"type": "call_out", "time": "8:50AM", "place": "Washington DC", "description": "to steveo for 3  minutes"}, {"type": "receipt", "time": "8:58AM", "place": "washington, dc 20004", "description": "coffee for $3.03 at spy city cafe (800 f st nw)"}, {"type": "call_out", "time": "9:09AM", "place": "Washington DC", "description": "to steveo for 1  minute"}, {"type": "call_out", "time": "9:13AM", "place": "Washington DC", "description": "to spoth for 4  minutes"}, {"type": "call_out", "time": "10:28AM", "place": "Washington DC", "description": "to laura for 6  minutes"}, {"type": "call_out", "time": "10:55AM", "place": "Washington DC", "description": "to john t for 3  minutes"}, {"type": "call_out", "time": "11:12AM", "place": "Washington DC", "description": "to voice mail for 1  minute"}, {"type": "journal", "time": "~11:16AM", "place": "washington, dc", "description": "written at dupont circle (dupont circle and massachusetts)", "content": "9 2 08 11:16am  sitting on a bench in dupont circle in washington dc. i was just handed a pamphlet by 3 old chinese ladies describing how the chinese govt forced some european company not to broadcast their favorite chinese tv channel during the olympics, or at least that's what i got out of it after reading it a few times. i was just trying to do some math to explain how it's possible for one person walking on the path to the center of the circle nearest me to obscure a runner moving much faster on a more perpendicular path from my view to the center for an extended period. i know it's simple, and in 11th grade it probably would have come right to me, but now i'm trying to confirm that cos is 1 at 0."}, {"type": "call_out", "time": "11:59AM", "place": "Washington DC", "description": "to spoth for 2  minutes"}, {"type": "call_out", "time": "12:01PM", "place": "Washington DC", "description": "to steveo for 2  minutes"}, {"type": "call_out", "time": "12:07PM", "place": "Washington DC", "description": "to spoth for 1  minute"}, {"type": "call_in", "time": "12:23PM", "place": "Washington DC", "description": "from john t for 2  minutes"}, {"type": "call_in", "time": "12:55PM", "place": "Washington DC", "description": "from steveo for 2  minutes"}, {"type": "call_in", "time": "1:49PM", "place": "Silver Spr MD", "description": "from michelle from bowling for 2  minutes"}, {"type": "call_out", "time": "2:15PM", "place": "Washington DC", "description": "to steveo for 1  minute"}, {"type": "journal", "time": "~2:30PM", "place": "washington, dc", "description": "written at kalorama park (19th and kalorama)", "content": "9/2/08 ~230pm park near 19th st\nhelicoptor rotor shadows spiraled across the neighborhood for the second time today.\nthis neighborhood is my kind of place - sweet porchscapes enclosing the park sloped east to west downward, every view from here filtered through green vegetation growing up along the facades and down from overhanging branches.\n140,317 - mileage at the start of the trip - don't forget that. 600-650 miles more than that now.\npaterson, nj\nharrisburg, pa\nhad lunch w/spoth at the sign of the whale - steveo came in at the end\ngot a 16lb  bag of ice at the shopping center in silver springs just now, just across the maryland border after following 16th north a few miles. listening to politics on radio - first a joe biden town hall, then a call in show. i'm so into it now!"}, {"type": "call_in", "time": "3:53PM", "place": "Washington DC", "description": "from 202-609-**** for 2  minutes"}, {"type": "call_in", "time": "4:42PM", "place": "Silver Spr MD", "description": "from laura for 2  minutes"}, {"type": "call_out", "time": "5:13PM", "place": "Washington DC", "description": "to laura for 1  minute"}, {"type": "call_in", "time": "5:13PM", "place": "Washington DC", "description": "from mike for 3  minutes"}, {"type": "call_in", "time": "6:15PM", "place": "Washington DC", "description": "from steveo for 2  minutes"}, {"type": "call_in", "time": "6:54PM", "place": "Washington DC", "description": "from steveo for 1  minute"}, {"type": "call_out", "time": "7:12PM", "place": "Washington DC", "description": "to steveo for 1  minute"}, {"type": "call_out", "time": "7:31PM", "place": "Washington DC", "description": "to laura for 9  minutes"}, {"type": "call_out", "time": "7:40PM", "place": "Washington DC", "description": "to emily for 2  minutes"}], "story": ["I was up before Michael was, which meant I was up very early. Engaging the laptop, I discovered a lovely email Laura had written the night before. It included a recount of her evening, part of which she spent laying in the backyard staring at stars; an appealing image. I spent most of a half hour responding, wrapping it up as Michael began to stir.", "I fixed myself a bowl of cereal as Michael readied himself for work, a process that included donning the khaki naval uniform. We spoke about my plan for the day, which was to urban hike Washington until Steveo and Spoth were available to hang out. He suggested Old Town Alexandria might be worth a walk as well, naming King Street, where I decided I'd go first.", "\"Where were you going to stay tonight?\" he went on to ask.", "\"At Steveo's... in D.C.\"", "\"Ah, cool. Where is that, anyway?\"", "\"It's near Adams Morgan... somewhere around 18th. I can't remember the name of the street he lives on, but he knows I'm coming... I'm just gonna call him during the day.\"", "\"Well, if that doesn't work out, you have a place to stay if you need it,\" he offered, adding \"if you need anything, even during the day, I'm not that far away.\"", "I thanked him, and we both filed down the stairs and out the door. We said our goodbyes, and climbed into our respective cars.", "I drove north on the George Washingtion Parkway, imagining I was perpetrating a legitimate Washington D.C. commute, except that there was hardly any traffic, which I weighed against the notion that the Tuesday after Labor Day was by all accounts a workday. I was likely too early, corroborated by an abundance of available meter spots in the vicinity of King Street. I parked at one and began walking, aware that I had about an hour before it started counting.", "King Street was lined with colorful row houses, no spaces between, all repurposed for business, with restaurants and nice shops surrendering to beauty parlors and insurance offices as I moved away from the Parkway. There weren't many people around, but those who were appeared as if on a mission, either running or else walking fast while strapped into a backpack. Almost never had a walker passed me while walking myself, but they did that morning.", "I grabbed coffee at a place called the Uptowner and continued to walk. At an intersection featuring a brick island and a trellis with some green woven in, I took a seat at one of many small metal tables, all otherwise unoccupied. There was an elevated rail station beyond, rattling with trains and making automated announcements. Taking coffee and a smoke, I wrote about the scene on the cardboard insulator that came with my coffee.", "I returned to the car as my hour was expiring, and joined the now far more crowded traffic pattern into Washington. The system guided me more than I navigated it, but I did manage to purposefully slip west of the White House before settling on a Massachusetts Avenue meter spot near Dupont Circle. My intent was to do exactly what I had done in Alexandria; make a walking loop, while killing time until I could catch up with Steveo or Spoth.", "I started in a random direction, converging on a mission to circle the White House, calculating whether my meter would hold until I returned. I hadn't showered since before the wedding, and despite my high tolerance for uncleanliness, the heat combined with the cigarette smoking was making me uncomfortable with myself; I tried to be as inconspicuous as possible in occasionally reaching under my shirt to wipe the sweat off my chest and back. It occurred to me that I'd have to plan for showering, and that I should be careful not to waste opportunities to use nice showers, like at my brother's place.", "Continuing along a clockwise trajectory, howsoever circuitous, I was flooded by memories of past experiences, triggered by familiar edifaces and intersections. At the Spy Museum coffee shop, I purchased a token coffee so I could use the bathroom.", "Upon reaching the White House, I traced the perimeter of the front lawn along the protective iron fence, stopping for a moment to peer down the mall. Figuring I was under surveillance, I wondered what The Man thought of a dirty long-hair like myself: was I suspect, or could I get away with things?", "I walked through the Business Triangle, and before returning to the car did some extra walking in the Dupont neighborhood, trying to find the Radio Shack I thought I had seen earlier. I wanted to research the purchase of a CD-to-tape adapter, so that I could listen to CDs while driving. I had bought three CDs shortly before leaving, and hadn't yet listened to them... they were Mutemath, The Red House Painters, and The Rustic Overtones. Those made the only CDs I had with me, excepting two discs of instrumental tracks composed by two different friends: Rob, the guitarist in my band, and Todd, a cousin of Laura's. The intent with both was for me to invent complementary lyrics and melodies, but short on meter time, I deferred the Radio Shack visit until after moving the car, which I inexplicably did instead of reenlisting the meter.", "Taking from the car a yet unused journal, I sat on a bench in Dupont Circle. My strategy for the trip was to take notes instead of pictures, hoping to render an artifact of concentrated impressions only, and to preemptively prevent remembering the trip in the orientation of snapshots. To those ends, I hadn't even brought a camera; only the journal, a nice one featuring a magnetic clasp and a two-toned, embroidered binding. It would be difficult to draw the first mark on such a pristine book, but I was intent on doing so that morning. Before starting, however, I made two phone calls; one to John back in New York City, and one to Spoth.", "I asked John to clear with Emily whether I could stay at her place in Morgantown the following night. He said he'd call her and then get back to me.", "With Spoth, I wanted to find out when he was free to hang out. He said he needed to take care of administrative business throughout the day, but had no classes, and so he'd likely able to do lunch, but would call back to confirm. I was shocked to find out how close to his department I had parked by coincidence; I had no idea where the university was before that.", "While waiting for return calls, I watched people as they crossed through the center of Dupont Circle. I drew a diagram of it in my journal, trying to recall sines and cosines over wondering how a walker along one path could obscure a jogger along another for an extended period of time, despite the speed difference. I was interrupted by three elderly Chinese ladies, one of which handed me a pamphlet explaining that the Chinese government prevented some European company from broadcasting their favorite Chinese television station during the Olympics that summer, or at least that's what I got after reading a few times.", "John called. All clear with Emily in Morgantown, and so I called her to discuss. After a quick greeting, she said she had no problem putting me up, but that she had to work until at least ten, meaning she wouldn't be home until eleven or so. I laughed a little, convincing her it was not a problem, given that my thing these days was to entertain myself in foreign cities. Her plan was to call me when she got home, at which point she'd tell me how to get there based on a description of my whereabouts.", "Spoth called, and we arranged to meet at his department. I walked to the Massachusetts Avenue adress he gave me and hovered just outside the glass alcove harboring the entrance to the building. I watched the hive emit and reclaim what were apparently students, as they formed and disbanded small clusters outside, until the tenth or fifteenth parting of the doors when Spoth appeared offering his usual greeting:", "\"Hello dude.\"", "I echoed the phrase, and we got right to finding a place to eat. Given it was only noon on his first day at the school, he didn't quite have the neighborhood figured, but fortunately I'd just traversed it every conceivable way, and so I knew where to find blocks crowded with restaurants.", "We bypassed several options before settling on the Sign of the Whale, lured by a claim about their burgers. We investigated the claim, taking note of the fine wooden interior and the fancy bar first. The staff was kind to us, even though the place looked a lot nicer than we did, particularly me, though I suppose at the time there weren't many customers to offend. I took my burger with pepper jack cheese and a pint of ale, and ended up believing I could not have done much better.", "Spoth took a call from Steveo, and told him where we were; apparently he was going to try to stop by. Just as we were about to leave, he did, ratcheting the party instead of winding it down. He was sharply dressed, for having been at work, which almost felt like a concession on our part to the restaurant; we were meeting them half-way on presentation, and maybe we weren't so bad after all. Steveo, a Massachusetts native like myself, told us we were in a New York Yankees bar, which obviously turned the complexion of the place.", "Outside the restaurant, Spoth and I each lit up a \"duke,\" the term we used colloquially in place of \"cigarette.\" The two of us had a long history of smoking dukes together. We said goodbye to Steveo as he walked away, the three of us planning to reconvene at Steveo's house that evening.", "Spoth had to get back to school, and so I was left to spend more time alone in Washington. I drove up to near Steveo's place in Adams Morgan, parked in a residential neighborhood just west of the strip on 18th, and took to a bench in a quiet park.", "The park was sloped downwards east to west, infused with green, and almost completely enclosed by porches. Something about a city porchscape moves
