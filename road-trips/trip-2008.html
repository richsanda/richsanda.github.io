me; I felt envy for those with access to the ones I saw. I smoked one more duke before throwing the last few away, finally completely sick of myself for smoking them, though knowing I was likely to smoke again when Spoth and I got together later.", "Reinvigorated by my disavowal of dukes, I got in the car and began exploring the 16th St corridor north of downtown. I pulled up to a burnt out athletic field next to a tennis complex in order to commit to my favorite pasttime: throwing the ultimate disc to myself.", "Throwing the disc to oneself is a form of both art and exercise, and I like to consider myself one of the worlds foremost practitioners. The basic idea is to throw the disc into the air such that it makes a gentle, graceful return to the point of release. This involves playing all angles of the disc and the strength of the throw against the speed and direction of the wind, which means divining the movement of the air is crucial to success. At its best, the activity amounts to placing the disc on the wind as far away as possible, and letting the wind gently carry the disc back as if somebody else had thrown it.", "That afternoon in Washington, there was hardly any wind to be found, which compounded by scorching heat and straining lungs made throwing a rather unsatisfying experience. I holstered the disc and took a walk around the tennis complex, through shaded clearings and over worn footpaths, discovering others doing the same. On return, I stood by the car and fixed myself peanut butter and jelly sandwiches, eating them on the spot.", "I got back in the car and continued north on 16th, discovering that Washington radio had an inordinate number of dial positions dedicated to political discourse. I became enthralled. I listened to Minnesota Governor Tim Pawlenty speak eloquently about the role of government in the economy, then later listened to Delaware Senator Joe Biden field questions in a town hall meeting.", "Just across the Maryland border, I stopped into a shopping plaza to finally restore the ice in my cooler, after which I headed back into Washington. I returned to the same park I had sat in earlier and wrote in my journal for a bit. Signs in the neighborhood indicated parking was restricted to two hours until after six, and so at just after four I relocated the car for what I expected would be the final time.", "I embarked on another long walk, down 18th, back across Dupont and into the Business Triangle. It was fun to explore, and I began to recognize value in retreading paths I'd already been on; it cultured a stronger sense of locale than could be realized in a single pass.", "I walked back to stake out my park a third time, moving to the upper level, on the northeast corner of the block. This section contained a playground, where many young children were playing under supervision of adult women. I suspected the building adjacent to the park was a childcare facility.", "Anxious for Steveo to call, I got to moving again, making a few erratic walking routes through the nearby blocks. I was resting near Columbia and 18th when he called to give me the good word. I walked to his address, thankful to be getting off the streets, compiling estimates of total distance walked on the day, counting upwards of fourteen miles.", "Steveo and others had told me about his roof deck, but I hadn't paid much mind until I saw the apartment, at which point I could not get over the setup. It was a small place, consisting of only two rooms and a bathroom, and seemingly pressed between the roof and the floors below, but it featured a skylight, exposed beams, and many other quirky details that made it absolutely fabulous, including two short steps to sliding glass doors providing passage to the roof.", "It turned out the roof deck was a back porch, which was not what I had expected. It was only slightly higher than the living room floor, and enclosed by wooden walls, making it feel almost like a boat floating atop the neighborhood. It had a view across Washington in every direction, including into the windows, back porches, and roof decks of scores of other places nearby. The roof over Steveo's apartment provided an even better view, accessible by scaling the wall off the lower deck.", "Spoth arrived. We drew beers from a drawer in Steveo's fridge, the assortment suggesting long and varied histories for each bottle, then settled on the roof deck to drink and smoke dukes. Fortunately, the Red Sox were in Baltimore, which meant we'd get the broadcast; we tuned in and turned the TV so we could see it from outside.", "Steveo prepared a variety of food, affording us each a burger, a dog, some spicy sausage, and corn. I slathered every bit of mine in some special hot sauce Steveo had left on the counter, thoroughly enjoying all of it.", "After dinner, Steveo brought his laptop outside for Spoth to tune into one of his Pandora stations. We began talking about the music over the music, and went on to talk about the upcoming Austin City Limits Music Festival, where Spoth and I would next see each other. Spoth had been planning to attend the Austin festival with a group of guys as part of a bachelor party for a friend I hadn't met. Given that I was to pick up Laura in Austin the week after the festival, and that I had nowhere to be in the meantime, I committed to attending the festival too, purchasing a ticket for one of the three days, and planning to meet Spoth there.", "We spent the whole night on Steveo's roof, drinking and smoking, talking, listening to music, and barely getting cold enough to warrant use of a sweatshirt. Steveo was a little more reserved than Spoth and I, for he had a job to get to in the morning.", "\"Hey, when I swing by on the way back, it'll be a Friday, you won't have to work in the morning,\" I told him.", "\"Oh, cool... when is that gonna be again?\"", "\"Friday, November seventh. Plan on it. I have plans to be in Alabama on the fifth and to be home the night of the eighth, so I'm pretty committed to that date.\"", "\"Hey, ah, hopefully we'll be celebrating a new, ah, presidential party, if you know what I mean,\" he suggested, adding, \"oh man, I can't believe you're gonna be gone until then. That's a long time!\"", "We eventually traded Spoth's Pandora for Steveo's iTunes, playing and discussing our favorite Radiohead songs. After listening to about half of \"In Rainbows,\" Steveo said he'd burn me a copy for the road.", "I told them I was headed for West Virginia in the morning, which they were surprised to find out was only an hour and twenty minutes at its closest. Spoth spoke of plans to go rafting in West Virginia with his school friends, explaining that West Virginia was a popular white water destination.", "After many drinks, sometime well after midnight, Spoth left by the stairs for his new apartment in Mount Pleasant, a walk of only a mile or so. \"See you in Austin,\" he said on the way out.", "\"No doubt. I'll call you before then.\"", "I laid on my back on Steveo's short couch as he pulled the lights out, marking another fine finish to an alcoholic night spent with the best of friends."]}, {"day": 6, "day_of_week": "Wednesday", "date": "Wednesday, September 3", "place_range": "Washington, DC to Morgantown, WV", "part": 1, "timeline": [{"type": "call_out", "time": "8:33AM", "place": "Washington DC", "description": "to steveo for 1  minute"}, {"type": "receipt", "time": "9:13AM", "place": "silver spring, md", "description": "gas for $36.32 at exxon express pay / georgia station (9331 georgia ave)"}, {"type": "receipt", "time": "2:03PM", "place": "winchester, va 22603", "description": "apple juice + 2 food bars for $15.23 at martin's (200 rivendell court)"}, {"type": "receipt", "time": "2:14PM", "place": "winchester, va", "description": "apple cider for $5.11 at virginia farm-mkt"}, {"type": "receipt", "time": "5:10PM", "place": "morgantown, wv 26501", "description": "for $35.00 at one stop #513 (991 fairmont rd)"}, {"type": "call_out", "time": "7:21PM", "place": "Morganto/B WV", "description": "to laura for 29  minutes"}, {"type": "receipt", "time": "8:18PM", "place": "morgantown, wv 26505", "description": "veggie quesadilla and beer for $21.00 at gibbie's (368 high street)"}, {"type": "receipt", "time": "9:30PM", "place": "morgantown, wv", "description": "atm withdrawal for $102.50 at huntington (high street office)"}, {"type": "receipt", "time": "9:30PM", "place": "morgantown, wv", "description": "balance inquiry at huntington (high street office)"}, {"type": "call_in", "time": "10:38PM", "place": "Morganto/B WV", "description": "from unavailable for 3  minutes"}, {"type": "call_out", "time": "11:29PM", "place": "Morganto/B WV", "description": "to emily for 1  minute"}], "story": ["I slept just fine on Steveo's couch, despite that I didn't quite fit on it, and in the morning I was up as Steveo was preparing for work, aware that I needed to be out when he was. I was sure to use the shower this time, and though I had been stealing dukes from Spoth until the end of the night, I wasn't planning to smoke anymore, which I expected would help keep me clean.", "Steveo hadn't forgetten his intention to burn the Radiohead album, even though I had. I took the disc, despite not yet having the ability to play CDs, still intent on buying an adapter. I followed Steveo down the stairs, said goodbye, and went to find my car where I had left it the previous afternoon.", "I left Washington due north via 16th, familiar on account of my expedition the day before. Just beyond the shopping plaza at which I'd bought sixteen pounds of ice, I found the Beltway, and circled it counter-clockwise until reaching I-270. In the short run, I was headed for Harpers Ferry, West Virginia, for no better reason than that it shared a name with the venue in Allston, Massachusetts where our band had played its most recent show. My loose plan was to take I-270 towards Frederick, then rely on highway signs to guide me.", "I assessed Washington as the first major turning point of the trip, for the obvious geographic reasons, but also because it marked a departure from both familiar faces and a fairly rigid schedule. I had a place to stay the first night out of Washington, in Morgantown, but I'd have to improvise the following two nights before finally joining friends again on Saturday, at an ultimate tournament near Chicago. I figured I'd spend the middle night elsewhere in West Virginia, in order to properly tribute a state I hadn't been to, but I was less clear on how to spend the third night, save for that I knew I wanted to stop in Indianapolis; something about the \"Crossroads of America\" had always held an inordinate amount of appeal for me.", "In the longer run, though Chicago would arguably represent another turning point, I wouldn't stage my next acute turn of direction until Winnipeg, a week or so later. I had designs on Winnipeg because it was close enough to North Dakota, a state I hadn't been to and therefore needed to visit anyway, and because there's just something intriguing about Canadian cities, particularly those I hadn't seen. I guess I enjoyed the challenge in reconciling that legitimate metropolises exist beyond where American sprawl subsides, particularly in the direction of winter.", "I never did see signs for Harpers Ferry; perhaps I missed them, focused on political talk radio again, or perhaps Harpers Ferry was smaller than I'd suspected, not qualifying for attention from as far away as Frederick. By the time it occurred to me to wonder which route I should have taken, Frederick was behind me, and I-270 had become US-15. I pulled over to prop open the 2005 edition of Woodall's campground directory, trying to get a read from its rudimentary map of Maryland. Reluctant to backtrack, I resigned to continue on US-15 to the next crossroad I could take westward: route 77, at a place called Thurmont.", "US-15 had apparently just been serviced. It featured dark asphalt, sharp white hashmarks, and an openness to match the land it laid across, though its continuity was disrupted periodically by crossings equipped with traffic lights. On the approach to Thurmont, I was sure to stay focused enough to catch my turn, which manifested as a legitimate highway exchange in view of the modest township, and which I took as the radio rebroadcast Joe Lieberman's endorsement of John McCain for president.", "Once I was pointed west, the road immediately plunged into a dark forest with a spacious, uneven floor, and began climbing alongside a winding stream, the water running the opposite direction. The contrast with the landscape I'd spent most of the morning traversing was stark, and caught me completely by surprise.", "Based on past experiences, I had developed a strong fear of taking elevation changes in my car, and so I was retroactively upset that I had missed my turn near Frederick. Once I got comfortable with the conditions, however, and confident they weren't getting worse, I became entraced by the beauty of the forest, making it difficult to follow the swirling road. Then, just as abruptly as I had joined the trees, not an hour spent among them, I was delivered from them, escorted by the road onto rolling, open space again, rendering the jagged forest an aberration.", "I found a few more small townships in that quiet corner of the world, stringing them together along numbered roads while continually reviewing the map. Each consult verified my suspicion that my projected path had eluded me, while also helping me to recast it. Eventually, guided by converging numbered roads, and also by gravity, pulling me down the hills, I was drawn into the center of Hagerstown, Maryland.", "Fascinated by the old brick buildings and glass window storefronts, I pulled into a meter lot that occupied most of a downtown block. The meters accepted every silver coin, and so I dumped some small change to purchase an hour and twelve minutes.", "I felt as if I had lost hours on my quest to reach West Virginia, leaving me feeling anxious, but I just couldn't resist the walk in Hagerstown. My inclination to stay out of the heat and move on faded with each passing block, empowering me to walk further. I continued along the same straight sidewalk away from the center for almost a mile, no destination and no agenda, watching business decay and ultimately yield to empty lots.", "I walked back on the next street over, crossing under train bridges at the far end of my loop. As I returned to the busiest part of the small downtown, amid banks, offices, and the people representing them, I slipped down an alley and into a coffee shop, where upon entering I was delighted to hear Bread playing on the radio. I took my coffee from the teenage girl in hippie clothing and returned to my car, satisfied with my Hagerstown experience.", "The map suggested that catching I-81 nearby would be easy, and so it was. I used it to cross into West Virginia, excited to have reached the first of the last six states I had yet to visit. Despite being closer to my final destination than Harpers Ferry was, I decided I was determined to see Harpers Ferry, and so at Martinsburg I left the Interstate to try to find my way there.", "The strip off the highway was lined with fast food restaurants and gasoline stations, each insulated by its own parking lot. The spread then yielded to a far more dense and seasoned core, tightly packed with small buildings. I imagined this was the blueprint for many American cities, especially older and smaller ones within range of an Interstate. At the heart of this particular city, however, the city abruptly ended, for so did the land, the road falling off to lower ground and racing away ahead of me.", "Harpers Ferry proved to be much smaller than I'd expected. I ended up driving right across the Shenandoah River before I realized I'd missed it, at which point my attention turned to the river. It was amazing. It cut well into the earth, and was flat and wide across the bottom, where the water skittered unformly over rock faces, creating a very regular pattern of whitewater as beheld from high above.", "I watched the river as well as I could while driving, and started scheming to find a way to swim in it. Figuring Harpers Ferry must exist, and that some part of it must be on river, I backtracked, taking closer note of small signs along the way. I turned onto a road at a sign suggesting the Harpers Ferry historic site, the road bending almost immediately before descending parallel to the bridge supporting the main road. Noticing a small white building advertising \"Information\" at the bend, I opted to confirm I was on the right path, pulling into the parking lot.", "There were two large white-haired men inside, sitting behind a counter that wrapped half way around the small room. I don't know how often they got visitors, but they definitely wanted to talk about Harpers Ferry when I told them I wanted to know where it was. And apparently I had just found the road on my own.", "Half way through the conversation, I decided to take advantage of their knowledge, to ask if there were any good swimming holes nearby. They talked about where they used to swim when they were kids, long, long ago, cautioning that they were not sanctioned swimming areas. \"Perfect!\" I thought to myself, but their directions suggested an area other than the river I was interested in. Rather than press for clarification, I lost interest.", "I drove to the bottom of the hill and right into the town, which had a great colonial feel, but signs indicated no parking was allowed, and so I rolled right through it. I opted not to use the parking area because I didn't want to pay for it. The river was obscured by trees and an old rail bridge, so I didn't get a clear look at it, either. By the time I realized that the road I was on was bringing me up to the other side of the main road, I decided to give up altogether, and began scrambling to find my way to US-50, which I had identified earlier as the road I wanted to take into the heart of West Virginia.", "I followed my map carefully, crossing back into Virginia for a time. I almost stopped to eat a few times, but in the end decided I was unsure about the establishments. As I grew hungrier, it became evident that to shed those inhibitions would be in my best interest while traveling.", "I found my way onto the Apple Trail, or so the signs suggested, at one point subject to an overwhelming apple-affected aroma. I suspected it may have come from a processing plant of some kind, but whatever it was, it made me want cider, and so I kept my eyes open for farmstands. While stopped at a light on a thoroughfare in Winchester, the largest center in the area, it occurred to me that Martin's Food Market, a supermarket in the plaza served by the stoplight, might have apple cider, and moreover, it would certainly have food, so why was I so focused on restaurants?", "Martin's was large, well stocked, clean, and had an incredible spread of prepared food. I projected the normalcy of the supermarket aisles across all of Winchester, which seemed like an ordinary, modern municipality. Though I had driven across the country several times, most of the long stretches had been on Interstates; I had never stepped center to center through a largely unfamiliar region before. I realized that, in doing so, my sense of the size of the country was swelling.", "I filled two plastic containers with food from two of the bars, including the Mediterranean bar, which was a nice feature. I also picked up a bottle of apple juice, a little disappointed that they didn't have some sweet local cider to sell.", "I ate while sitting in my car in the lot, door ajar in the blazing heat. I quickly finished, putting the leftovers into the cooler, then slathered my left arm with sunblock before getting back on the road.", "It wasn't long before I came upon a farm store that obviously sold apple products. I would have been satisfied with the apple juice from the supermarket, but, presented the opportunity, I picked up a thick-glassed, gallon-sized jug of the good stuff. Unfortunately, it didn't quite fit in the cooler, but I wasn't going to let that stop me from drinking it even after it got warm; it tasted too good.", "I found US-50 on the other side of Winchester, where I traced the edges of large factories and industrial buildings around a number of corners before finally achieving a westerly heading. I left the city, and before long was in West Virginia again.", "I don't know why I hadn't suspected in looking at the map that the length of US-50 I intended to drive was as mountainous as any stretch in the eastern United States, but it was. I generally disliked the steep and switchbacked climb and descent, but whether I liked it or not, it was fairly obvious that I was in for a few hours of hoping it wouldn't get worse.", "The forest was thick, green, and persistent. The temperature varied widely as I raced through it, plunging in and out of pockets of air that had been hiding from the sun all day. Houses and trailers entrenched and hiding in the bottoms of crevaces peeked through the trees. I was confounded that some would choose a lifestyle so profoundly disconnected, and wondered what techniques they practiced to defend against winter.", "I put in the mix tape entitled \"Road Trippin',\" which I had taken from John in New York City, and which Emily, whose house I was planning to stay at that night, had made. I barely knew Emily, but it was fun to get a sense of her personality from that tape. Each song was in some way literally relevant to roads, traveling, or driving.", "That tape became the soundtrack to running over those mountains, and will likely always bring me back to that heightened experience. I was absolutely spellbound by Tom Waits' song about \"Phantom 409,\" which I had never heard before. Other standout songs included the Violent Femmes song addressed to a dad, Jim Croce's \"I Got a Name,\" and John Denver's \"Country Road,\" which I had been singing to myself before playing the tape, for obvious reasons. It almost brought a tear to my eye when it began pouring out of the speakers.", "I spent most of the afternoon pressing through the forest, hardly seeing another car, occasionally granted impressive views across the mountains to the south. Near what may have been the highest point, I was stopped for a time in a line of traffic at a construction site, waiting for oncoming traffic to use the one serviceable lane. I was in disbelief that, as hard as it was for me to get there, and as treacherous and remote as it felt, some people were spending their day there, working outside.", "State line crossings for Maryland and then West Virginia marked progress. Upon reaching the small settlement of Grafton, I broke northwest on US-250, to cut the corner to the Interstate. I was aware that in order to rejoin the Interstate I would have to break the civilization barrier at some point, but nothing could have prepared me for the jolt when the Middletown Mall came suddenly into view. I gasped. Tense hours spent subject to the absurdity and desolation of US-50 across the mountains made an otherwise familiar scene explosive.", "I pulled into Morgantown at about 7PM, just as it was getting dark. I had three or four hours to kill, a lot of dirty laundry, and a strong desire to exercise, and so I found a laundromat and put on my new running shoes.", "I started the laundry, but before setting out on foot, I called Laura, talking while leaning against my car in the parking lot. At one point I told her I was starting to lean back to the center politically, in the wake of hearing much talk from both sides on Washington radio. She responded with disbelief.", "I jogged down a steep hill to find a bridge over a wide river at the bottom, with Morgantown built up the opposite side. The city across the river was beautiful. It was an interplay of line and shadow, infused with human spirit and purpose, far exceeding the capacity of an individual, and bearing evidence of a thoughtful, continuous, evolution. The effect was likely inherent in any such aggregate construction, but tilting and folding the canvas to match the rugged, natural landscape compounded the effect.", "I jogged across the bridge, my hand instinctively covering the keys in my pocket so as not to lose them. The stimulation on the other side fueled my legs, and I ran all over that town. I ran through the college campus buildings, along walkways, stairs, and pedestrian bridges. I followed the main street past mostly empty bars, anticipating they'd be more active when I came back later, which I planned to. I ran up the hills, through residential sections, and over bridges connecting neighborhoods across ravines adorned with houses. My route was erratic, but it was not random; it faithfully followed the gradient of my fascination.", "I ended up down by the river, reviewing a colorful map of the city posted along a bike path, where an older man on a bike had stopped to do the same. He wore a full white beard, and appeared to be in pretty good shape, sweating as if he had been working hard.", "He spoke to me as if I was familiar with the city, mentioning places that I didn't know. Eventually I told him I was just visiting, wondering what he'd think that meant.", "He started speaking to the natural beauty of the area, exhibiting passion. He went on to tell me about a project to convert old rail beds into a bike path along \"the entire length of the Allegheny Incline,\" which he explained, gesturing up the river, \"would span hundreds of miles, all the way up to Pittsburgh.\" When he left, I proceeded to make one more short loop of the lower city, down by the river, before using the bridge to head back to the car. Once on the other side, I broke down to a walk to climb the hill to the laundromat.", "Climbing that hill, staring into the headlights of the cars bearing down on me, I felt on top of the world. I had survived the day, reached my destination, and run so well for just a day removed from smoking. As much as traveling alone was an opportunity to smoke, it was also an opportunity to get in great shape, a prospect calling for much more discipline, while promising a much greater reward.", "Upon reaching the laundromat, I packed up my clean clothes, changed outfits in the car, and drove back to the part of the city I had just conquered. I parked in a lot, made sure I had my cell phone, and walked into town in search of dinner.", "I found Gibbie's, a well-lit and spacious bar, which I walked into after deliberating outside for a moment, not quite sure of myself. There were a few patrons, but it was not crowded, though I sensed the place was gearing up to pick up. Everybody was young, including the staff, and all seemed comfortable in the scene. I took a seat at the bar, asking for a beer and a menu, and ordered the vegetarian quesadilla, which turned out to be decent.", "I didn't talk much to the help except to order, and when a young pair pulled up to the seats to my left, I didn't talk to them either. I did listen, though, while trying not to appear as if I was. Their accents were slight, but definitely present. They were talking about a male student, perhaps a friend, that hadn't yet shown up at school. They seemed to have an affection for him, and a level, hopeful optimism for his situation.", "After some time, I decided I would reach out to the bar tender. I premeditaded my ice breaker, which would also prove to be my exit strategy:", "\"Excuse me... is there anywhere in Morgantown to see live music tonight?\"", "\"Hmm, I don't know... hey,\" he called over to his female companion behind the bar, \"where could he find live music tonight?\" Before she could answer, he suggested for her, \"well, there's always 1 2 3 Pleasant.\"", "\"Yeah... you never know what you're gonna get over there,\" she said, laughing, but agreeing that 1 2 3 Pleasant was probably the best bet on a Wednesday night. They seemed really interested in helping me, which I appreciated; I had been a little nervous that I didn't fit in there.", "I set out to find 1 2 3 Pleasant, and managed to do so, about half way down a hill between the main drag and the river. It had two doors, both open to the warm night, one to a room with a bar, the other to a room with a stage. Inside, the two rooms were connected. The characters at this establishment were definitely not students; more likely bikers, engaged in slow conversation with the bar tender. Said simply, it was perfect.", "I grabbed a drink, and sat at a table in the shadows away from the bar. I felt very comfortable sitting there, not talking to anybody, contemplating the day's adventure while settling under the influence of the drink. As I'd hoped, there was live music scheduled for the night; I asked the bartender at what time it was supposed to start.", "\"We usually start around ten, sometimes later. Depends on the bands.\"", "This was a much looser attitude than I'd grown accustomed to in Boston and Cambridge, but I remained hopeful I'd get to catch at least one of the bands before Emily called. In the meantime, the TV above the bar was quietly broadcasting Rudi Guliani's speech at the Republican National Convention. The sub-titles were turned on, so I didn't have to listen, but I tried anyway.", "The main event for the evening followed: Sarah Palin's aceptance of the vice-presidential nomination. I was looking forward to it. When I heard she was selected, I was surprised, and thought it represented a bold move that might just pay off. I had no idea what she was, but her credentials were interesting, and she was obviously good-looking. Her speech that night was commanding, and she appeared to be a strong complement to John McCain.", "By the time Emily called, the first band had not yet started. It was almost eleven thirty. I didn't want to ask Emily to wait for me, and I didn't really need to see a band I knew nothing about anyway, so I left, guided by her directions. I went up Pleasant St, then across the bridge at the top, into a neighborhood of gorgeous houses, one of which harbored Emily's apartment.", "She met me at the door as we communicated over cell phone, and I followed her up the stairs to the second floor. She had apparently just secured the rental, and was still transitioning from her last place, which explained the decor: completely empty rooms, except for a radio, random kitchen supplies, and some mattresses. The house itself was incredible, though; it was enormous, and had classic style.", "We talked about road trips, Emily expressing her affinity for them, something I had already gathered about her. I told her about my day, explaining at a high level the route I had taken from Washington, adding:", "\"You know, people talk about taking the back roads, getting off of the Interstates, as if that's the thing to do... well you know something, I think I like the Interstates.\"", "She answered with what seemed like a prepared response:", "\"It's not like the landscapes are any less beautiful on them.\"", "That was a great answer, and not at all what I was thinking. I was complaining about the potential treachery that had been completely designed out of the Interstate system, but she was so right.", "After catching up for a few more minutes, she informed me she was, \"not actually going to stay here tonight.\" She had plans and reasons to stay at her other place, and so she told me to, \"stay as long as you want in the morning... just pull this door closed on your way out.\"", "We pulled one of the mattresses into the front room, where I was to sleep, and Emily was gone not long after I had arrived. I laid on the mattress in the light of the street and the moon, both shining through the enormous bay windows. Laying there, I felt almost euphoric, on account the mounting adventure and a chance to rest safely and comfortably from it."]}, {"day": 7, "day_of_week": "Thursday", "date": "Thursday, September 4", "place_range": "Morgantown, WV to Huntington, WV", "part": 1, "timeline": [{"type": "call_in", "time": "8:41AM", "place": "Morganto/B WV", "description": "from unavailable for 12  minutes"}, {"type": "journal", "time": "~9:38AM", "place": "morgantown, wv", "description": "written at blue moose cafe (248 walnut st)", "content": "th 9/4/08 9:38am blue moose cafe, morgantown\nstayed in morgantown last night, at emily's house. they're just moving in so the place was empty, except for the mattress i slept on in the front room with the enormous bay windows. laying down to sleep i felt so awesome - it felt almost like mild euphoria that in stranger times beset my head, but it was taking up residence all throughout my body.\njust had red pepper and mushroom quiche here. the potatoes were ok, the quiche was fantastic. people here have accents, but not that much.\n1 2 3 pleasant - bar - watched palin's speech (giuliani's too), barely audible, but i read the closed captioning. eh. i told laura i was seeing both sides more and she seemed in disbelief. talked to mom this morning from my sunny morgantown room. haven't used the gps yet.\nmeals: \n- southwest burrito at fresh city on mass pike\n- acapulcos w/john and bernard sat morn\n- burgers and pesto mozzerella at the wedding cookout\n- vegetarian wedding meal\n  - southwest triangles\n  - wrapped asparagus } apps\n  - veg spring rolls\n  mushroom tower\n- brunch - crepes, eggs w/peppers and onions\n- burgers at mike's\n- cereal at mike's\n- burger w/jalapeno cheese at the sign of the whale\n  tennis complex\n- burgers, dogs, sausage, and corn (and hot sauce) at steveo's\n- mediterranean bar at martin's supermarket parking lot\n- veg quesadilla at gibbie's in morgantown\n- red pepper mush quiche"}, {"type": "call_out", "time": "10:09AM", "place": "Morganto/B WV", "description": "to aquino for 1  minute"}, {"type": "receipt", "time": "3:17PM", "place": "milton, wv 25541", "description": "one night of camping for $33.92 at huntington / fox fire koa"}, {"type": "email", "time": "4:28PM", "place": "huntington, wv", "description": "to \"Q\" <aquino@...>, \"Rodney Daughtrey\" <rodney@...>, \"Sean MacArthur\" <sean@...> with subject \"Re: Dough\"", "content": {"to": "\"Q\" <aquino@...>, \"Rodney Daughtrey\" <rodney@...>, \"Sean MacArthur\" <sean@...>", "subject": "Re: Dough", "body": "word, thanks--if you can't stand to hold on to it until i get back (that'd be fine by me), i do have citizens--let me know what i have to do, but don't sweat it yet if you don't want to. w, r hs\n--- On Tue, 9/2/08, Sean MacArthur <sean@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:28PM", "place": "huntington, wv", "description": "to laura@... with subject \"Fw: ca\"", "content": {"to": "laura@...", "subject": "Fw: ca", "body": "want to go to a real los angelean 1st birthday party?\n--- On Wed, 9/3/08, Jeffrey <chung@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:30PM", "place": "huntington, wv", "description": "to chung@... with subject \"Re: ca\"", "content": {"to": "chung@...", "subject": "Re: ca", "body": "cool--thanks! keep me in the loop about the date as it approaches and becomes more final so we can see whether this will work.\n!,\nrich s\n--- On Wed, 9/3/08, Jeffrey <chung@...> wrote:\n [omitting quoted text]"}}, {"type": "receipt", "time": "6:50PM", "place": "barboursville, wv", "description": "silk, ice, can opener, scissors, sponge for $18.08 at walmart / st# 5296"}, {"type": "call_out", "time": "8:27PM", "place": "Barboursvi WV", "description": "to laura for 2  minutes"}], "story": ["Brilliant sunshine filtered into the large, empty room I'd slept in. It was about ten, which was a bit of a late start, but I wasn't worried; I had no real plan for the day, except for to follow I-79 to the other side of West Virginia. I called my mom before heading out, letting her know the trip was going well.", "I left the house, pulling the door closed behind me. It was a beautiful day, and so I decided to walk over to downtown to get some coffee. Grabbing my journal from the car, I set off on foot, gaping at the beatiful homes I'd already seen, though only now in broad daylight.", "Just across the bridge to downtown was the Blue Moose Cafe, a place I had noticed the night before. It seemed like the right kind of morning scene, and so I entered. I had intended to get coffee only, but the place had a feel to suggest the food was special, and the red pepper and mushroom quiche turned out to be incredible. Inspired, I listed in my book the other meals I had taken on the trip to that point, imagining I'd eventually rate them.", "I walked back to Emily's house, gave it one last look as I climbed into my car, and made my way across Morgantown a final time, reflecting favorably on my time spent there.", "I followed I-79 to the southwest, imagining it formed the spine of West Virginia as it swept over the rolling green mountainscape. The drive was the luxury equivalent of the one I'd made the day before, and that was just fine by me.", "It occurred to me that I was rather fond of another aspect of the Interstates system: I liked the signs. The big green ones with the white lettering, conveying city names, distances, exit numbers, and numeric road identifiers. They constituted an interactive positioning system, charged with meaning and map implications. On that particular morning, I enjoyed counting down the distance to Charleston, where I was considering taking another jog.", "While driving, I accounted for the scenes of the trip to that point, imagining various ways to communicate the story. In the past, I had described two cross country trips in terms of five top ten lists: songs, meals, driving moments, American attractions, and new people experiences. I considered trying to fit that format again, but also wanted to tribute experiences with people I already knew, for they had been, and would continue to be, a big part of the adventure. Also, those previous trips lasted about a week each, so by a simple calculation, this trip would be ten times as rich. Would a set of top 100 lists really be the best format?", "I also thought about the timeline of my life. I was fixing frames over windows of time, all pressed flush against the present, for I considered the journey I was on to be a natural phase boundary on many indices. I thought about two frames in particular: the last six years, and my life so far.", "A window of six years framed the time since I moved back to Massachusetts from Seattle, where I had lived for a year and a half. By almost any measure, the time at which I left Seattle was the low point of my life, which meant a window of six years opened with a recovery, and ended higher than it began. In fact, I could not imagine a much more systematic ascent than I'd experienced over the previous six years, and it felt really good to believe that.", "I started turning thoughts about the most significant people in my life during that frame. Who would make the cut if I had to choose exactly twenty? I gave in to affection for the nominees as I spent time addressing each, trying to be fair to those who were more active near the beginning, their contributions not as fresh in my memory.", "I also thought about my whole life to that point, because it represented my complete childhood, by my own proclamation. When I explained that to my friends before I left, some worried what it would mean for me to become an adult, and all pressed for clarification. I said it didn't really mean much, except that I might start doing things like responding to invitations, paying bills and parking tickets on time, and maybe cutting my hair. The latter was opposed by all except my mom, who wouldn't let me forget I'd said it. In the end, I didn't think I was going to change much at all, but I definitely enjoyed seeing things in windows.", "Upon reaching Charleston, despite that it was more impressive than I'd anticipated, I decided to forego the jog, opting instead to stake out a campground. I simply didn't want to chance the stress of competing with campground closing times later. I exchanged I-79 for I-64 west, figuring I'd find a place somewhere between Charleston and Huntington, and thinking I might return to Charleston later.", "Using Woodall's guide, I found an obscure campground pressed between I-64 and it's US highway counterpart, a slow road that afternoon due to schools releasing their buses. Unfortunately, the grounds did not foster a camp-friendly atmosphere, with the surrounding sprawl and I-64 both visible and audible from the sites. They had showers, though, and provided a safe place to rest, which I wanted, feeling I needed another night before trying to sleep in the car in public. Then again, the sticker price was a punch in the gut: 33 bucks for what amounted to a parking spot in an RV lot.", "I asked the woman taking my money if she knew where I could gain Internet access. The camp didn't have it, but she suggested Borders might. When I asked where it was, she told me it was in, \"the biggest mall in West Virginia,\" which was not far from the campground, in the direction of Huntington.", "I spent no time at the campground after securing a site. I didn't even leave any indication that my site was occupied. My plan was to sleep in the back of the car anyway, in order to test drive the bed J and I had devised, so instead, I set out on a mission to find the Internet.", "I found the Huntington Mall, walked in, found the directory, and found Borders. I made a beeline for the checkout counter, asking of the first employee whose attention I could garner:", "\"Do you have public Internet Access?\"", "\"No, sorry.\"", "\"Any idea where I can find it?\"", "He looked around at some of the other employees, then made the call on the radio. He spoke, paused, then relayed the answer:", "\"Public Library.\"", "Of course! I don't know how I could have forgotten the library was the place. I had even used the Seattle public library system during home Internet downtime in the past. I asked the employee where the nearest one was, and he suggested Huntington, about twenty minutes away. He explained how to get there, and so I thanked him and left.", "I used I-64 for a few miles, departing at exit 11, the low number suggesting I wasn't far from the Kentucky border. I rolled into Huntington on Hal Greer Boulevard, past a large hospital complex featuring green glass walls and windows. There were also fast food places, convenience stores, and singleton businesses along the way, but it never felt crowded or flashy; quite the opposite, actually. On the whole, it felt drab and quiet, and as if only half lived in.", "Downtown felt the same way, except that the outdated cement buildings were larger and a bit more complex. I suppose in another sense, it just felt like less money than cities of comparable size I knew.", "I tried to remember the directions provided by the Borders employee, reconciling his words with the city as I took it in. When I got close to where I thought the library should be, I parked, and started walking through the city blocks looking for it. The city was a perfect grid, Avenues perpendicular to Streets, all with numbers for names, making it easy to track position.", "I found the Cabell County Public Library, a gray and brown block of a building that closely matched the description I'd been given. Inside, Internet access was a go: one free hour per day for a visitor. As I settled into my workstation, my vision for the trip altered in a subtle but profound way: I started to see a library visit as a viable activity in every city.", "I scrambled to catch up on email. In my inbox was an email from Chung, following up on our conversation from Linda and Vog's wedding. It contained his California address, and a likely date for his daughter Sophie's first birthday party. I also checked my fantasy football team, with the 2008 NFL season just hours away from kickoff. I expected fantasy football would keep me connected throughout the trip, forcing me to find the Internet at least once a week.", "As my hour expired, daylight still hanging over Huntington in the late afternoon, I set off on a run. I ran towards the river, through a downtown mall complex that defied the rest of the city with its colorful, modern architecture and lively scene. I found my way through a gate in the levee, running along the Ohio River for a stretch, aware that I was looking at another state on the other side, and contemplating the variable waterline.", "I set my sights on a large stadium in the distance, determined to run there, and did so. The signs suggested I was at Marshall, which I hadn't realized was in Huntington. I returned along a road parallel to the one on which I'd made my straightaway, also parallel to the river but further away from it, breaking down to a walk shortly after turning around. On the way back, I passed by many old houses, all clearly purposed for student living or fraternities.", "I returned to the car, genuinely satisfied for having run well on two straight days. At that point, instead of heading back to the camp, I went back to the Huntington Mall, to find a place to eat and watch the NFL season opener. The Redskins were playing the Giants, a game I was only mildly interested in, given that my only fantasy player was the Giants' defense. Still, I was less interested in going back to the campground in the daylight. I settled on Chili's, taking a seat at the bar, drinking beers slowly to extend my stay.", "The accents on the locals were more pronounced than any I'd heard in Morgantown.", "After watching most of the game, I made my way back to the campground, well after dark, but not quite late. I was glad to find the obscure entrance without trouble, and that my designated parking spot hadn't been stolen. The staff had told me I was allowed to have a fire, even though there were no fire rings; they said to just burn the wood on the ground.", "I pulled from the car the wood I had been transporting the entire trip, shaping it into a large mound. It did not take long to reduce to smouldering charcoal, for a week spent in the hot car had most certainly dried it out. I was glad to be rid of it, to free up the front seat for things I needed often, and in turn to free up space behind the driver's seat for the bed.", "I was crashing before the fire quite extinguished, and so I set up the bed in the back of the car: pulled the back seat down, pushed the driver seat forward, set the headrest in the well, and spread the sleeping pad and two blankets across. I climbed in, pushing my legs into the trunk, and pulling the door closed behind me. I stayed on top of the blankets and left the window cracked, for it was too warm a night to get comfortable otherwise.", "I found in laying on my side that my hip touched the underside of the back dash, at least with two layers of blankets and a pad under me. Fortunately, it wasn't very tight, and didn't prevent me from falling asleep; I did so not long after settling in."]}, {"day": 8, "day_of_week": "Friday", "date": "Friday, September 5", "place_range": "Huntington, WV to Lafayette, IN", "part": 1, "timeline": [{"type": "call_in", "time": "8:51AM", "place": "Milton WV", "description": "from laura for 3  minutes"}, {"type": "call_in", "time": "10:19AM", "place": "Barboursvi WV", "description": "from laura for 2  minutes"}, {"type": "email", "time": "10:56AM", "place": "huntington, wv", "description": "to j@... with subject \"Re: Baby Whiting\"", "content": {"to": "j@...", "subject": "Re: Baby Whiting", "body": "sweet! congratulations to all of you. w, r hs\n--- On Fri, 9/5/08, j@... <j@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "11:12AM", "place": "huntington, wv", "description": "to me@... with subject \"austin city limits receipt\"", "content": {"to": "me@...", "subject": "austin city limits receipt", "body": "You've shown your love for ACL Festival by buying your 2008 ticket! Now we want to show you some back by giving you 25% off your entire purchase of 2007 ACL Festival schwag. Visit the ACL Store and enter this special promo code at check-out: XOXOACL\n2008 ACL MUSIC FESTIVAL RECEIPT: Order #4728975\n... \nA C L FEST 9/28 SUNDAY SINGLE DAY PASS  Qty: 1\nSEP 28 Zilker Park (Austin, TX) Doors at 11:00AM [All Ages] \n  PRICE/SECTION QUANTITY PRICE EA SUBTOTAL\n  Sunday 9/28 Single Day Pass  1 $80.00 $80.00\nDELIVERY PrintPass   \nThis item is tax exempt\n  SUBTOTAL $80.00\n  ORDER TOTAL $80.00\nDELIVERY INFORMATION\nACL 08 PRINT PASS\nYou will receive an email with instructions to download and print your PrintPass ticket(s). If you have problems, please contact austin city limits@... and provide your name and order # with a brief explanation of your issue."}}, {"type": "call_out", "time": "1:13PM", "place": "Mount Ster KY", "description": "to voice mail for 1  minute"}, {"type": "receipt", "time": "6:17PM", "place": "indianapolis, in 46225", "description": "atm withdrawal at slippery noodle inn / live blues (372 s meridian st)"}, {"type": "call_out", "time": "7:34PM", "place": "IndianapollN", "description": "to voice mail for 1  minute"}, {"type": "receipt", "time": "7:36PM", "place": "indianapolis, in", "description": "atm withdrawal for $203.00 at chase (1 e ohio st)"}, {"type": "call_in", "time": "8:40PM", "place": "IndianapollN", "description": "from laura for 3  minutes"}, {"type": "receipt", "time": "9:04PM", "place": "Indianapolis, IN", "description": "gas for $37.45 at SPEEDWAY 5528"}, {"type": "call_out", "time": "9:22PM", "place": "IndianapollN", "description": "to bill t for 1  minute"}, {"type": "receipt", "time": "9:32PM", "place": "indianapolis, in 46204", "description": "bbq pork sandwich for $4.49 at DICK'S BODACIOUS BAR-B-Q / DOWNTOWN INDY (50 n pennsylvania st)"}], "story": ["I woke up a few times throughout the night, but ultimately managed to sleep until well after sunrise. Given the conditions, I couldn't have asked for more than that. To stem the heat during the course of the night, I had rolled down the window above my head to about half way, which in the light of day made me feel exposed. This motivated a renovation to the car I had been planning since before the trip began: screens.", "I had a roll of cloth screening with me, and enough velcro tape to line the two back windows. I spent about an hour that morning carefully affixing two soft, removable screens to the inside of the back doors. My handiwork and execution of vision had me feeling pretty good about myself. I used the camp showers and then left the campground, headed west.", "I returned to the Cabell County Public Library that morning for another hour of Internet time, as I was conveniently driving by Huntington anyway. During that session I found an email from J, announcing the birth of he and his wife's first child, Jackson.", "The sky clouded as I crossed into Kentucky, the first time the weather brought anything besides heat since the night I left Massachusetts. My intent was to cross Kentucky on I-64 to Louisville, which would be the first leg of the most direct route to Indianapolis. The map suggested this would take me by Lexington and Frankfurt, both of which I'd visited on a previous cross country venture. This time I had no strong desire to explore the region, but remained willing to answer the call of my fancy.", "Rain came and went as I rode by grand horse pastures along the highway. They made me think of Laura. She keeps a horse she calls Blaze at a barn near our house, and she definitely would have enjoyed this segment of the trip.", "Signs for the Bourbon Trail began to spring up around Frankfurt, and I decided I could make something interesting of my trip across Kentucky after all. I exited and found my way onto US-60 west, which ran parallel to the Interstate and which I committed to taking all the way to Louisville. Signs suggested I wasn't 60 miles from Louisville anyway, so in the end, I wouldn't lose much time.", "I was prepared to visit a distillery, but somehow lost the trail, and so I reduced the scope of the initiative to simply finding a liquor store. Signage indicated I was approaching Shelbyville, a town that meant something to me despite that I'd never been there. That was because, the one other time I'd been in Kentucky, while in a thrift store in search of a souvenir, I purchased a yellow t-shirt commemorative of a road race, with printed on the front:", "\"I ran from Main to Washington. In Shelbyville, Kentucky, that is!\"", "I wore that t-shirt many times in the coming years. As such, in addition to finding whiskey, I figured I'd find both of those streets, to make for a better story. And to finally feel whole.", "The road I was on split into two just ahead of the center of Shelbyville, each becoming a one way while remaining a block apart. Most of downtown seemed to fit in that width, while extending east and west. I passed a place called The Spirit Shop almost immediately, but figured I didn't need to go back because I'd find another place shortly. When I started to fear I wouldn't, I pulled over to park and make a walking adventure of it, in spite of the light rain.", "In parking and getting out to walk, I realized the two streets framing downtown were in fact Main and Washington. Well that was easy. Now I just needed to find the whiskey. I walked east along Main, taking in the brick businesses and other stately buildings, even stopping to read the plaques imparting historic details occasionally.", "I was surprised to see signs in Spanish as I approached my destination, at the east end of town, never before thinking of rural Kentucky for its Latino infusion. Nonetheless, there was definitely a presence. In entering The Spirit Shop, it was immediately clear that I had peeled back the exterior, exposing the culture at its heart.", "The Spirit Shop was a liquor store, with a built in bar. Or maybe it was the other way around. In any case, I had walked into the bar. The patronage was loud and animated at that afternoon hour, and in accordance, I was completely intimidated. They were all men, and with accents I could not follow. I almost turned around and walked out, but figured that would have been the worst thing I could do.", "\"Can I help you?\" asked the woman behind the bar in a raspy Kentucky accent. She was the only woman in there, but clearly strong enough to hold her own. I almost froze, but somehow managed, \"I'm looking for some whiskey.\"", "\"Yeah, well, should be a Kentucky Gentlemen back there somewhere,\" she said, motioning to the door to the next room.", "I had to cross the small, crowded space to get there, but once inside, my ease resumed somewhat. It was a small room, with shelving wrapped all the way around, half stocked with a variety of liquors. I spent some time surveying the options, and was about to settle on a bottle of Knob Creek for sixteen bucks when the woman came in to check on me.", "\"Yep, here it is,\" she said, reaching down to grab a slender bottle off one of the lower shelves. It was a plastic bottle labeled \"Kentucky Gentleman,\" and it was marked four dollars. I hadn't even realized when she spoke earlier that she was referring to the name of a whiskey. I definitely didn't want to spend a lot of money, so in the end, I was glad she saved me; I paid her for the bottle and escaped without harm.", "Once outside, completely relieved, it began to set in that I had just endured a fantastic local experience.", "I enjoyed being removed from the Interstate on the approach Louisville, subject to all of the city's mounting intensity along my inbound path. It was coming up on rush hour, and so the highways were under heavy volume by the time I rejoined them. The sky was a solid gray, creeping in around the tallest downtown buildings and several steel bridges, all visible to my left. Following signs for I-65 north, I was led across one of the bridges and dumped into Indiana along with throngs of commuters headed home.", "I found a great indie rock station for the ride out of Louisville. I didn't know any of the songs, but almost all of them struck a chord, including the one entitled \"Indianapolis,\" which was obviously appropriate.", "As I drew closer to Indianapolis, I was hitting an emotional stride, and anticipating a great run. The rain subsided as I rode the highway to just beyond downtown, watching the skyscrapers slip by to my left. When the road turned sharply left behind them, I exited, to try to find my way into the cluster. Signs for a street named Meridian appeared at the bottom of the ramp, suggesting a street that split the city in half; perfect. I drove it until I was in running range of the skyscrapers, but not yet among them, then wheeled the car around to an empty meter spot adjacent to a city park.", "And then I started running. I went straight for Monument Circle, perhaps the only recognizable aspect of the city on account of nationally televised Colts games; they always show that thing. After cross-hatching through a few of the downtown blocks, I ran south under the bridges by the Conseco Field House, to the limit of pedestrian-friendly downtown blocks. There, I turned west, following along with many other people walking that night. They were headed for the new Lucas Oil Stadium, which I didn't realize existed until then. I approached a man in an official blue jacket out front and asked what the event was, to which he responded, \"High school football.\" I wasn't sure I believed him. Supposedly it was the grand opening of the stadium that night. The Colts had yet to play there, but they would that season.", "The stadium it replaced was in plain view, on the opposite side of the street I was on, across a parking area. I decided to go around it. I made it half way before turning my attention to Victory Field, home of the Indianapolis Indians; I hadn't realized there was baseball in Indianapolis.", "I traced the field half way around, counter to the direction I was circling the old football stadium, before catching a glimpse of the White River. I altered course, joining pedestrian pathways culminating in a footbridge to the other side, decorated with flags and sculptures as a tribute to the city.", "On that bridge, something unusual happened. Another runner, moving the opposite direction, appeared at the far end. He was probably younger than me, maybe college age, short haircut and no shirt. As he got close, he reached out his hand, flattened, at about waist high. Was he really asking me to give him five? Well, I gave it to him, and it was solid. We barely made eye contact, and definitely didn't smile; all we did was five, without either of us slowing down. I could not have felt like a more important part of Indianapolis than I did for that exchange.", "I traced the edge of the river, along a wall protecting a park with a zoo inside, then crossed back over the river onto the joint Indiana-Purdue University campus. After making an erratic path across campus, I stopped at a view of a canal channel carved into the city floor. There was a walkway along each side, accessible by a nearby set of stairs. I took them to the bottom, where I broke down to a walk.", "I followed the canal, below the mezzanines of business complexes, to its far end, where I rejoined the city surface amid ornate government buildings. Perhaps the most interesting was the Indiana Statehouse, placed in such a way that it was visible from various distant points, and built in such a way that it looked different from each one.", "After a long time I decided to close the loop and head back to my car. In the end, I was counting about six miles. It was a performance far superior to my runs in Morgantown and Huntington, and I had already been feeling pretty good about those.", "I drove my car a little further away from downtown and pulled over in a less crowded area, where I sat in my car and ate most of the rest of the vegetables I'd gotten at the supermarket in Virginia. What I didn't eat, I threw away, for it was getting old, and my cooler was starting to smell. I also changed while sitting there, into jeans and my old Colts jersey: number four, Jim Harbaugh. I got a kick out of myself for wearing that jersey at home, but in Indianapolis, it had extra meaning. There were a lot of Colts jerseys out and about that night, so I actually felt like I would fit right in.", "I extended my mileage walking around downtown in search of a bar. I passed up many opportunities because the places, or the people at their outdoor tables, looked too nice. Where were the dives? It occurred to me that they might be outside the confines of the most central downtown blocks, but I persisted anyway.", "I found a place to suit me built into the bottom floor of an office complex, away from some of the more crowded places. It was called Coach's Tavern, and was decorated with sports memorabilia, large screens in a few choice setups, and ordinary looking folk. I pulled up a chair at the corner of the bar closest the door.", "\"Whoa, is that Harbaugh jersey?\"", "It was a male voice. I turned to see who it belonged to, towards the short end of bar where it met the wall. There, a man and a woman sat together, both close to my age. The male, an ordinary looking guy with short, blond hair, wore an expression of admiration, but one that was also clearly appreciative of the irony.", "\"Better believe it,\" I replied, beaming.", "\"That's cool.\"", "I took myself a beer, and kept my eyes glued to the TV above the bar for the most part. After a few minutes, the man who had commented on my jersey was reaching out again.", "\"Hey, I need to ask for your opinion on something.\" He waited until I gave an indication I was willing to give one, then asked plainly:", "\"Is Sarah Palin hot?\"", "I paused at length, before admitted honestly, \"yeah.\"", "\"You see?\" he exclaimed, directed at the dark-haired woman he was with. She was apparently surprised, but beginning to relent in her disbelief, while he qualified his opinion, scaling back to meet her half way.", "They introduced themselves as Scotty and Jenny, and bought my next drink. From there, the conversation was non-stop.", "They asked whether I was a Harbaugh fan. I told them I was from Massachusetts, where my friends and I thought the shirt was hilarious. This made it easy for them to break the news that they despised the Colts, and that they were actually Bears fans, though Scotty thought Harbaugh was alright. Of course, Harbaugh was with the Bears for a while.", "They said they were from a town called Warsaw. \"Not the capital of Poland,\" Jenny clarified, jokingly, but a small town in northwestern Indiana, not so famous for manufacturing artificial hips and other prosthetics. They told me Warsaw was near Valparaiso, which I had heard of but didn't realize could serve as a geographic reference like that.", "I asked them if the Indiana Dunes were cool, explaining I'd been near them, even staying in a campground in nearby Michigan City once, but that I'd never seen the actual dunes, though I'd always wondered about them. They told me the dunes were, surprisingly, very cool, particularly Mount Baldy, which they had recently climbed.", "\"So what are you doing down here?\" I asked them. \"Do you come to Indianapolis if you're going out on a Friday night or something?\"", "\"Well, it's not like we come here every weekend, but yeah, sometimes we come here,\" explained Jenny. \"Sometimes we go to Chicago. I think we like Indianapolis better.\"", "\"Yeah, it's not as big,\" Scotty interjected. \"Easier to get in and out of, but still big enough. Bigger than Valparaiso, that's for sure.\"", "Jenny went on to explain they usually get a hotel room, so they can go out on the town and not have to worry about driving home or anything. \"Actually, what we like to do is try to find the sleaziest, diviest places, in the worst neighborhoods... this place here, this place is too nice for us.\"", "Scotty agreed, and they began telling stories of past adventures. I listened intently, and responded by telling them I was a big fan of the dives myself.", "\"We should go find one,\" Scotty said.", "\"Yeah, let's!\" said Jenny, excited. \"Let's ask the bartender where we should go.\"", "I started to get a little nervous that our relationship would carry beyond the walls of the establishment, not for any good reason, but just because my defenses were up, for being alone in a strange place. I began to plant the seeds of my escape.", "\"Well, I can't really drink too much, I have to drive to Lafayette tonight... that's where I'm staying. I'm supposed to be at an ultimate frisbee tournament outside Chicago in the morning, but yeah, I'll go to another bar with you, for one drink.\"", "We asked the bar tendress where to go. She treated the question with the utmost pragmatism, seemingly unamused, struggling for a bit before offering a place named \"The Elbow Room,\" supposedly just a few blocks up Pennsylvania. Scotty and Jenny paid the tab, and we were on our way.", "It was now dark outside. We walked together for ten or twelve blocks under streetlight to get to The Elbow Room, with Jenny at one point brandishing the souvenir she had taken: a pint glass.", "We found The Elbow Room and walked in. \"This is supposed to be a dive?\" asked Scotty, with understated surprise. The Elbow Room was definitely not a dive. But, we took a table anyway, discussing how our bar tendress could possibly have led us here. Who knows, maybe it used to be less nice?", "Our waitress came by and told us about the bucket specials: Five Bud Lights for ten dollars. \"We'll take two,\" Scotty chimed. I told them I wouldn't be able to help them much, but they assured me all the beers would go.", "We got to talking about music. Jenny took out a small piece of paper on which to write the names of artists that she wanted me to look into. She spoke the names aloud as she was writing, and in each case, I finished the name for her:", "\"Damien...\"", "\"Rice.\"", "\"Ray...\"", "\"LaMontagne.\"", "\"David...\"", "\"Grey.\"", "Lucky guesses, I suppose, though maybe I was reading her a little. I didn't know much about those artists, and didn't own any of their albums, but I did have a relevant story to relay; I told them I had once heard on the radio that Ray Lamontagne was inspired to trade in his early mornings and hard labor routine for a life of music only after hearing Stephen Stills' \"Treetop Flier\" on the radio. Then, of course, I told them how much I loved Stephen Stills.", "As I finished my one drink, I informed them it was time for me to get going. We expressed gratitude for having me each other, with Scotty adding that I had changed his opinion of Massachusetts a little. I took it as a compliment, as I believe it was intended. I thanked them for the drinks, then disappeared from both The Elbow Room and their scene.", "Once outside, I was a little relieved to be alone again, and mildly excited to press on the adventure, though growing tired. I embarked on a shortest path to the car, but could not resist the temptation of Dick's Bodacious Barbeque, stopping in for a pulled pork sandwich. A few younger folk in line ahead of me brought me into their conversation, which ultimately led to a few more compliments on the \"throwback\" Harbaugh jersey.", "Satisfied after scarfing down the sandwich, I found my car and then my way back to I-65, leaving Indianapolis northbound. It was my first nighttime driving experience without a set destination.", "I was upon Lafayette in just about an hour. I left the Interstate at the first hint of passage to the city, finding only its sprawling extremities. Rather weary, I drove around a lot, looking for a safe, well-lit, but not quite busy place to pull up for the night and climb into the back of the car.", "I passed the same plazas and hospitals repeatedly, trying the main roads in various combinations, sizing up all prospects until finally settling on a spot in the middle of a large shopping lot. It was reasonably well-lit, and in view of the main road, though obscured from the closest major intersection by a small building and some shrubbery. As quickly as possible, I killed the ignition, scurried outside and into the back seat, pulling the door closed, and then pulling the overhead light before it went out on its own, hoping nobody would notice me.", "I managed to fall asleep, but it was not very restful. I woke a few times in the first hour, trying not to move while peering outside, hoping to see nothing suspicious. After finally achieving a reasonable depth of sleep, I was awakened by a loud, penetrating noise, akin to that of an HVAC or a generator, repeatedly swelling and fading.", "I raised my head to locate the source. It was a compact construction vehicle, or perhaps a small street sweeper, moving back and forth across the lot. Whatever it was, given my predisposition to uneasiness about sleeping in public, there was no way I could continue to sleep there, and so I resigned to relocating. I dismantled the sleeping provisions and jumped into the driver's seat, turned the ignition with my eyes locked on to what the digital clock would reveal:", "12:41AM", "I fell back into the anxious driving routine I'd spent a half an hour on earlier, trying all major roads repeatedly, from all angles, but in my pursuit of the perfect sleeping site I managed only to hopelessly disorient myself, losing all sense of north, south, east and west. I unintentionally crossed a wide river at one point, finding the other side bereft of any sign of life. Back on the proper side, I slipped off the city a few more times, creeping back in through neighborhoods tightly packed with one story residences.", "Scenes in those neighborhoods burned impressions. A cop standing outside his cruiser, casually conversing with a civilian. Silhouettes of a young girl and boy on a front porch, squaring off for a goodnight kiss.", "I managed a return to familiar numbered roads, where in despair I pulled into a Taco Bell drive through. At about five cars deep, it was clearly the late night hot spot. I ordered a few soft tacos, then pulled up in an adjacent lot to eat them, where others in parked cars appeared to be doing the same. When finished, simply unable to resume the fight, I gave in, retreating to the Interstate.", "After an hour or more of driving, I pulled into a rest area, exhausted, where I leaned back in the driver seat and cracked the window to sleep."]}, {"day": 9, "day_of_week": "Saturday", "date": "Saturday, September 6", "place_range": "Lafayette, IN to Naperville, IL", "part": 1, "timeline": [{"type": "receipt", "time": "12:39AM", "place": "Lafayette, IN 47905", "description": "3 soft tacos and a large pepsi for $5.73 at Taco Bell (3805 State Road 26 East)"}, {"type": "receipt", "time": "7:31AM", "place": "BOLINGBROOK, IL 60440", "description": "grande coffee for $3.01 at STARBUCKS COFFEE COMPANY (RTE 53 & REMINGTO)"}, {"type": "journal", "time": "~7:35AM", "place": "bolingbrook, il", "description": "written at starbucks (395 s bolingbrook dr)", "content": "sat 9/6/08 starbucks, bolingbrook, il\ni can't believe it's been less than 48 hours since the last entry - seems so long ago. i'm gonna transcribe my napkin from denny's now\nbrooklyn ny ***\npaterson nj *\n(e stroudsburg pa)\npocono manor, pa ***\nharrisburg, pa *\nalexandria, va **\nwashington, dc ***\n(silver spring, md)\nhagerstown, md *\n(martinville, wv)\nharpers ferry, wv *\n(apple trail town? va) winchester\nmorgantown, wv **\n(charleston, wv)\nhuntington, wv **\nshelbyville, ky *\n(louisville, ky)\nindianapolis, in ***\nlafayette, in **\nbolingbrook, il *\nbob + sherrie ievers\nchung + antonia + sophie\nreed + megan  ...\ntate + suzie + tegan\nmaura + kirk\nabby + adrian\njim + sherry\nmike + linda\ncraig and alicia\npete + megan\nlaura k\nalicia dunne\nbower + jamie + kid\nbrooklyn\n- drove up morgan, shifted over a street, found greenpoint ave, drove past manhattan, came back around on india?, it all came back to me parked, john wasn't answering his friend's phone (sarah's i guess)\n- he called back, said he was 37 sec away.\n- i had a duke leaning against my car across the street from his apt\n- took more than 37 sec\n- called laura, was still on the phone as john + sarah came around the corner on india\n- had a few glasses of water in the apt\n- loving the scene outside - kinda sparsely populated, spray painted over\n- pencil factory, alternating dukes and beers\n- smoked the last one just before sarah asked for one\n- bernard showed up.\n- sarah left\n- we went to another club where the dj was a black kinda funky girl - don't you want me was on when i came in, 2nd song was situation.\n- moved to the back room for a sec - some thing funny about the girl there, a funny exchange w/john\n- stayed out til 330 or so\n- slept on the couch, very happily drunk\n- walked 8 blocks in the morning to acapulcos - bernard got juevos rancheros w/a side of guac + i was jealous - i ordered a side of red sauce and had the leftover guac for my chorizo omelette\n- found my way out w/o a map, probably not optimally - ended up taking the williamsburg bridge to manhattan, one wrong right turn into a neighborhood before hitting a main n-s, crossing houston and finding fdr\n- running in time w/the lights\n- fdr to gwb was quite easy\n- yankee stadium visible\n- finding 80 was quite easy too, and toll free!\npaterson, nj\n- intrigued by the dark dome and spires, got off the next exit and backtracked\n- oil change, not much english, 10 min as advertised, ducked out of the free car wash\n- found downtown, moved slowly through traffic uphill on a street crowded w pedestrians and sidewalk sales - pulled down a sidestreet and parked at a meter off center, then walked back. tried to buy sneakers at 3 different places, all cheap, didn't like the feel of the nikes\n- walked into the downtownish area w/office buildings and domes/spires\n- walked by the amtrak station then back to the car\n- almost all latino - no whites 'cept me"}, {"type": "call_out", "time": "8:05PM", "place": "Naperville IL", "description": "to laura for 1  minute"}, {"type": "call_out", "time": "8:05PM", "place": "Naperville IL", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "8:06PM", "place": "Naperville IL", "description": "to mom for 13  minutes"}], "story": ["I awoke after a few hours. It was still dark, but thankfully I felt rested enough to get back on the road; I hadn't quite felt safe at the rest area, despite that other cars suggested other people were doing the same thing I was. I knew daylight would come and make driving easier before I had to make any major decisions, and I knew, if necessary, I could sleep on the sidelines at the ultimate Frisbee tournament I was headed for.", "Before I'd left home, I was sure to print directions from across the Indiana state line to the site of the tournament: the Naperville Polo Club, in Plainfield, Illinois, outside Chicago. I kept them accessible as I rode I-65 into the northwest corner of Indiana.", "The sun rose to illuminate a beatiful early morning in advance of my exchange of I-65 for I-80 westbound, where I had to circumvent construction following orange signs. I crossed into Illinois, carefully navigating the Interstate and toll system south and west of Chicago across a region that felt like new growth; it was spread out and distant from downtown, with repeat-pattern residences and well-engineered straightaways lined with pristine Americana, all visible from the highways.", "I was minutes from my destination an hour or two before I wanted to be there, and so I took advantage of the opportunity to have breakfast at Denny's. I took coffee and ordered the chicken-fried steak and scrambled eggs; not a common order for me, but it felt right at the time. Having left my book in the car, I marked up my napkin, listing all municipalities represented on the trip so far, devising a system of asterisks and parenthesis to indicate how well I had experienced them.", "After finishing breakfast, not quite ready to relinquish my solitary time, I went across the street to Starbucks, where at an outside table and over more coffee I transcribed the contents of my napkin to my book. I added to the list \"Bolingbrook, Illinois,\" the locale I had gleaned from my Denny's receipt, then began adding recounts for each entry, getting only as far as Paterson, New Jersey before giving up and driving over to the tournament.", "The approach to the Polo Grounds was along a long, straight dirt road, with a watertower bearing the name \"Plainfield\" looming on the horizon. Before reaching the tower, the tournament came into view along the right side of the road. After days of traveling the unfamiliar, I had finally reached the oasis, which took the form of a scene I knew well: a vast sea of mostly athletic types, ultimate pre-game rituals dictating a pattern of currents, myriad discs sweeping slow, graceful arcs over the surface.", "My interest in the tournament centered around the opportunity to spend time with \"Quiet Coyote,\" a co-ed team out of Boston that I had played with the previous year. My brother Greg still played on the team, but sadly wouldn't be making this tournament. Still, I was certain the team knew of my planned visit, if not because Greg had told them, then for communication I had maintained with my closest friend on the team, Ryan.", "Though normally I had little patience for watching ultimate games I wasn't playing in, I was relishing the prospect of spending a full day along their sideline, clinging to the friendly and familiar for as long as I could before embarking on the next great adventure: three weeks alone in advance of the Austin City Limits music festival. The tournament itself was a slight detour in some sense, for I was committed to backtracking in order to get to Michigan, the second of the last six states I needed to visit to complete the contiguous United States.", "I followed the signs to the parking area, across the fields from the road I came in on, and pulled the car to rest on the grass, improvising a new row of parking. I glanced at my Massachusetts plates as I walked away from the car and towards the fields, taking pride for my car's place among cars representing many states.", "I kept an eye out for the Quiet Coyote white and blue as I cut left and right across the fieldspace, stepping behind crowded sidelines through the grid of playing fields on which teams were still running warm up drills. At Frisbee central, I examined the posted schedule and field map to discover Quiet was just on the other side of the canopy, beyond a thin row of trees. After purchasing an official Chicago Heavyweight 2008 ultimate disc, I cut through the trees and located them quickly; they were huddled up, not making much noise, suggesting it was serious time, likely just ahead of the first game.", "Back when I used to play, we maintained the notion of a funniness threshold, above which a joke had to rate in order to be considered acceptable for the moment. The threshold fluctuated, depending on what the team was doing, but during the most serious times, almost no joke was appropriate. I figured my presence alone constituted a levity on par with a weak joke, and so I paused on the field before getting close to the huddle. At least until noticing I'd been noticed, at which point, thinking I had something and unable to restrain myself, I yelled out:", "\"Hope I'm not interrupting anything serious!\"", "It was nod to the old threshold system itself; nice one. I couldn't tell how high the
