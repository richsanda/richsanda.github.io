sses here are funny - bitching at each other, fighting over who's taking this table. thank god they just turned on the music - somehow makes me more comfortable - it's that great incubus song - \"we'll always have each other\" - spent a good bit of time trying to add vocals to one of todd's songs this morning on the ride from sb to la. i'm onto something on track 3 - \"widen your eyes / let in some light / i can hold your hand / but i can't promise that your soul won't cry anymore\" - damn, that woman in the purple flowered dress just delivered my coke refill w/such grace - maybe i should have the ring on the correct finger. santa monica beach - loved the los angeles city limit sign coming in on rte 1, w/the beach on my right - threw disc to myself over the water, mostly up into the wind coming from up the beach to the north - drove up la brea - amy had said that road would get me to hollywood. it worked. parked on fountain - amoeba record store - hollywood and vine - at information asked where to go, got a map, walked west, into kodak - bunch of weirdos carrying jesus signs, using kids (dear god...), and dressed up as movie characters - sunset strip - beverly hills\n________________"}], "story": []}, {"day": 51, "day_of_week": "Saturday", "date": "Saturday, October 18", "place_range": "Barstow, CA to Las Vegas, NV", "part": 5, "timeline": [{"type": "call_out", "time": "7:38AM", "place": "Barstow CA", "description": "to voice mail for 2  minutes"}, {"type": "call_out", "time": "7:39AM", "place": "Barstow CA", "description": "to mom for 10  minutes"}, {"type": "call_out", "time": "7:50AM", "place": "Barstow CA", "description": "to laura for 25  minutes"}, {"type": "receipt", "time": "9:10AM", "place": "", "description": "groceries - vitamin waters and sprites and dr peppers and cokes, cereal, water, ice, cheese for $52.92 at vons"}, {"type": "call_out", "time": "12:00PM", "place": "Las Vegas NV", "description": "to 702-293-**** for 1  minute"}, {"type": "journal", "time": "~12:15PM", "place": "las vegas, nv", "description": "written at enterprise library (25 East Shelbourne Avenue)", "content": "sat 10/18/08 enterprise library, las vegas, nv\nback in my element - the public library scene. las vegas. i'm here. getting up slowly, getting comfortable. it's quarter past noon or so, i have an internet reservation at 1. lots of kids here. a dedicated kids section too. los angeles. i liked it. that waitress slightly older w/the nice breasts glasses dark hair short bangs kissed me twice \"i like you, you're sweet.\" the bitchy bar tendress got her all \"pissy.\" she when they were fighting about who had to take me said something like \"you take him, he's too good for me\" still not sure what that meant, whether it was sarcastic or just that i wasn't wearing a black tshirt + tattoos. or maybe, judging by the crowd entering when i was leaving - valet parked or escorted subs letting out real pretty people - maybe it just was sarcastic. stayed in barstow last night, back at the good old economy inn - 40 bucks, cash, no itemized taxes - this time i see what laura was saying - i had to reach into the tank to flush the toilet - thankfully only needed to do that 2ce.\nwanna try to settle places to stay for the next few nights after i leave vegas. candice's mom, sarah april, and amy. then i'll fast track it to louisiana. leaning towards not going via oklahoma city - i had considered trying to find tim again, give him my email, make a show of faith. 287 looks like an appealing road, though - denver to dallas, maybe all the way to shreveport, i'll have to look again. firming up plans for the week after in florida too - i'm happy to be able to involve so many in my trip. started making headway on todd's cd - tracks 3 and 4. ... i feel like i'm finally tapping into some good lines about my feelings of late - does it always have to be about how i am right now? i hope not, 'cause by the time i finish i'll probably be far away from here.\nman on cell phone near bathroom in library: \"it had to be done,\" then, on exit, \"the money's protected that way.\" this city scares me, sort of. or turns me off. i liked the way it was portrayed in 21, contrasted with boston. represent! hey, this place is open on sundays, too - how awesome. and the campsites are only 10 bucks a night... ! i feel like i blew it w/craig and alicia's contacts, especially after looking to see they had somebody in long beach! i'd have stayed there last night. candice and brandon have really thrown me off w/their short notice outlook. i could have called chung or trotta if i really cared, i suppose. \"i can't promise you that your soul won't cry anymore.\" library closed friday, october 31 (for nevada day). cool holiday.\ns 18 las vegas, nv\ns 19 las vegas, nv\n20 surprise, az\n21 santa fe, nm\n22 denver, co\n23            shreveport?\n24 new orleans, la\ns 25          mississippi\ns 26 panama city beach, fl\n27            fl somewhere? al?\n28 orlando, fl\n29 orlando, fl\n30 sarasota, fl\n31            moving on? one more day?\ns 1\ns 2           } atlanta?\n3\n4\n5 florence, al\n6\n7 washington, dc\ns 8 maynard, ma\ndelhomme 1       eli 1\nlynch 1          a pete 1\nmcf 4            chris johnson 1\nb wade 1         s moss 4\nk walter 4       cotchery 4\nk boss 1         d clark 4\ngiants 1         dolphins 1\njoe ned 1        j kasay 1"}, {"type": "call_out", "time": "12:37PM", "place": "Las Vegas NV", "description": "to laura for 2  minutes"}, {"type": "email", "time": "1:05PM", "place": "Las Vegas, NV", "description": "to trav@... with subject \"Re: ESPN Fantasy Football: Trade Proposal\"", "content": {"to": "trav@...", "subject": "Re: ESPN Fantasy Football: Trade Proposal", "body": "just getting this now--sorry. i am actually maybe for the first time interested in dealing addai... can't lose fitz right now, though. hopefully i'll be more in touch now that i'm alone again. w, r hs\n--- On Wed, 10/15/08, trav@... <trav@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "1:10PM", "place": "Las Vegas, NV", "description": "to \"JonTom Kittredge\" <ita@...> with subject \"Re: [Fwd: Element Names: a survey]\"", "content": {"to": "\"JonTom Kittredge\" <ita@...>", "subject": "Re: [Fwd: Element Names: a survey]", "body": "hi jt, thanks for keeping me in the loop. see you in 3 weeks (that's like the length of a normal/long vacation ;)). -rich\n--- On Fri, 10/17/08, JonTom Kittredge <ita@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "1:13PM", "place": "Las Vegas, NV", "description": "to mom and dad@... with subject \"Re: hello\"", "content": {"to": "mom and dad@...", "subject": "Re: hello", "body": "hey mom, i know we talked this morning, but i'm just getting this--no big deal, i've been feeling bad too, sorry i got so upset. i'm in a las vegas public library right now, where internet time is short. talk soon, love rich\n--- On Fri, 10/17/08, mom and dad@... <mom and dad@...> wrote:\n [omitting quoted text]"}}, {"type": "call_out", "time": "1:59PM", "place": "Las Vegas NV", "description": "to voice mail for 1  minute"}, {"type": "receipt", "time": "4:33PM", "place": "henderson, nv", "description": "gas for $33.02 at terrible herbst #2 (601 marks)"}, {"type": "call_out", "time": "5:11PM", "place": "Las Vegas NV", "description": "to wrong number for 1  minute"}, {"type": "call_out", "time": "5:12PM", "place": "Las Vegas NV", "description": "to wrong number for 1  minute"}, {"type": "call_out", "time": "5:13PM", "place": "Las Vegas NV", "description": "to laura for 23  minutes"}, {"type": "call_out", "time": "5:38PM", "place": "Las Vegas NV", "description": "to abby for 3  minutes"}, {"type": "call_in", "time": "5:41PM", "place": "Las Vegas NV", "description": "from abby for 11  minutes"}, {"type": "call_out", "time": "5:51PM", "place": "Las Vegas NV", "description": "to barbara (candice's mom) for 3  minutes"}, {"type": "receipt", "time": "7:27PM", "place": "", "description": "quesadilla for $15.00 at espn zone / (702) 933-3776"}], "story": []}, {"day": 52, "day_of_week": "Sunday", "date": "Sunday, October 19", "place_range": "Las Vegas, NV", "part": 5, "timeline": [{"type": "receipt", "time": "9:21AM", "place": "las vegas, nv 89109", "description": "atm withdrawal for $104.00 at viva vegas - gifts (3729 las vegas blvd so)"}, {"type": "call_out", "time": "2:36PM", "place": "Las Vegas NV", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "2:37PM", "place": "Las Vegas NV", "description": "to barbara (candice's mom) for 2  minutes"}, {"type": "call_out", "time": "4:03PM", "place": "Las Vegas NV", "description": "to 505-424-**** for 6  minutes"}, {"type": "call_out", "time": "4:09PM", "place": "Las Vegas NV", "description": "to 303-807-**** for 2  minutes"}, {"type": "receipt", "time": "5:59PM", "place": "Henderson, NV", "description": "chips and salsa, jalapeno smokehouse burger for $12.69 at chili's / grill & bar / sunset (2751 N Green Valley Pkwy)"}, {"type": "call_out", "time": "8:30PM", "place": "Las Vegas NV", "description": "to voice mail for 1  minute"}], "story": []}, {"day": 53, "day_of_week": "Monday", "date": "Monday, October 20", "place_range": "Las Vegas, NV to Surprise, AZ", "part": 5, "timeline": [{"type": "receipt", "time": "1:24PM", "place": "wickenburg, az 85390", "description": "gas for $30.00 at circle k / store no: 2701286"}, {"type": "call_out", "time": "2:44PM", "place": "Sun City W fJIl", "description": "to barbara (candice's mom) for 2  minutes"}, {"type": "email", "time": "4:39PM", "place": "surprise, az", "description": "to me@... with subject \"austin and points south, part 1\"", "content": {"to": "me@...", "subject": "austin and points south, part 1", "body": "on a monday afternoon i arrived in austin, in from the north on i-35. i left the highway just in advance of downtown, and parked one street over from guadalupe by the university campus.\ni was intent on staying for up to two weeks. i walked up and down the street contemplating how to find inexpensive quarter, even considering a short stay in a rooming apartment. i eventually ducked into a cooperative supermarket and asked one of the employees, who was surprisingly helpful. she went to ask another employee who had done something similar in the past, and came back with names of cooperative housing groups, plus an alternate suggestion to contact hostelling international in austin.\ni found a phone book in a gas station and took down a few numbers, then went back to my parked car to make a few calls. i decided to go with the hostel, and to skip the first night to mitigate the expense. the hostel was booked friday, leaving my fifth night open too. i knew spoth would be in town by then, staying with friends at a motel, in for the austin city limits music festival running friday through sunday (i had a ticket too, but for sunday only). if i stayed in austin friday night, i could probably steal a night in the motel with them, but i also wanted to get to a gulf coast beach, and so i considered an overnight trip to corpus christi or south padre island.\nwith help i ascertained the location of the public library. the library is my go-to spot in every city, for the internet access, of course. the walk down guadalupe to find the library oriented for me the university area to downtown, reviving a sense of the austin layout gained almost a decade prior over two visits to the city.\ni spent that first night in a few different bars, moving slowly at first, but after monday night football ended i just asked the help where to go to get a good austin feel. she pointed me further down 6th st, between congress and red river, and so i spent the rest of the night on that infamous five-block stretch. i stopped in to a few different bars, each with live music and a person out front announcing \"no cover.\" later i walked back up guadalupe and slept in my car where it was parked.\ntuesday i was up early - it's hard to get good sleep in a car - so after wasting time walking around i went down to the hostel to check in and clean up. i spent the rest of the day hanging around the library, walking around, and playing disc golf, first at zilker park, then at pease park, where i caught up with two other players, parker and mike. they were very friendly, and told me about the course and others in the area.\nthat night, as intended, i paid to see live music, in order to see bands that... well, that you have to pay to see, i guess. i did no research, so i went to a place i saw an ad for in the local paper: emo's. the venue was fantastic; they were using the \"outdoor stage,\" which felt quite indoors on account of all the canopies. i was trying to compensate for drinking so much the previous night by not drinking, so i took a sprite and sat down on the floor alone by a support post.\neventually a younger kid came up and sat next to me to introduce himself; a nice gesture. his name was hugh. he was originally from santa cruz, california, but had moved to austin a month ago. he was kinda homesick, and so he was psyched to see three california bands, particularly the expendables, who were from his hometown.\nmy first thought was eh, so i got myself into a reggae/punk/surf show... oh well. turned out to be not so bad. the first band was opm, who were hip hop with some heavy guitar chords; i was really into it. the next band was a straight up, slow jam reggae band called revolution, which i didn't think i would like, but the lead singer was so compelling i was enthralled by the end. the expendables were last, they had a ton of energy, playing a sort of heavy metal reggae, which i thought was awesome at first, but i got tired towards the end... maybe i'm just too old.\nwednesday i took a day trip to san antonio, 80 miles or so to the south. unlike in most cities i've visited so far, i was very content to do just the touristy things: the alamo and the riverwalk. i overheard part of a few different tours at the alamo, but i mostly just read all the info posted everywhere and walked through the structures. it was fun to learn about some local history. it was also fun to think about pee-wee herman asking the tour guide to see the basement. and let it be known that i loved the riverwalk. somebody told me long ago they were disappointed with it, so i had low expectations, but the integration of engineering, nature, and utility was overwhelmingly awesome to me. plus, i love fountains... i really do.\nthat night i went back to the bar where i had watched monday night football, hoping to see some baseball games. the same bar tendress that had advised me where to go monday night was working again. \"lone star?\" she asked me, remembering me and what i was drinking from two nights prior. that made me quite happy.\n\"yes.\"\nlater we got to talking more about other places to go. she admitted the 6th street scene was not where she spent her time anymore, now that she was almost 30. she mentioned a few other places she liked to go, and suggested i go to see the spazmatics play at cedar street. they were an 80s cover band, and though she didn't want to admit it, she believed they were actually a corporation and that there were other versions of the spazmatics in other cities.\ni went to see them, and i enjoyed them. i even got to dancing a bit, more than i had yet on this trip, since i hadn't really danced at all, except maybe to nod my head repeatedly at some other live bands.\nthursday i played another round of disc golf at yet a different park, one a little further away and a little nicer. then i checked my phone mail to find out spoth was already in town. i had forgotten he was getting in during the morning. by the time i called him back they were kinda sleeping off the early flight, so i made my way back to the library and waited for the word to meet for dinner.\nat some point while sitting in front of the library an older man asked me if i knew where the post office was. i told him i was a visitor. \"me too,\" he said, \"from galveston.\" he clarified: \"a victim.\" i had heard a lot of news about hurricane ike during my trip, but this made it a little bit real, which was interesting. we got to talking about his situation... how he was evacuated, how he would have just driven to relatives houses in fort worth if the hospital would have let him out as he wanted, and how he wasn't going back; in fact, he had already found a job in austin.\nlater thursday i got the call from spoth to meet he and his friends kipp, zach, and scott at threadgills. we tried a few different local beers over dinner, and then moved on to 6th east of congress for bar hopping. we played a bit of foosball, and saw some live acts.\nkipp, zach, and scott all had military experience in different branches. i told scott, who was in the air force, that i had actually gone to the air force academy for a year. he said he went there too. another sentence or two and we figured out we were in the same class, which led to more talk that kind of blew both of our minds.\nspoth at different points hinted that they could probably get me a ticket to the rest of the music festival if i wanted it. i waited until friday morning to call him and take him up on it. if i was going to hang around austin, what the heck else was i going to do? spend more time playing disc golf alone, walking around the city and hanging out in the library until they got out at the end of each day? i postponed my trip to the texas beaches until after sunday, since i had until friday the following friday to pick up laura at the austin airport. i would travel to the beaches after the festival.\nthe music festival was great, even though it was super hot and dusty. i got to see a lot of bands that spoth told me were good, and so i got to decide for myself: bands like fleet foxes, spiritualized, and band of horses i definitely enjoyed. i also go to see the bands i kinda wanted to see, like the raconteurs, >", "subject": "RE: austin and points south, part 1 of 2", "body": "w!\n***\non a monday afternoon i arrived in austin, in from the north on i-35. i left the highway just in advance of downtown, and parked one street over from guadalupe by the university campus.\ni was intent on staying for up to two weeks. i walked up and down the street contemplating how to find inexpensive quarter, even considering a short stay in a rooming apartment. i eventually ducked into a cooperative supermarket and asked one of the employees, who was surprisingly helpful. she went to ask another employee who had done something similar in the past, and came back with names of cooperative housing groups, plus an alternate suggestion to contact hostelling international in austin.\ni found a phone book in a gas station and took down a few numbers, then went back to my parked car to make a few calls. i decided to go with the hostel, and to skip the first night to mitigate the expense. the hostel was booked friday, leaving my fifth night open too. i knew spoth would be in town by then, staying with friends at a motel, in for the austin city limits music festival running friday through sunday (i had a ticket too, but for sunday only). if i stayed in austin friday night, i could probably steal a night in the motel with them, but i also wanted to get to a gulf coast beach, and so i considered an overnight trip to corpus christi or south padre island.\nwith help i ascertained the location of the public library. the library is my go-to spot in every city, for the internet access, of course. the walk down guadalupe to find the library oriented for me the university area to downtown, reviving a sense of the austin layout gained almost a decade prior over two visits to the city.\ni spent that first night in a few different bars, moving slowly at first, but after monday night football ended i just asked the help where to go to get a good austin feel. she pointed me further down 6th st, between congress and red river, and so i spent the rest of the night on that infamous five-block stretch. i stopped in to a few different bars, each with live music and a person out front announcing \"no cover.\" later i walked back up guadalupe and slept in my car where it was parked.\ntuesday i was up early - it's hard to get good sleep in a car - so after wasting time walking around i went down to the hostel to check in and clean up. i spent the rest of the day hanging around the library, walking around, and playing disc golf, first at zilker park, then at pease park, where i caught up with two other players, parker and mike. they were very friendly, and told me about the course and others in the area.\nthat night, as intended, i paid to see live music, in order to see bands that... well, that you have to pay to see, i guess. i did no research, so i went to a place i saw an ad for in the local paper: emo's. the venue was fantastic; they were using the \"outdoor stage,\" which felt quite indoors on account of all the canopies. i was trying to compensate for drinking so much the previous night by not drinking, so i took a sprite and sat down on the floor alone by a support post.\neventually a younger kid came up and sat next to me to introduce himself; a nice gesture. his name was hugh. he was originally from santa cruz, california, but had moved to austin a month ago. he was kinda homesick, and so he was psyched to see three california bands, particularly the expendables, who were from his hometown.\nmy first thought was eh, so i got myself into a reggae/punk/surf show... oh well. turned out to be not so bad. the first band was opm, who were hip hop with some heavy guitar chords; i was really into it. the next band was a straight up, slow jam reggae band called revolution, which i didn't think i would like, but the lead singer was so compelling i was enthralled by the end. the expendables were last, they had a ton of energy, playing a sort of heavy metal reggae, which i thought was rgotten he was getting in during the morning. by the time i called him back they were kinda sleeping off the early flight, so i made my way back to the library and waited for the word to meet for dinner.\nat some point while sitting in front of the library an older man asked me if i knew where the post office was. i told him i was a visitor. \"me too,\" he said, \"from galveston.\" he clarified: \"a victim.\" i had heard a lot of news about hurricane ike during my trip, but this made it a little bit real, which was interesting. we got to talking about his situation... how he was evacuated, how he would have just driven to relatives houses in fort worth if the hospital would have let him out as he wanted, and how he wasn't going back; in fact, he had already found a job in austin.\nlater thursday i got the call from spoth to meet he and his friends kipp, zach, and scott at threadgills. we tried a few different local beers over dinner, and then moved on to 6th east of congress for bar hopping. we played a bit of foosball, and saw some live acts.\nkipp, zach, and scott all had military experience in different branches. i told scott, who was in the air force, that i had actually gone to the air force academy for a year. he said he went there too. another sentence or two and we figured out we were in the same class, which led to more talk that kind of blew both of our minds.\nspoth at different points hinted that they could probably get me a ticket to the rest of the music festival if i wanted it. i waited until friday morning to call him and take him up on it. if i was going to hang around austin, what the heck else was i going to do? spend more time playing disc golf alone, walking around the city and hanging out in the library until they got out at the end of each day? i postponed my trip to the texas beaches until after sunday, since i had until friday the following friday to pick up laura at the austin airport. i would travel to the beaches after the festival.\nthe . most of the downtown buildings seem vacated. lots of old brick, and old lettering, on the walls, and in raised letters on the roofs. \"hotel.\" empty storefronts. one had old pinball machines in it and a phone number taped to the wall with the text \"pinball machines.\" it's partially reinhabited, though. lot of justice buildings, including the courthouse. i went into a thrift store and bought $2 worth of worn out but not too old maps. the stuff in there seemed like it would go for a lot of money in an \"antique\" store somewhere else. on the radio on the way in, i tuned in to some country station out of nearby vernon, then changed to a hip hop station out of this city whose station id message used the phrase \"slow it down.\" they actually played an obama ad; said there's a lot of obama support in the texoma region... hm."}}, {"type": "receipt", "time": "3:02PM", "place": "van, tx", "description": "gas for $23.94 at love's #287"}, {"type": "receipt", "time": "6:00PM", "place": "shreveport, la", "description": "cereal and real milk, ice, crystal pepper sauce for $12.39 at county market / 9319"}, {"type": "call_out", "time": "6:57PM", "place": "Shrevep0r! LA", "description": "to voice mail for 1  minute"}, {"type": "receipt", "time": "9:47PM", "place": "vicksburg, ms 39183", "description": "quarter for $54.99 at motel 6 (4127 n frontage rd)"}], "story": []}, {"day": 58, "day_of_week": "Saturday", "date": "Saturday, October 25", "place_range": "Vicksburg, MS to Talahassee, FL", "part": 5, "timeline": [{"type": "call_out", "time": "8:37AM", "place": "Vicksburg MS", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "9:04AM", "place": "Vicksburg MS", "description": "to 800-373-**** for 2  minutes"}, {"type": "call_out", "time": "9:09AM", "place": "Vicksburg MS", "description": "to 940-767-**** for 3  minutes"}, {"type": "journal", "time": "~9:30AM", "place": "vicksburg, ms", "description": "written at on the street (s washington st)", "content": "10 25 08 churchbells ringing in vicksburg, ms\nthey're pumping music into the nigh empty streets of vicksburg this morning - big band alternating w bluegrass/jugband/country. a lot of nice iron porches and canopies - lot of old brick + concrete, mostly still in use. churches. squarish grid. big climb up from the river to even the closest establishments. nice stairs somewhat elaborate concrete.\n__________\ntrick or treat parade down washington on sat morning.\n__________\n\"you can have whatever you like\" played briefly in vicksburg, and was #1 on some countdown in denver - grambling radio - nabob - psych r+b version of walk on by - echoing organ strikes - random feedback guitar riffs - listening to timeless favorites now - stylistics - \"don't you care? don't you care?\" last night: stormy - hummingbird - ds last dance\n__________"}, {"type": "email", "time": "9:55AM", "place": "vicksburg, ms", "description": "to \"McCarthy, Laura\" <laura@...> with subject \"Re: FW: Marathon Training Update\"", "content": {"to": "\"McCarthy, Laura\" <laura@...>", "subject": "Re: FW: Marathon Training Update", "body": "word--thanks! w, r hs\n--- On Fri, 10/24/08, McCarthy, Laura <laura@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "10:16AM", "place": "vicksburg, ms", "description": "to laura@... with subject \"vicksburg, mississippi\"", "content": {"to": "laura@...", "subject": "vicksburg, mississippi", "body": "hey, whatever. i'm in vicksburg. nice old downtown with lots of brick and elaborate iron second story porches and sidewalk canopies. big riverboat permanently docked--might be a casino inside. the city is set far back and up the hill from the river. concrete levee has marked the high water gage for the last century's greatest floods.\ni left my license in wichita falls. called them this morning, told them to mail it to sarasota. hope i don't get pulled over! think i'm gonna head to jackson now, then down to new orleans for tonight.\nshreveport made my jaw drop, literally. i saw the poverty and thought wow, so that's what it looks like, but didn't think much more. then on the approach to downtown i turned one corner to see a ghost of a strip--it looked like a once bustling downtown strip completely vacated, with the elevated interstate stampeding through in the background. after a mile or so of completely abandoned mixed use buildings, eventually arrived at the core of downtown, which had a mix of stylish old buildings, either empty or reinhabited, and several nice, new quarter-high skyscrapers, with the farthest ones, the ones along the river, lit up like casino resorts, for that's what they were. i kept saying to myself \"angels and devils,\" for it seemed likely that a consortium of angels and devils conspired to build such a place.\nw!"}}, {"type": "receipt", "time": "11:10AM", "place": "bolton, ms 39041", "description": "gas for $22.02 at classic convenience / #1 (603 brownsville)"}, {"type": "journal", "time": "~12:30PM", "place": "jackson, ms", "description": "written at central high school (359 n west st)", "content": "jackson, ms spengler's corner historic district\nold capitol - capitol building, state of mississippi - pennies - 50 million - library fire - sitting on a chair w/table at central high school now - bells ringing - baptist van w/writing painted all over - all you need is love baptist /methodist / seventh day adventist (shreveport) - predominantly black, it seems - jumbalaya at gas station for 2.49 (2.66) was one of best meals - gonna head to new orleans now - new continental center - \"hotel king edward\" \"standard life!\" - downtown jackson 1 mile walk insignias on sidewalk - are those eagles majestically soaring all around the standard life tower? about 10 of? at the fringe of downtown near where i parked is dominated by vacated and in some cases decrepit buildings - there's a lot of construction, though - q105 in the car - good oldies - stevie, someone who needs me right now - \"more of jackson's ...\"\n__________"}, {"type": "call_in", "time": "3:25PM", "place": "LAPlace LA", "description": "from rodney for 8  minutes"}, {"type": "call_out", "time": "5:59PM", "place": "New Orlean LA", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "6:01PM", "place": "New Orlean LA", "description": "to laura for 17  minutes"}, {"type": "call_out", "time": "6:53PM", "place": "New Orlean LA", "description": "to steveo for 1  minute"}, {"type": "receipt", "time": "7:32PM", "place": "new orleans, la 70130", "description": "1 coke for $4.75 at krazy korner (640 bourbon st)"}, {"type": "receipt", "time": "8:27PM", "place": "slidell, la", "description": "gas for $17.00 at ta travel center / station number 22347963001"}], "story": []}, {"day": 59, "day_of_week": "Sunday", "date": "Sunday, October 26", "place_range": "Talahassee, FL to Orlando, FL", "part": 5, "timeline": [{"type": "receipt", "time": "12:08AM", "place": "defuniak springs, fl", "description": "gas for $20.50 at fillups food stores / #3054 (40 coy burgess)"}, {"type": "journal", "time": "~6:00AM", "place": "tallahassee, fl", "description": "written at waffle house (west end of town)", "content": "sun 10/26/08 waffle house! tallahassee, fl\ni can't believe i actually slept 3 straight hours with my arms folded in the front seat of my car, no shoes. bring me some daylight, i need to make the stretch run! ... i'm pretty intent on 2 nights in a campground near orlando now. hope volunteering doesn't get in the way of chauferring mom around. i could use public, but i'm a little afraid of letting someone drive my car w/the brakes kinda shot. the help is talking about myspace and facebook, how one girl found out her ex was cheating on myspace. football today! gotta get to orlando and secure my spot - wanna watch my thomas jones deal work out! exclamation point! \"online bootie call... i was like, is this real?!\" \"gayspace\" - frat boys in sweatshirts w/skinny girls in dresses just wal A", "days": [{"day": 60, "day_of_week": "Monday", "date": "Monday, October 27", "place_range": "Orlando, FL", "part": 6, "timeline": [{"type": "receipt", "time": "", "place": "", "description": "10.00 tl / 20.00 ca / 10.00 cg"}, {"type": "email", "time": "10:53AM", "place": "orlando, fl", "description": "to laura@... with subject \"rally in new port richey, fl\"", "content": {"to": "laura@...", "subject": "rally in new port richey, fl", "body": "word, i rsvp'ed for this rally... gonna head over to the gulf coast this evening for it. i'm at the orange county library in orlando--there was a long line of early voters snaked around the building this morning, as this is an early voting station. i also checked a box w/my rsvp submission to volunteer saturday and sunday--we'll see if they contact me. they might be confused about the massachusetts address and the florida rally, but whatever. i think this is good--i get to show some support, volunteer if they need me, and still represent and have fun with the family this week. win win! oh, plus one more win: fantasy football! i might have even won the weekly prize for the best score league-wide this week: 111! i need a few folks to not have outstanding games tonight--root against bo scaife (tight end) and chris johnson (running back) of the titans, and against dallas clark (tight end) of the colts.\nw! l r hs\n--- On Mon, 10/27/08, Obama for America <obama campaign@...> wrote:\n [omitting quoted text]"}}, {"type": "call_out", "time": "11:10AM", "place": "Orlando FL", "description": "to laura for 5  minutes"}, {"type": "receipt", "time": "12:23PM", "place": "saint cloud, fl", "description": "gas for $21.10 at narcoossee grocery (750 narcoossee rd)"}], "story": []}, {"day": 61, "day_of_week": "Tuesday", "date": "Tuesday, October 28", "place_range": "Orlando, FL", "part": 6, "timeline": [{"type": "call_out", "time": "10:08AM", "place": "Orlando FL", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "10 r 3  minutes"}, {"type": "call_out", "time": "8:04PM", "place": "valdosta GA", "description": "to laura for 2  minutes"}, {"type": "call_out", "time": "8:11PM", "place": "Valdosta GA", "description": "to allison for 3  minutes"}, {"type": "call_in", "time": "8:44PM", "place": "Valdosta GA", "description": "from laura for 18  minutes"}], "story": []}, {"day": 68, "day_of_week": "Tuesday", "date": "Tuesday, November 4", "place_range": "Valdosta, GA to Florence, AL", "part": 6, "timeline": [{"type": "journal", "time": "~9:00AM", "place": "valdosta, ga", "description": "written at leaning on my car", "content": "11/4/08 election day, valdosta, ga\nleaning on my car, making sure this pen works"}, {"type": "journal", "time": "~9:15AM", "place": "valdosta, ga", "description": "written at king's grill (200 north patterson street)", "content": "__________\nking's grill, valdosta, ga - fantastic accents on the help, clientele and waitress. nice old school diner on a corner, w/a counter, teal blue upholstery, booths against the walls w/windows, divided by the door, and square free standing tables like the one i'm sitting at. today's election day. fun. watched bill maher w/john legend, some momly type, and amy holmes... plus some black professor guy who spoke jive like but very intelligent in favor of obama. also watched the pbs special about mccain and obama's pasts. downtown valdosta is really nice. well-kept, elaborate borders framing two toned brick faces, faded in some cases, nice grid. king's grill has a prime spot. i had to trade out the grits for hash browns even though it cost me 55 cents extra. staying at rodney's mom's tonight. told him to tell her i'd be there between 7 and 8. i should look at a map, but loosely i was planning straight interstates, 75n to atlanta for 20w. atlanta intrigues me - some atlantan on football radio on my drive to daytona beach last weekend said it was like hollywood plopped into the south. i like that. i can see that. debating finding the stadium and picking up a roddy white jersey. \"we are not fast. we are good, we are cheerful... if... go to chicago... north of the tension line.\" the waitress says \"that is a nice journal\" (nice pronounced nahs) \"did you get that at books a million?\" dreamt about visiting a former or remote business associate w/jeremy w driving down a hill windy road big lake ahead brakes fully depressed but i can't stop. the house was a basement apartment - small - right alongside the water - i asked if it ever flooded - seemed impossible that it didn't flood regularly, but he said it hadn't - reminiscent of properties built against the water near/in sarasota. downtown sarasota - the bridge, the circle, lido beach, \"do you know where the siesta key is?\" back over the bridge - all the way to siesta drive, right near the post office i used to mail in my absentee ballot. ..."}, {"type": "journal", "time": "~10:00AM", "place": "valdosta, ga", "description": "written at streets of valdosta", "content": "__________\nthe lone simple 6 or so story building brick rectangular print - 6 or so girls on sidewalks and benches sketching scenes of surroundings - an art class\n__________\n\"living my life like it's golden... freedom\"\n__________\n\"can't keep running away -v\"\n__________\nyou can't get w/this... scenario...\" medley - albany, ga 96.3 - classic jam lunch"}, {"type": "journal", "time": "~2:30PM", "place": "columbus, ga", "description": "written at booker t washington apartments", "content": "columbus, ga booker t washington apartments"}, {"type": "journal", "time": "~2:40PM", "place": "columbus, ga", "description": "written at the beanery (1204 1st avenue)", "content": "in the beanery now - a coffee place. sitting at a high square table, metal backed chair, metal + wood furniture, election coverage on cnn on the big flat screen w/o sound. this city looks bigger than i expected - side by side by side 8 stories downtown - historic riverfront signs everywhere - i'll probably try to walk down shortly. lot of cotton fields on the ride over - georgia southern highway - downtown albany after a quick turnaround - square blocks, brick buildings is the theme. this feels like it's gonna feel like vicksburg, probably just because of historic push and orientation to a n-s river state boundary - ist poll closing in 3:46: - says cnn ticker - route 82 to route 520? w. lots of broken down elaborate farm structures. thick trees. started getting hilly just a bit ago. ..."}, {"type": "journal", "time": "~3:00PM", "place": "columbus, ga", "description": "written at on a sidewalk (broadway and 12th)", "content": "broadway + 12th st columbus, ga - this city is beautiful - old brick, many paned windows, some new architecture mixed in, art sculptures, long line of storefronts stretching down broadway, brick sidewalk section at the corners - a water tower down by the river old warehouses / factories by the river - backs of brick buildings in organic arrangement - columbus bowling center faded paint on brick - some boarded windows - my heart melted and i let out a gasp as i simultaneously realized i was seeing and hearing the waterfall over the man made wall below the bridge - this town really was named after that columbus? one placard said quincentenial 1492-1992 nina/pinta/sm - statue of girl sketching waterfall - ripples of sand from rushing water now protruding from the surface - there's even some foliage around here - feels almost like fall, though it's probably almost 70 degrees right now - park across river trees interspersed w/some brick s? - looked new englandy old water mill on east side of river\n\"keep your love locked down\" you lose\n__________"}, {"type": "call_out", "time": "3:06PM", "place": "Columbus GA", "description": "to rodney for 2  minutes"}, {"type": "receipt", "time": "4:20PM", "place": "phenix city, al", "description": "confectionaries for $2.37 at dolly madison / store 657 (1930 crawford rd)"}, {"type": "call_in", "time": "5:02PM", "place": "Birmingham AL", "description": "from rodney for 2  minutes"}, {"type": "receipt", "time": "5:34PM", "place": "birmingham, al 35203", "description": "prepay gas for $10.00 at downtown shell (1100 4th ave)"}, {"type": "call_out", "time": "7:43PM", "place": "Florence AL", "description": "to rodney for 5  minutes"}, {"type": "call_out", "time": "9:15PM", "place": "Florence AL", "description": "to laura for 2  minutes"}], "story": []}, {"day": 69, "day_of_week": "Wednesday", "date": "Wednesday, November 5", "place_range": "Florence, AL", "part": 6, "timeline": [{"type": "journal", "time": "~12:00PM", "place": "florence, al", "description": "written at rodney's mom's", "content": "11/5/08 ... florence, al (rodney's mom's house, on the couch in the tv room) - walked downtown this morning - coffee at mcgraw's - obama wins - birmingham news (took 2 tries at 75 cents each to get the paper) - asked a guy blond w scruff older 30 something \"how's it going\" at the sme time he said something similar. \"awlraht\" he said with great deliberate drawling anunciation - drab army colors - my accent must betray me, 'cause even though i don't have a strong boston accent, i definitely don't talk like that - same w/the tall slender woman dark hair and glasses behind the counter - she seemed nice, but she stumbled a little talking to me - downtown + the houses on the walk there are so charming - neat storefronts - diverse in color, texture, + style, but cohesive - well kept - rodney should be here any minute its 50 seconds past high noon on the brick wall ticking clock. it's cool + interesting to be in alabama for the election of the first black president - the birmingham news had a few stories that invoked the civil rights movement from before my time - maybe my parents really don't get how much race doesn't matter much to me and my generation - interesting to scan the county map of alabama w/the vote returns - birmingham (jefferson county) voted obama, as did a belt of alabama from mississippi to georgia at the montgomery latitude. must be the black belt - i just can't explain it any other way - could it just be progressive? i don't think it's urban, 'cept maybe near montgomery. ... the overall alabama % were 60-39 mccain, and much more in favor of mccain in some counties, particularly those just north of birmingham/jefferson. wow, just 2 pages left in this book - what a run! finishing a journal - how cool! walnut st historic district - dark roast - three young well dressed women at the next table."}, {"type": "email", "time": "4:54PM", "place": "florence, al", "description": "to \"tom spoth\" <spoth@...> with subject \"Re: fitzy\"", "content": {"to": "\"tom spoth\" <spoth@...>", "subject": "Re: fitzy", "body": "word! you gonna be at steveos or should i try to find you? whatevs, i'll call you on the approach. w!\n--- On Mon, 11/3/08, tom spoth <spoth@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:56PM", "place": "florence, al", "description": "to \"maura j flight\" <maura@...> with subject \"Re: evidence\"", "content": {"to": "\"maura j flight\" <maura@...>", "subject": "Re: evidence", "body": "ah! you're right--she is. forgot you called that--nice work! c u soon, w, r hs\n--- On Tue, 11/4/08, maura j flight <maura@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:58PM", "place": "florence, al", "description": "to laura@... with subject \"Fw: How this happened\"", "content": {"to": "laura@...", "subject": "Fw: How this happened", "body": "ha--that's kinda fun :)\n--- On Wed, 11/5/08, Barack Obama <obama campaign@...> wrote:\n    From: Barack Obama <obama campaign@...>\n    Subject: How this happened\n    To: \"rich sanda\" <me@...>\n    Date: Wednesday, November 5, 2008, 1:54 AM\n    rich --\n    I'm about to head to Grant Park to talk to everyone gathered there, but I wanted to write to you first.\n    We just made history.\n    And I don't want you to forget how we did it.\n    You made history const PART_COLORS = ["#5b8dd9", "#3cb97a", "#e8a020", "#9b6dcc", "#e05a5a", "#2ab5a0"];
const PART_LIGHT  = ["#dce9f8", "#d4f1e4", "#fdecd2", "#ecddf7", "#fad8d8", "#cef0ea"];

// Build a flat day index
const allDays = [];
DATA.parts.forEach(p => p.days.forEach(d => allDays.push(d)));

// ── Sidebar ─────────────────────────────────────────────────────────────────
function buildSidebar(filterPart) {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  DATA.parts.forEach(p => {
    if (filterPart && p.id !== filterPart) return;
    const color = PART_COLORS[p.id - 1];

    const group = document.createElement('div');
    group.className = 'part-group';

    const header = document.createElement('div');
    header.className = 'part-group-header';
    header.innerHTML = `<span class="dot" style="background:${color}"></span>${p.title}`;
    group.appendChild(header);

    p.days.forEach(day => {
      const node = document.createElement('div');
      node.className = 'day-node';
      node.dataset.day = day.day;

      // abbreviate place range
      const place = day.place_range.replace(/, [A-Z]{2}(?= to |$)/g, '').replace(/, [A-Z]{2,3}(?= |$)/g,'');
      const dateShort = day.date.replace(/,.*/, '').replace(/^[A-Za-z]+, /, '');

      node.innerHTML = `
        <div class="day-dot" style="background:${color}"></div>
        <div class="day-node-text">
          <div class="d-num">Day ${day.day}</div>
          <div class="d-date">${day.date.replace(/^[A-Za-z]+, /, '')}</div>
          <div class="d-place">${day.place_range || '&mdash;'}</div>
        </div>`;

      node.addEventListener('click', () => showDay(day.day));
      group.appendChild(node);
    });

    sb.appendChild(group);
  });
}

// ── Part tabs ────────────────────────────────────────────────────────────────
let activeFilter = null;
function buildTabs() {
  const nav = document.getElementById('partTabs');
  const allBtn = document.createElement('button');
  allBtn.className = 'part-tab active';
  allBtn.textContent = 'All';
  allBtn.style.background = '#444';
  allBtn.addEventListener('click', () => {
    activeFilter = null;
    buildSidebar(null);
    document.querySelectorAll('.part-tab').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    showIntro();
  });
  nav.appendChild(allBtn);

  DATA.parts.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'part-tab';
    btn.textContent = `${p.id}`;
    btn.style.background = PART_COLORS[p.id-1];
    btn.title = p.title;
    btn.addEventListener('click', () => {
      activeFilter = p.id;
      buildSidebar(p.id);
      document.querySelectorAll('.part-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // show first day of part
      if (p.days.length) showDay(p.days[0].day);
    });
    nav.appendChild(btn);
  });
}

// ── Intro ────────────────────────────────────────────────────────────────────
function showIntro() {
  const main = document.getElementById('main');
  let html = `<div class="intro-pane">
    <h2>My Trip</h2>
    <div class="subtitle">72 days &middot; August 29 &ndash; November 8, 2008 &middot; 17,000+ miles</div>`;
  DATA.introduction.forEach(p => { html += `<p>${p}</p>`; });
  html += `<div class="parts-overview">`;
  DATA.parts.forEach(p => {
    const c = PART_COLORS[p.id-1];
    const l = PART_LIGHT[p.id-1];
    html += `<div class="part-card" style="background:${l};border-color:${c}" onclick="showDay(${p.days[0].day})">
      <div class="pc-title">${p.title}</div>
      <div class="pc-range">${p.time_range}</div>
      <div class="pc-range" style="margin-top:2px">${p.place_range}</div>
      <div class="pc-days">${p.days.length} days</div>
    </div>`;
  });
  html += `</div></div>`;
  main.innerHTML = html;
  setActiveNode(null);
}

// ── Day view ─────────────────────────────────────────────────────────────────
function showDay(dayNum) {
  const day = allDays.find(d => d.day === dayNum);
  if (!day) return;
  const part = DATA.parts.find(p => p.id === day.part);
  const partColor = PART_COLORS[day.part - 1];
  const partLight = PART_LIGHT[day.part - 1];
  const dayIndex  = allDays.indexOf(day);

  const main = document.getElementById('main');

  // Hero
  let html = `<div class="day-pane">
    <div class="day-hero">
      <div class="part-badge" style="background:${partColor}">${part ? part.title : ''}</div>
      <h2>Day ${day.day}</h2>
      <div class="day-meta">${day.date}</div>
      ${day.place_range ? `<div class="day-route">${day.place_range}</div>` : ''}
      <div class="day-nav">
        <button onclick="showDay(${dayNum - 1})" ${dayNum <= 1 ? 'disabled' : ''}>&#8592; Day ${dayNum - 1}</button>
        <button onclick="showDay(${dayNum + 1})" ${dayNum >= allDays.length ? 'disabled' : ''}>Day ${dayNum + 1} &#8594;</button>
      </div>
    </div>`;

  // Timeline
  if (day.timeline && day.timeline.length) {
    html += `<div class="section-heading">Timeline</div><div class="tl-list" id="tl-${dayNum}">`;
    day.timeline.forEach((e, idx) => {
      const badgeClass = ['receipt','call_out','call_in','brochure','map','journal','email'].includes(e.type) ? e.type : 'other';
      const label = e.type.replace('_',' ');
      const hasContent = (e.type === 'journal' || e.type === 'email') && e.content;
      const entryId = `tl-${dayNum}-${idx}`;

      html += `<div class="tl-entry ${e.type}${hasContent ? ' expandable' : ''}" id="${entryId}">
        <div class="tl-entry-header"${hasContent ? ` onclick="toggleEntry('${entryId}')"` : ''}>
          <span class="tl-time">${e.time || '&mdash;'}</span>
          <span class="tl-place">${e.place || ''}</span>
          <span class="tl-desc">
            <span class="tl-type-badge ${badgeClass}">${label}</span>
            ${e.description}
          </span>
        </div>`;

      if (hasContent) {
        const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const toParagraphs = s => s.split('\n').filter(l => l.trim()).map(l => `<p>${esc(l)}</p>`).join('');

        if (e.type === 'journal') {
          html += `<div class="tl-expanded" id="${entryId}-body">
            <div class="tl-journal-body">${toParagraphs(e.content)}</div>
          </div>`;
        } else if (e.type === 'email') {
          const c = e.content;
          html += `<div class="tl-expanded" id="${entryId}-body">
            ${(c.to || c.subject) ? `<div class="tl-email-meta">
              ${c.to      ? `<span class="tl-email-label">to</span><span class="tl-email-value">${esc(c.to)}</span>` : ''}
              ${c.subject ? `<span class="tl-email-label">subj</span><span class="tl-email-value">${esc(c.subject)}</span>` : ''}
            </div>` : ''}
            ${c.body ? `<div class="tl-email-body">${toParagraphs(c.body)}</div>` : ''}
          </div>`;
        }
      }

      html += `</div>`;
    });
    html += `</div>`;
  }

  // Story
  if (day.story && day.story.length) {
    html += `<div class="section-heading">Story</div><div class="story-text">`;
    day.story.forEach(p => { html += `<p>${p}</p>`; });
    html += `</div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
  setActiveNode(dayNum);

  // Scroll sidebar node into view
  const activeNode = document.querySelector(`.day-node[data-day="${dayNum}"]`);
  if (activeNode) {
    activeNode.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  main.scrollTop = 0;
}

function setActiveNode(dayNum) {
  document.querySelectorAll('.day-node').forEach(n => {
    n.classList.toggle('active', parseInt(n.dataset.day) === dayNum);
  });
}

// ── Expand/collapse journal & email ──────────────────────────────────────────
function toggleEntry(entryId) {
  const body = document.getElementById(entryId + '-body');
  const btn  = document.querySelector(`#${entryId} .tl-toggle`);
  if (!body) return;
  const open = body.classList.toggle('visible');
  if (btn) {
    btn.textContent = open ? 'collapse' : 'expand';
    btn.classList.toggle('open', open);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTabs();
buildSidebar(null);
showIntro();
</script>
