67", "description": "gas for $37.89 at country corners (hwy 2 & i-35)"}, {"type": "call_out", "time": "5:12PM", "place": "Osceola IA IA", "description": "to me for 1  minute"}, {"type": "call_out", "time": "5:28PM", "place": "Osceola IA IA", "description": "to laura for 5  minutes"}, {"type": "call_in", "time": "5:42PM", "place": "Osceola IA IA", "description": "from unavailable for 1  minute"}, {"type": "call_in", "time": "5:43PM", "place": "Osceola IA IA", "description": "from unavailable for 1  minute"}, {"type": "receipt", "time": "6:28PM", "place": "", "description": "atm withdrawal for $121.50 at monarch atm / 612-802-1222 / cs10445"}, {"type": "call_out", "time": "7:16PM", "place": "Kansas Cil MO", "description": "to laura for 2  minutes"}, {"type": "call_out", "time": "9:06PM", "place": "Kansas Cil MO", "description": "to laura for 8  minutes"}, {"type": "call_out", "time": "10:04PM", "place": "Kansas Cit MO", "description": "to laura for 3  minutes"}], "story": []}, {"day": 20, "day_of_week": "Wednesday", "date": "Wednesday, September 17", "place_range": "Kansas City, KS to Topeka, KS", "part": 2, "timeline": [{"type": "receipt", "time": "", "place": "kansas city, ks", "description": "3 bottles of bbq sauce for $11.52 at arthur bryant's barbeque (1727 brooklyn)"}, {"type": "receipt", "time": "", "place": "kansas city, ks", "description": "pulled pork and a large drink for $12.40 at arthur bryant's barbeque (1727 brooklyn)"}, {"type": "receipt", "time": "9:46AM", "place": "kansas city, ks 66103", "description": "invoice for room for $90.83 at best western inn & conference (501 south west blvd)"}, {"type": "receipt", "time": "10:09AM", "place": "kansas city, ks 66103", "description": "flat repair invoice for $22.59 at boulevard tires, inc. (722 sw boulevard)"}, {"type": "journal", "time": "~10:30AM", "place": "kansas city, mo", "description": "written at coffee girls (southwest blvd)", "content": "wed 9/17/08 coffee girls, on southwest blvd\nkansas city, mo ~10 or 11am\nalright. some night. got a flat - noticed it after the royals (mariners) game in the parking lot. put the donut on, drove downtown, walked into the marriott, asked for and received a bus map, looked at it under the lights of the park across the street, made a circuit of downtown contemplating next stops, a dearth of nightlife until i found john's on the approach to the car, stopped into the almost empty downstairs for one beer - pale ale - 2 bucks! light black dude in wife beater at the bar next to me, talking a lot w/the shyish bar tendress. black curly hair, well endowed, green shirt, thick accent, another lightish skinned minority came in, talked about the bright moon, and that it was filled yesterday, and that his mom at the hospital doesn't like working on full moon night because the incidents go up noticeably in number.\n\"comes a time\" is on the radio in here!\nleft & got in the car driving westish looking for a motel, my best option after a lot of thought, considering ... parking meters downtown, bus schedules, the airport, parking lots. slept real good, crashed until 330am w/the tv on - oh - bought smokes after arranging the room, 79 a night plus tax made 90, also, finding the motel was hard - tried using the garmin - the hilton garden inn in kc ks looked too fancy, the eagle inn wasn't there, plus that scary ride down to the tracks after getting off the wrong exit.\nlook out for my love now! sweet!\nbrought 3 beers into the motel, didn't drink them, though - forgot the knife for the waterlogged lime and jalapeno, and didn't feel like drinking the pabst. in the morning, toothpaste, coffee creamer, and directions to a tire place. just a little ways down the road to boulevard tire. great kansas accent on the attendant - fixed the tire quick. then road up the southwest boulevard towards the city - that's where i am now - i really liked the approach - lots of mexican influence, lots of restaurants, in old store fronts / maybe mixed use.\n\"lotta love\" now - it's like they're playing the \"comes a time\" album.\njogged around des moines yesterday. from the golden dome of the state house down through the east village across the river (locks?) into downtown. lots of catwalks between buildings. didn't seem too crowded for a workday afternoon. continued to the other side of downtown, past a park, looking back on the wall of buildings guarded by fire escapes, came back along the high roads, passed hy-vee hall and the arena. forgot to mention the court st district, and that one girl with big lightly tinted pink glasses at the outdoor table of a restaurant downtown. is that iowa chic?\nback in minneapolis:\n- upper mississippi regional park\n- left-righted my way towards downtown - at about 20th st (from 57th) i emerged from semi-residential to a great urban scape and a look at the nearby skyscrapers\n- crossed the river\n- found an active, reasonably nice area w/bars etc. parked, began looking for football. the papa john's employees suggested bulldog across the street - perfect - lots of tvs, rather empty but ~20 people, many w/official vikings jerseys - cute waitress w/two hairswirls, dark hair, nice accent, very st pauly girl.\nphoned back and forth w/reed. after two beers (rush river ipa, double chocolate). drove using the garmin to meet them at champps. ordered pulled pork sliders - nice bbqish dipping sauce.\nplayed ultimate in the rain.\n- 5/8 was too full; on to busters\nnatalie (from iowa), wyn, and james joined meghan reed and i\n- ordered spanish american individual pizza, surly furious beer.\n- watched football downstairs, eventually showered, checked email\n- desperately tired\n- dg at acorn park w/reed\n- dg at kaposia w/chad (buzz) and trevor, who i met there\n- out to dinner w/reed's family for meghan's b-day at mccoy's in downtown st. louis park\ndad (dan), mom (susan), sean? + christie (brother and inlaw), maron? chase (kids) reed, meghan + myself\n- watched mnf and hitchhiker's guide and wedding singer in basement\n- beat reed in ping pong 2 of 3\n- beat nick in fantasy 75-70 to improve to 1-1\n- caribou coffee on the way out - decaf ...\nother notes since winnipeg\n- grand forks radio was excited a major act was coming to their city, as opposed to the \"cities\" winnipeg and fargo\n- got pulled over at the minnesota border for having dangling things on my mirror - he asked me if i was rocking out, which only later did i realize was probably because i was singing along w/the radio and he was watching. gave me a warning\nlistened to country (92.3?) on the approach to kc - willie nelson + johnny cash, \"funny how time just slips away\"\n- the new katie perry is hot \"you're up then you're down, you're in then you're out\" \"like a girl changes clothes\"\nalso hearing a lot of jordin sparks \"hurry up and wait, so close, yet so far away\"\n- the developing dramas - missing laura, missing home, saving money, mom's general safety concerns\n5-12 days to get to austin - plenty of room for error"}, {"type": "journal", "time": "~1:00PM", "place": "kansas city, mo", "description": "written at power and light district (grand ave and 13th)", "content": "w 9/17/08 power + light district, kc, mo\ncheck out this canopied outdoor area on the inside walls of the bars for a block around - there's a public yoga class going on, people in business clothes on mats, a great big screen w/a guy introing:\nn kansas city hospital p+l yoga lunch break\nstarts in 5 min. how interesting.\nit's nice and cool in here - how pleasant. this shade tent is nice - a pretty woman is making a circuit asking standarounds if they want to do some yoga.\nthey have these awesome cushion chairs out here, outside, under the great canopy.\nsaw a cool open air bar (open windows) on a corner on the walk up here. big dude w long gray moustache and shaved head among others, eating and drinking.\nthis is probably an awesome place to go at night if you're well dressed and clean. the walls to this enclosure are made out of nice bars, and everything looks so new + pristine.\nthere's a bowling alley over there called \"lucky strike.\"\neven if i don't go bowling or do yoga, this sure beats work. also, stepping out of life is a great way to get perspective on it. as expected, i'm starting to see laura and friends and the house and the homeland not as the persistent backdrop, but as a scene i want very much to get in on. def good to do this once. before starting, i had been wondering if 2, 3, 5, 10 weeks was enough. it is.\njohn powell, president of the kc p+l district talking on the stage now.\n- para sympathetic nervous system for digesting + resting\nas opposed to the other nervous system for fight or flight"}, {"type": "email", "time": "1:47PM", "place": "kansas city, mo", "description": "to laura@... with subject \"financial turmoi1!\"", "content": {"to": "laura@...", "subject": "financial turmoi1!", "body": "hooray! :)\ngot my wheel patched this morning, guess i ran over a screw. that could have been a lot worse! having fun in kansas city, at the library now. watched an outdoor public \"yoga lunch\" downtown today--all these boys and girls in business casual doing the yoga w/a woman on an outdoor stage and close captioned tv giving the class. fun to watch, and relaxing. had coffee, walked around, eventually found this place. read about some of the neighborhoods and bars in one of those free magazines--will probably try to visit one or two tonight. thinking about swinging by lawrence, kansas, too, which is nearby and got a mention in the magazine under \"10 bars worth making the trip for.\" maybe it's like the waltham of kc or something?\nword, love and miss you baby, til when, rich s"}}, {"type": "journal", "time": "~2:00PM", "place": "kansas city, mo", "description": "written at hotel savoy (219 West 9th Street)", "content": "hotel savoy - \"where's the library?\""}, {"type": "journal", "time": "~4:30PM", "place": "kansas city, mo", "description": "written at ave of the americas (ave of the americas)", "content": "grand ave of the americas - flags\ntrain viewing porch - homeless hangout\ndoes every city have a union station?\n~430pm\ncheck it out - there's a little grill on a pole in this city park overlooking the train tracks to the building w/the odd shape and the old school western auto sign on the roof. just smoked my second duke of the day in this park by the rock + cement wall, 5th or so overall. think i'm going to head off to lawrence and bar hop there on massachusetts st. i've gotten enough kansas city flavor, from southwest blvd to downtown, library, crown center, arthur bryant's near 18th and vine - jazz district to 31st and troost to crossroad arts to the intertwined highway, and rail structures to the parks south of downtown to power + lights."}, {"type": "call_out", "time": "6:14PM", "place": "Lawrence KS", "description": "to laura for 2  minutes"}, {"type": "call_out", "time": "7:40PM", "place": "Lawrence KS", "description": "to laura for 2  minutes"}, {"type": "call_in", "time": "7:59PM", "place": "Lawrence KS", "description": "from laura for 48  minutes"}, {"type": "journal", "time": "~11:45PM", "place": "lawrence, ks", "description": "written at a coffeeshop (off massachusetts st)", "content": "9 17 08 ~1145pm at some coffeeshop underneath some bar playing live music, lawrence, ks\njust fixed up my car, prepared it for sleeping - just flip the seat, unroll the mats and blankets, put the pillowstand in place, raise the orange curtains. ... didnt really meet anyone tonight, but that's ok - some good experiences, and def felt the vibe. just passed two kids while standing in front of the second story jazz place - sounded like a folk girl to me. \"you listening to jazz?\" the kid shook my hand good, and asked if i smoked. couple awkward sentences to clarify he meant weed, not cigarettes. i said no. he told me to make sure i said hi to him next time i saw him - said i'd recognize him by the ... hat (all black) and the... .... oh - he also asked if i was part of the homeless crew. again, no. shortly after, on the other side of the street, passed three people sitting on the sidewalk underneath the canopy for a copy place - might have been kinkos. a woman, a man, and a native american man. she asked for change - i dug into my pockets - i was up for anything. i gave her 11 cents, then anaother penny, then a quarter. she was appreciative.\n\"damn it, that was a good song once!\" the guy outside just yelled, presumably to the upstairs cover band, predominantly acoustic guitar.\nthe guy reached into his pocket and pulled out a wad of bills showing a 20 - he started to say \"for being so nice... nobody else talks to us...\" i asked them how their night was going - he was gonna give me money - i was nowhere near gonna accept, but she started climbing on him saying \"no!\" it was funny - she stood up and gave me a big hug and a kiss - i felt like, w/that kind of kharma, sleeping in my car tonight would go just fine.\nthis place is kinda wack.\nthis coffee shop is open til two. the kid working the counter seems too pure, innocent, and confident to belong here. buck thirty four for a medium coffee, in a ceramic. watched some design show then most of an episode of project runway at the only bar i went to twice, the \"saloon and music hall,\" the second time i went in there. cute older (young 30 something?) blonde working... she knew the only other 2 then 5 or so patrons. the girl from the first time came in later, a zowie dechanel lookalike, this time wearing more clothes than the first time, a black sweatshirt zip up kind of thing.\n\"bill is such a dork\" the counter guy just said to the girl at the table next to me. they're now arguing about the shirt one of them is wearing, it belongs to the other. his name is justin, and she's not serious, so she says.\nupstairs they're playing \"under the bridge.\"\ni keep thinking of matt bowen and what kind of a college kid he was.\nit wasn't the kid from behind the counter - it was another guy, sitting w/her now.\nneil young w/death cab nov 4 at the sprint center in kc - saw it one place - maybe a sprint center tv outside? then again on a rotating billboard overlooking the south of downtown kc. kc must love their neil!\nmy book is almost half way done! no doubt i'll slow down while i'm w/laura, right?\nyou can buy cigarettes in here! how weird.\ntonight's been a little slow, says counter boy to the kid buying two packs of parliments.\nthe boy and the girl at the next table are studying! is that what college kids do?\nthere was a block party w/half barrel grills at a church across from a community center on 11th (i think) between vermont (one west of mass) and kentucky earlier.\nmade a deposit to another park public restroom a few hours ago.\nto topeka?"}], "story": []}, {"day": 21, "day_of_week": "Thursday", "date": "Thursday, September 18", "place_range": "Topeka, KS to Tulsa, OK", "part": 2, "timeline": [{"type": "receipt", "time": "", "place": "", "description": "novelty pad of paper for $5.26"}, {"type": "journal", "time": "~6:15AM", "place": "topeka, ks", "description": "written at perkins (1720 Southwest Wanamaker Road)", "content": "9 18 08 th perkins, sw end of topeka\n\"shut your eyes and sing to me\" love that beginning. the dishwasher shut off just in time to make it ring clear.\nslept in a hospital lot near downtown - think it may also have been a business complex or a residence - old, heavier white haired guy came by in a tan suv this morning at about 530 - my car was already on at that point - to say he let me sleep here tonight, but people are starting to come in, so he's gonna have to ask me to leave.\noh, what to do today? stick around this town? check out downtown in the middle of a workday? see what brown vs board means? saw a sign for it... adam duritz on now, i think. \"think about...\" x 3 sentences - kinda like it. \"anything you can\" finishes the first line.\nthis town is spread out. and gridded. w/some hills - caught a good look of the lights across town including the capitol building from the license plates from a residential neighborhood driving around this morning. i'm outside 470 now, which i think is kinda far from downtown. once again, the outskirts, far from downtown, proves to be the place where my kind of action is at, for sleeping and eating - huge parking lots, well lit, shopping centers, and americana strip malls. eventually i'll learn that 1 main st, or 1 1st st in this case, isn't the best destination, though i suppose it provides an opening position.\nmushroom and pepper jack omelette, breakfast potatoes, grilled english muffin!\nthe air was making the noise, not the dishwasher.\n\"hi amy, how you doing today? still with us, i see.\" laughter ensues."}, {"type": "receipt", "time": "7:00AM", "place": "topeka, ks", "description": "gas for $29.72 at I-70 BP (1000 wannamaker)"}, {"type": "journal", "time": "~8:00AM", "place": "topeka, ks to wichita, ks", "description": "written at the kansas turnpike (topeka to wichita)", "content": "winfield, ks\nkeyn wichita\n- paul mauriat - love is blue\n- feeling stronger every day - chicago\n- spiral staircase\n- lion sleeps tonight\n- color my world\n- cherokee people - paul revere\n- elanor - turtles\n- classical gas\nbest station yet!\nalso heard megalomaniac earlier today\nhemhorrage - fuel"}, {"type": "receipt", "time": "8:42AM", "place": "", "description": "turnpike toll for $4.25 at kansas turnpike authority"}, {"type": "journal", "time": "~9:15AM", "place": "wichita, ks", "description": "written at a bench (douglas and main)", "content": "th 9 18 08 on a bench near douglas + main, wichita, ks\n\"technology and innovation... that's what it's all about\" some tour given by business folk to kids, some looked asian\nthis place is dismal. am i in america?\nbroadway in from the north. about 20 mexican restaurants - hard to tell which ones were still in operation\ncolorless grass, fog bays, flint hills, oil wells, the smell.\npowerlines down the right side of broadway, lightposts strung together by 1 wire in front of train tracks on the left, w/big train / storage / industrial structure off to the left in the distance. no warmth here - no flashy mixed use in the downtown. ..."}, {"type": "receipt", "time": "9:43AM", "place": "wichita, ks", "description": "coffee for $1.59 at creative catering (3238 e douglas)"}, {"type": "call_out", "time": "10:49AM", "place": "WichitaKS", "description": "to laura for 4  minutes"}, {"type": "receipt", "time": "3:31PM", "place": "pawhuska, ok 74056", "description": "gas for $25.54 at kum & go (e 210 main st)"}, {"type": "call_out", "time": "4:42PM", "place": "Sand Sprin OK", "description": "to 918-406-**** for 1  minute"}, {"type": "call_out", "time": "4:44PM", "place": "Sand Sprin OK", "description": "to 918-247-**** for 3  minutes"}, {"type": "call_out", "time": "5:24PM", "place": "Kellyvile OK", "description": "to 918-247-**** for 5  minutes"}, {"type": "receipt", "time": "5:44PM", "place": "kellyville, ok 74039", "description": "camping for $14.00 at heyburn park (ok) (27349 w heyburn lake road)"}, {"type": "receipt", "time": "7:45PM", "place": "", "description": "15pk gatorade / ice / cheese / cottage cheese for $17.19 at walmart / st# 0838"}, {"type": "call_in", "time": "7:53PM", "place": "Sand Sprin OK", "description": "from laura for 4  minutes"}], "story": []}, {"day": 22, "day_of_week": "Friday", "date": "Friday, September 19", "place_range": "Tulsa, OK to Oklahoma City, OK", "part": 2, "timeline": [{"type": "call_out", "time": "8:35AM", "place": "Kellyville OK", "description": "to voice mail for 1  minute"}, {"type": "journal", "time": "~9:45AM", "place": "tulsa, ok", "description": "written at starbucks (100 e 2nd st)", "content": "f 9/19/08 starbucks near 3rd st, downtown tulsa, ok\njust got help/stories from the girls behind the counter on how to ride the bus - 1.25. just read on the info plaque the rationale for the street names.\nthe rest of wichita turned out ok. old town. douglass design district. creative catering and cafe. eastborough. towne east square. kansas gift store by sophie and me. the air capitol. mcconnell afb. boeing, spirit(?) aerosystems. then meandering across farms, wildlife preserve, fields, rivers to winfield, where i walked around town, into the bookstore to ask about the music festival, then to the fairgrounds, passing the yard sale to fund a religious trip to alaska then waiting for the train, saw the festival, walked back via the museum, spoke a bit w/the attendant, then back to the main strip where i smoked my last duke.\nthen route 11 winding me all through ne ok, then 99 for more of the same, eventually called the campground from walmart near sand springs. supulpa."}, {"type": "journal", "time": "~10:30AM", "place": "tulsa, ok", "description": "written at bus stop (cincinnati and 6th)", "content": "sitting at a bus stop now, on cincinnati near 6th. first one that comes by!\ncame in on the southwest rd - super strip out by the city limits - thta combined w/high vantage points made me feel i was viewing a 2d visual index of american business.\n..."}, {"type": "email", "time": "12:05PM", "place": "tulsa, ok", "description": "to \"Stephen O'Keefe\" <steveo@...> with subject \"Re: Fwd: ITA Software\"", "content": {"to": "\"Stephen O'Keefe\" <steveo@...>", "subject": "Re: Fwd: ITA Software", "body": "awesome! i know the answer to the last one ;)\ni'm in a library a couple miles east of downtown tulsa, oklahoma. just took a bus from downtown to a random location and now i'm walking back, happened to pass this place.\nword!\nrich s\n--- On Fri, 9/19/08, Stephen O'Keefe <steveo@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "12:52PM", "place": "tulsa, ok", "description": "to the narrow channels@..., laura@... with subject \"i can't believe it's only been a week (not even) since last time...\"", "content": {"to": "the narrow channels@..., laura@...", "subject": "i can't believe it's only been a week (not even) since last time...", "body": "winnipeg, mb - walked and ran all over town, through residential, financial, and mixed use neighborhoods, including st bonaface, the french part of town - got pumpkin soup at an australian place in osbourne village and asked where the bar tender and a patron where to go for nightlife - saw \"we are wolves\" and \"sleepercar\" at royal albert arms, made friends with some regulars - carol, jackie and peter, and jay, and larry - played pool, went back to osbourne village to the toad in the hole to give a shout out to the patron-turned-bartender who had told me where to go for fun earlier\ngrand forks, nd - walked through a residential neighborhood and through columbia mall (a regular old mall) while getting an oil change, then walked downtown through light rain, across the red river to east grand forks, mn - came back, watched part of a small music festival put on by a local pizza place from outside under a tree for a minute\nfargo, nd - talked to my mom and laura from benches downtown, watched trains roll through the center of town - took coffee at babb's coffee house, a round of about 5 people playing jazz on guitars 2 at a time - asked the waitress at dinner where to see live music tonight, she said dempsey's, the place with all the people smoking out front - went to dempsey's, quiet at first, watched the twins on tv, the scene developed around me, eventually got into a couple good conversations with patrons and help, then saw some agressive folk guy w/a guitar play, then \"the hot button,\" man were they good - was horrified at the carbon copy houses in one neighborhood i chanced through in the morning\nminneapolis/st paul, mn - jogged through brooklyn village neighborhood to the upper mississippi regional park, dipped my hand in the river, weaved my way downtown by car, across the river to the northeast neighborhood to find a place to watch football, found bulldog, nice place with many big tvs, audio, and a crowd but not crowded, some wearing official vikings jerseys - watched part of the game there, then moved to champps, where reed and meghan told me by phone that they were - played ultimate in the rain, went out after the game w/their friends natalie, wyn, and james - went back to reed and meghan's house in st louis park, watched football, took er easy, stayed the night - played disc golf w/reed the next day on his lunchbreak, then went to another disc golf park and played with two people i met there, chad and trevor - went out to mccoys in downtown st louis park for dinner w/reed's family for meghan's birthday - watched mnf - beat reed in ping pong\n2 of 3 - stayed another night\ndes moines, ia - ran from the capitol building on the higher ground in the east through the east village to across the river to downtown, then back - ate a burger in the east village at a place w/music at night apparently but empty in the afternoon\nkansas city, mo/ks - went straight to the royals game, watched them beat up on the mariners, retro-price night, $3 for upper deck seats (though i paid $5 after working a deal w/two girls and a scalper to get out of the long line) - changed a flat in the parking lot, went downtown for one drink, walked around, found a motel for the night after getting mixed up in some train track neighborhoods southwest of the city - fixed the tire in the morning, got coffee on the southwest boulevard, walked to and around downtown a lot, watched a public yoga class in the power and light district - went to arthur bryant's for barbeque, the same one valerie and i had been to on a business trip three years ago - left at rush hour for lawrence\nlawrence, ks - bar hopped on massachusetts st, watched it change from a family place by day to a college and revelry strip by night - watched k state/louisville in some bars, the twins in less of them, and project runway in another - talked to laura in a bar - interacted with the homeless - listened to live music emanating from more than one second story window - got coffee late\ntopeka, ks - drove around a lot under cover of darkness, slept in a hospital parking lot, talked to the security guard early in the morning - had breakfast at perkins\nwichita, ks - approached town on broadway from the north, powerlines on the right, light posts and traintracks on the left, all meeting at a point in the distance - walked around downtown and in old town, drove east via douglas design district, where i took coffee, continued east to eastborough and stopped into the towne east mall, left on backroads to the south, via the boeing factory and mcconnell air force base where i had been 14 years ago while at the air force academy\nwinfield, ks - walked up and down main st, asked the locals about the bluegrass music festival in the area, walked by the festival at the fairgrounds to see a great big parking lot and partially full stands along the horse ring, went by a small museum containing small town history stuff, spoke with the attendant a bit about the town, set off across the backroads into oklahoma\ntulsa, ok - stayed in a nearby campground, swam a bit, approached town on historic route 66, walked around downtown, through the brady and blue dome districts, and by osu campus, rode the bus to an arbitrary location, found this library on the walk back\ntonight it's on to oklahoma city for some nightlife, then on to austin, where i'm scheming to find a single place to stay for two weeks, maybe even in a rooming apartment\n?\n!"}}, {"type": "email", "time": "12:53PM", "place": "tulsa, ok", "description": "to bug@... with subject \"Re: throwin' it out there\"", "content": {"to": "bug@...", "subject": "Re: throwin' it out there", "body": "yeah, i don't think so... moss is obviously good, but obviously less attractive without the very physically attractive tom brady. though i am kinda sour on addai :(\nwhateva!\n--- On Tue, 9/16/08, Michael Bugbee <bug@...> wrote:\n [omitting quoted text]"}}, {"type": "receipt", "time": "12:59PM", "place": "tulsa, ok 74120", "description": "black bean and corn salsa for $7.05 at lyon's indian store & tulsa treasures (401 e 11th)"}, {"type": "receipt", "time": "3:29PM", "place": "oklahoma city, ok", "description": "gas for $31.86 at love's #205"}, {"type": "receipt", "time": "3:58PM", "place": "oklahoma city, ok73083", "description": "atm withdrawal for $102.95 at loves (i-35/i-44 @ 122nd st)"}, {"type": "receipt", "time": "3:59PM", "place": "", "description": "ice for $3.01 at love's travel stops store #205"}, {"type": "call_out", "time": "6:31PM", "place": "OklahomalA OK", "description": "to me for 1  minute"}, {"type": "call_out", "time": "6:36PM", "place": "OklahomalA OK", "description": "to laura for 2  minutes"}, {"type": "call_out", "time": "7:31PM", "place": "OklahomalA OK", "description": "to laura for 8  minutes"}, {"type": "call_out", "time": "8:46PM", "place": "OklahomalA OK", "description": "to spoth for 9  minutes"}], "story": []}, {"day": 23, "day_of_week": "Saturday", "date": "Saturday, September 20", "place_range": "Oklahoma City, OK to Grand Prairie, TX", "part": 2, "timeline": [{"type": "receipt", "time": "", "place": "arlington, tx", "description": "gas for $38.09 at on the go #4072 (4420 green oals bl)"}, {"type": "receipt", "time": "5:33AM", "place": "newcastle, ok 73070", "description": "20oZ coffee for $1.41 at love's travel stops & country stores / store #260 (i-35 & hwy 9 west)"}, {"type": "journal", "time": "~6:00AM", "place": "ardmore, ok", "description": "written at prairie kitchen (102 Holiday Drive)", "content": "sat 9 20 08 prairie kitchen, ardmore, ok\nhey, this place is alright - looks like there are only 3 locations : ardmore, ada, and norman. check out the accents on the customers - real country. also, country music playing. just ordered the chili cheese omelette.\nwhat a night. best yet, arguably. first, the last bits about tulsa - took that bus, went through the bus exchange downtown, boy, was i wrong about which direction the bus was headed - it looped around and headed north via that g st i didn't take and through osu campus to a housing development. mostly black folks on the bus, including a couple cute girls. stopped at a housing development, picked up a few more, mostly black and older - two guys talking - one w/ dreds - great accents - one guy on the cell w/his friend i guess, arguing, looking to get picked up, saying he'd pay for gas, \"fi dallah!\" said he was shopping for his sister at save a lot, crossed peoria, watched the city named streets ascend, stopped at a health center - girls get off there, i followed the older guys off the bus at the shopping plazas, went to the library on the way back, meter down to 4: something, drove away to okc.\nthe short version of okc is: stopped at information, very helpful, directed me to the state fair and bricktown, went to the fair - ...walked around, saw rides, food vendors, and goats! got a chopped brisket sandwich, ate it by the music tent, folky girl singing, was addressed as \"partner\" by the guy w/his wife who wanted to know what i was eating - his wife seemed amused that he was forward enough to ask, went in the tent, carter sampson, see writing on wine list - went to bricktown, into maker's, the cigar bar info lady had suggested... ok, this was supposed to be the short version... mike the bar tender, george the old patron buying everybody drinks - mike pointed me at western ave - cock o the walk, then vzd's, overheard the help trying to get to karaoke, offered a ride, had a lot of fun at don quixote's talking to him about music, almost went to his friend's house for an after party - mike, becky, and blaine - skynyrd (don't ask?) - ballroom blitz, and highway star - ozzy w/black sabbath, the melvins, sweet child in time\nmaker's - hi fiving about being republican - do you \"doubt my work ethic?\" the girl asked a couple times. piano - older lady - did somewhere over the rainbow. george - what a loser - \"are you gay?!\" \"no\" \"good.\" \"are you getting any pussy?\" plus, he was flirting so hard as i was leaving i didn't even interrupt him to say \"thanks for the drink.\"\nthis place is so cowboy! lots of pickups in the lot, too. and a front porch where an older crowd is taking coffee. this town had the \"airplane effect\" coming in before dawn - the lights from a high vantage point a few miles out was cool - then i heard croce's \"moving me down the highway\" (or \"ive got a name\")\nmike the bartender turned out to be really cool - he went to acl in '04, saw jack johnson and wilco - said hotel yankee foxtrot from 91 or so was the quintessential album. he told me about vzd's, and a \"hole in the wall kind of place cock o the walk.\" it was the hideaway / 7th ave pub of okc. i loved it. 30 something girl bartending, kinda like darlene from roseanne - very plainly dressed, ondulado hair, nice line across her cheek, like i have i think. played 1 game of pool against the guy who was sitting next to me - they were throwing coasters at each other and some friendly slightly more dressed up friends / patron girls playing pool."}, {"type": "call_out", "time": "9:03AM", "place": "Lewisville TX", "description": "to 972-647-**** for 2  minutes"}, {"type": "receipt", "time": "9:43AM", "place": "grand prairie, tx 75052", "description": "two nights of camping for $48.00 at trader's villiage gp (2602 mayfield rd)"}, {"type": "call_out", "time": "10:01AM", "place": "Grand Prai TX", "description": "to dad for 15  minutes"}, {"type": "receipt", "time": "2:43PM", "place": "arlington, tx", "description": "#5 chicken ranch for $6.47 at ninfa's express @ parks mall (3811 s cooper st)"}, {"type": "call_out", "time": "7:00PM", "place": "Fort Worth TX", "description": "to laura for 3  minutes"}, {"type": "call_in", "time": "8:33PM", "place": "Grand Prai TX", "description": "from laura for 2  minutes"}], "story": []}, {"day": 24, "day_of_week": "Sunday", "date": "Sunday, September 21", "place_range": "Grand Prairie, TX", "part": 2, "timeline": [{"type": "journal", "time": "~11:00AM", "place": "grand prairie, tx", "description": "written at trader's village rv park (2602 E Mayfield Rd)", "content": "sun 9/21/08 the laundry room at trader's villiage rv park, grand prairie, tx\nit's hot in here. there are fans, on the ceiling, but no ac. had a down day yesterday. was missing laura pretty bad yesterday - told her that on the phone from the fort worth downtown. drinking orange gatorade. have been a lot lately since buying a 15-pack at walmart in sand springs, i believe.\nthings i forgot to mention about tulsa - the white gray skyline was unexpected - it was a hazy morning - no clouds - just a gray/white look to everything, tending only slightly towards periwinkle blue. also, on my walk back to downtown, had a homeless type - long beard and drunk smell - say \"hey brother.\" also, didn't find out tulsa was the old oil capital of the world until reading the back of the books in the tulsa treasures gift store - i had been wondering how it got so tall. something about an oil convention from 1905-1979, something about 7 decades. plus i tried a little to follow route 66 signs downtown while walking. and drove by the boston st church on the way out.\nslowing down combined w/guilty feelings i think for leaving oklahoma city and ditching tim (t-bone) had me pretty down by the afternoon. i slept in the tent, or at least rested, for about an hour after i set it up, sweating a lot in my smoked outfit (rock star jeans, brown gap t shirt, yellow 3-button shortsleeve), then eventually got up, took a shower, and walked through the trader's villiage. goodness, what a find! a 160-acre flea market, over 3500 vendors, according to the literature. that's half a mile down each side by some quick calculation. felt like it, too - enormous. as telling about the local culture as the oklahoma state fair, maybe more. tons of mexican influence. lots of latino music, t shirts, posters (including selena), cds, tapes, etc. strong black culture here, too, and old school whites. wonder what the racial climate is... does everybody just get along?\n- tim had long, sharp sideburns, bald on top, overgrown beard, mostly black, though w/some gray he joked while disclosing he was almost 40 (didn't look it). drank miller lites w/a shot of tequila all night, and fast. reminded me of raffa - not afraid to betray his uncoolness for the sake of telling it like it is. had square teeth. really seemed like he wanted me to come over to mike's for whiskey and punk rock documentaries. maybe i can swing back by vzd's on my way home. becky had double braids. mike had short black hair. mike and tim agreed hi lo was the best bar - the gay bar that the straights took over, apparently.\nmore about oklahoma city:\n- the super grid\n- indian bartender at vzds, young help w/black bowl cut, strange dude sat next to me to express distrust of the govt and say the quesadillas were the best food (tim later told me the burgers were) - i thought the nachos were great - jalapenos, no sc or olives\n- one girl did a good \"i will always love you\" at karaoke\n- don quixote's parking was like old shopping plaza parking in a residential neighborhood\n- tried for 1 min to sleep at a hospital south of the city, then moved to a shopping plaza parking lot, met alan jackson, looking for money or a ride to either oklahoma city or 24th st (which was not far away at all)\n- nice approach to the state house in okc\n- overheard some guy in maker's saying he lost a quarter of a million this week\noh yeah, the wall street! i've been loving the news about the collapse of wall st....\n- watched closed caption political shows in vzds, mostly left-leaning. some girl named rachel, some liberal guy - olberman, maybe? the sarah palin witch hunt stuff, plus her lying about special olympics stuff.\n- walked a long way looking for vzds before asking at a restaurant and turning around\n- moved a lot of stuff haphazardly to the back to make room for tim\n- tim said the girl style around here was \"trashy\" when i said it was interesting to see the different styles they had\n- referred to the other bars on western ave as the places the pretty people went - earlier it had just been \"i don't really go in there\"\n...\n- mike was about the biggest rock star around\n- tim supervised the weird kid\n- the weird kid was psyched to get free meals + drinks + shows w/his job, saying that made it a pretty good job\n- tim asked almost immediately what i did, i just said i was traveling, nothing about programming.\n- never again will the world be able to say markets work best w/o government intervention\n[drawing]\n1t: rescue plan\n420b: iraq war\n49.2m: education\ngraphic on the fort worth newspaper\nthat tells it all.\nfort worth yesterday:\n- walked a lot\n- tried to go down the bridge, but the stairs under it were a dead end\n- went into the display in the old fire house to read about fort worth history\n- almost went onto patio w/live music - saw some from the sidewalk\n- drove through stockyards after\n- drove through oil tanks and that biker hive warehouse thing\nfootball today! as soon as my dryer is done."}, {"type": "call_out", "time": "12:01PM", "place": "Arlington TX", "description": "to bill t for 4  minutes"}, {"type": "call_out", "time": "12:10PM", "place": "Arlington TX", "description": "to bill t for 2  minutes"}, {"type": "receipt", "time": "5:30PM", "place": "arlington, tx 76010", "description": "cajun popcorn - 3 big red pint - rio grande burger - coffee for $28.81 at humperdink's (700 six flags dr)"}, {"type": "receipt", "time": "5:31PM", "place": "arlington, tx 76010", "description": "food and beer for $28.81 at humperdinks arlington #5 (700 six flags dr)"}, {"type": "call_out", "time": "6:23PM", "place": "Arlington TX", "description": "to bill t for 13  minutes"}, {"type": "call_out", "time": "6:38PM", "place": "Arlington TX", "description": "to laura for 19  minutes"}, {"type": "receipt", "time": "8:20PM", "place": "", "description": "for $6.49 at chili's - knox 363"}, {"type": "receipt", "time": "8:39PM", "place": "dallas, tx 75204", "description": "atm withdrawal for $103.00 at breadwinners (3301 mckinney ave)"}], "story": []}, {"day": 25, "day_of_week": "Monday", "date": "Monday, September 22", "place_range": "Grand Prairie, TX to Austin, TX", "part": 2, "timeline": [{"type": "receipt", "time": "11:16AM", "place": "", "description": "wraps, pepper jack, ice for $7.33 at walmart / st# 5416"}, {"type": "receipt", "time": "11:34AM", "place": "arlington, tx 76011", "description": "grande coffee for $2.00 at barnes & noble booksellers (934 east copeland rd)"}, {"type": "journal", "time": "~3:00PM", "place": "austin, tx", "description": "written at a gas station (guadalupe st and martin luther king jr blvd)", "content": "icc ...\ncollege housing\nhostelling international\nmain office 1906 pearl st austin 78705 ...\nopsis coop 1906 \" \"\npearl st coop \" \"\ntaos coop 2612 guadalupe ...\n2200 s lakeshore blvd 78741 ...\n512"}, {"type": "email", "time": "4:03PM", "place": "austin, tx", "description": "to \"JonTom Kittredge\" <ita@...> with subject \"Re: [Fwd: xml parsing/generation code reuse]\"", "content": {"to": "\"JonTom Kittredge\" <ita@...>", "subject": "Re: [Fwd: xml parsing/generation code reuse]", "body": "...\ni posted some notes on the first part of my trip on our band's myspace blog at:\nwww.myspace.com/thenarrowchannels\nsee the posting titled \"the first two weeks\" on the right side of the page under the music player. i'll probably post the next installment there shortly.\nhope things are going well!\nrich\n--- On Mon, 9/22/08, JonTom Kittredge <ita@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:28PM", "place": "austin, tx", "description": "to the narrow channels@..., laura@..., mom and dad@..., bill t@... with subject \"part 2: winnipeg to austin\"", "content": {"to": "the narrow channels@..., laura@..., mom and dad@..., bill t@...", "subject": "part 2: winnipeg to austin", "body": "http://blog.myspace.com/index.cfm?fuseaction=blog.view&friendID=325929131&blogID=435167699"}}, {"type": "call_out", "time": "4:53PM", "place": "Austin TX", "description": "to rodney for 22  minutes"}, {"type": "call_out", "time": "5:47PM", "place": "Austin TX", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "6:23PM", "place": "Austin TX", "description": "to 512-444-**** for 2  minutes"}, {"type": "call_out", "time": "6:25PM", "place": "Austin TX", "description": "to 512-476-**** for 1  minute"}, {"type": "call_out", "time": "6:32PM", "place": "Austin TX", "description": "to 512-321-**** for 1  minute"}, {"type": "call_out", "time": "6:33PM", "place": "Austin TX", "description": "to 877-321-**** for 2  minutes"}, {"type": "call_out", "time": "6:43PM", "place": "Austin TX", "description": "to spoth for 2  minutes"}, {"type": "call_out", "time": "6:46PM", "place": "Austin TX", "description": "to spoth for 2  minutes"}, {"type": "call_out", "time": "6:48PM", "place": "Austin TX", "description": "to 512-444-**** for 2  minutes"}, {"type": "call_out", "time": "6:55PM", "place": "Austin TX", "description": "to 512-444-**** for 4  minutes"}, {"type": "call_in", "time": "9:02PM", "place": "Austin TX", "description": "from laura for 21  minutes"}], "story": []}]}, {"id": 3, "title": "Austin and Points South", "time_range": "September 23 - October 2, 2008", "place_range": "Austin, TX", "days": [{"day": 26, "day_of_week": "Tuesday", "date": "Tuesday, September 23", "place_range": "Austin, TX", "part": 3, "timeline": [{"type": "journal", "time": "~6:00AM", "place": "austin, tx", "description": "written at kerby lane cafe (guadalupe st)", "content": "tu 9/23/08 kerbey lane cafe on guadalupe st, austin, tx\n\"promised you a miracle\" just came on the radio. cool. what a night. eating migas tacos now. remember blue star? that was my place. remember when nico heavy diaz taught me what a quesadilla is? life! i hope they don't try to kick me out of here now that i'm done eating. it's pretty empty, but it could pick up soon - almost 6am.\ntranscribed from my napkin from last night:\n- the hole in the wall (the bread plays tuesday)\n- little woodrow's\n- friends (blues 3-piece)\n- thisty nickel (worcester girlfriend)\n\"suzie q\"\nrock 3-piece\ndrawing beck\n- stewart mann and the statesboro review\n@ chuggin' monkey\ni guess that was a good look at austin, even though i woke up at 430 in my car in its street spot feeling disgusting. detox day? hopefully. maybe i'll go to emo's. maybe i'll order cokes all night. maybe i'll spend time in the library today. organizing my notes. surfing the web! hopefully my license number still works. this town has one of if not the best library internet deals around - no blocks, 2 hours! i think... just 1 at a time, though, it seems. ooh, how maddening was that hostel girl on the phone yesterday? \"rio\" just came on. remember when i first heard this song, in my housing in hawaii. talked to rodney yesterday. ... sounds like he's experimenting w/the octopad - cool! nov 5 is so far away. \"it's long enough\" we joked and laughed over, referring to the length of my vacation. gaining the perspective - that's what it's all about. i'm full, and i didn't eat all that much for breakfast. gotta be that expensive late night pizza. is this... oh, it's vienna. nice 80s stuff in here. won my fantasy game against patrick, 88-70, even though i left roddy white's 21 points on the bench, opting instead for 2 from bryant johnson. justin's won the first 3 o'keefe's - that bastard. he's using warner! i want him! it's tuesday. on friday it will have been four weeks. quite an adventure. so i should go to the library w/some pieces of paper and spread out my notes and tell the story in terms of 5 top 20 lists - that's 100 entries - i can probably have at least one from each day. oh, some other things i wanted to talk about:\n- sunsets and sunrises - best sunset - tulsa, or sand springs, on the way to walmart the night i stayed in the campground, off to the left as i drove north. sophisticated clouds, lots of pinks. 2 texas sunsets have been impossibly orange orbs in otherwise empty skies, also very nice, in my rearview mirror. 35 e + w in minn and dallas. more wedding photos - first in winnipeg then in fort worth. the mural in bricktown in oklahoma city, giving the answer to the question about the arctic watershed in the continental us. what was my other example... ? oh yeah - i wondered if okc would get a bigger skyscraper, and mike at makers, unsolicited, told me they were planning a 55-story building, tallest west of the mississippi. my book is 2/3 done - rediculous. i better start writing smaller. watched favre not be able to come back last night, jets v chargers. blond waitress w/shaved head up the back but longer hair off to one side styled - kinda cute, seemed nice, very scrawny. girl w/the dark hair, she was astoundingly beautiful (nice jawline). so i got the hostel today through friday, then sat and sun night. spoth will be here thursday. that's good. i could use a familiar face. the last song i saw stewart mann play was \"she never mentions the word addiction...\" the black crowes song. they were good. the lanky singer in his western shirt and engineer cap. andro drummer. heavier bassist, somewhat wild black hair. 2 guitarists. at the previous place, the young-looking, moptop singer guitarist."}, {"type": "receipt", "time": "8:21AM", "place": "austin, tx 78705", "description": "grande coffee for $2.00 at starbucks coffee company (38th and guadalupe)"}, {"type": "receipt", "time": "9:41AM", "place": "austin, tx 78741", "description": "for $65.55 at swtc (2200 south lakeshore blvd)"}, {"type": "email", "time": "10:56AM", "place": "austin, tx", "description": "to \"JonTom Kittredge\" <ita@...> with subject \"Re: [Fwd: xml parsing/generation code reuse]\"", "content": {"to": "\"JonTom Kittredge\" <ita@...>", "subject": "Re: [Fwd: xml parsing/generation code reuse]", "body": "...\ncool that you forwarded the link!\ni should be on every other day or so, so keep me in the loop if you have any other questions or ideas!\nrich\n--- On Mon, 9/22/08, JonTom Kittredge <ita@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "10:58AM", "place": "austin, tx", "description": "to \"tom spoth\" <spoth@...>, \"Stephen O'Keefe\" <steveo@...> with subject \"Re: [bbjones] part 2: winnipeg to austin\"", "content": {"to": "\"tom spoth\" <spoth@...>, \"Stephen O'Keefe\" <steveo@...>", "subject": "Re: [bbjones] part 2: winnipeg to austin", "body": "ha! i spent last night at little woodrow's watching mnf, and i almost asked why they had a red sox banner in there! thanks for the other suggestions--i might get lunch at gueros--i just walked past it. also, lance armstrong is a loser i just found out.\nw, r hs\n--- On Mon, 9/22/08, Stephen O'Keefe <steveo@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "11:04AM", "place": "austin, tx", "description": "to \"Sara Cohen\" <s cohen@...> with subject \"Re: Bar-Bee-Q\"", "content": {"to": "\"Sara Cohen\" <s cohen@...>", "subject": "Re: Bar-Bee-Q", "body": "can't make it :( have fun w/o me! also, check out my progress on our band's myspace page (thenarrowchannels), see the blog titles \"the first two weeks\" and \"winnipeg to austin\"\nw!\nw, r hs\n--- On Tue, 9/23/08, Sara Cohen <s cohen@...> wrote:\n [omitting quoted text]"}}, {"type": "journal", "time": "~12:30PM", "place": "austin, tx", "description": "written at guero's (s congress)", "content": "___________________\nin guero's now. steveo's suggestion. nice. south congress. that took a minute to figure out. nice neighborhood, nice vibe. probably the cool place to live."}, {"type": "receipt", "time": "1:07PM", "place": "austin, tx 78704", "description": "oaxaca for $10.23 at guero's taco bar (1412 s congress)"}, {"type": "receipt", "time": "3:36PM", "place": "austin, tx 78704", "description": "gas for $35.36 at barton springs food mt (1525 barton springs)"}, {"type": "email", "time": "4:13PM", "place": "austin, tx", "description": "to laura@... with subject \"the market!\"", "content": {"to": "laura@...", "subject": "the market!", "body": "hi baby, missing you from the austin public library. w, l r hs"}}, {"type": "journal", "time": "~9:00PM", "place": "austin, tx", "description": "written at library (guadalupe st)", "content": "___________________\nok, experienced a pretty big turnaround in the last few hours - was pretty down playing the 9 holes 2ce at zilker park - maybe i was thirsty - maybe the nicotine addiction is fading - maybe another setting sun gives hope - or maybe it was finding pease park and catching up w/parker (curly reddish hair) and mike (dark hair, buzz cut) and playing a few holes w/them - they seemed cool and accessible. i wonder if they saw my mass plates when i left. at the library now - thinking of closing it out, then going to emo's - just swung by there - heard the sound check through the walls - that was cool. the library employee is reading sci fi teasers to the blind guy right now - that's fun. stopped by a middle school football game just a bit ago - saw a fake toss right bootleg touchdown to make it 12-0. then a 2 pt pass to make it 14-0 blue team. what a nice field. strategizing a storytelling effort - thinking instead of using hard rankings, i'll say \"top 5\", \"top 10\", and \"top 20\", and i'll even be loose w/that, ie 6 \"top 5\" is ok (a tie for 5th!). driving moments, meals, american attractions (i forgot all about that one... i'll change it to something else, like old people experiences... or i could just drop it and make top 25s, to total 100 bullet pts... hmm.\njust read this whole book - awesome to watch the changing complexion - too bad i didn't write more at the beginning. what the hell was i doing in dc?! maybe i've changed - actually, that's probably it."}, {"type": "receipt", "time": "10:11PM", "place": "austin, tx 78701", "description": "atm withdrawal for $103.99 at emos (603 red river)"}], "story": []}, {"day": 27, "day_of_week": "Wednesday", "date": "Wednesday, September 24", "place_range": "Austin, TX", "part": 3, "timeline": [{"type": "call_out", "time": "11:47AM", "place": "Austin TX", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "2:00PM", "place": "San Antoni TX", "description": "to laura for 1  minute"}, {"type": "journal", "time": "~2:00PM", "place": "san antonio, tx", "description": "written at casa rio, riverwalk (430 East Commerce Street)", "content": "w 9 24 08 casa rio, riverwalk, san antonio, tx\nlots of pigeons + ducks! i love fountains - i was thinking that in downtown austin - this place has some great ones! i love the integration of nature, moving water, engineering, concrete, and human life. how bout those weird pine trees w/root growths and soft light green needles - i think they were evergreen.\nhugh from santa cruz - opm, revolution, and the expendables."}, {"type": "receipt", "time": "4:46PM", "place": "live oak, tx", "description": "cassette to cd adapter 32.99 / portable cd player 17.99 for $55.19 at best buy #181"}, {"type": "call_out", "time": "6:00PM", "place": "Austin TX", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "7:23PM", "place": "Austin TX", "description": "to home for 25  minutes"}], "story": []}, {"day": 28, "day_of_week": "Thursday", "date": "Thursday, September 25", "place_range": "Austin, TX", "part": 3, "timeline": [{"type": "journal", "time": "~10:00AM", "place": "austin, tx", "description": "written at hostelling international (2200 South Lakeshore Boulevard)", "content": "th 9 25 08 at the hostel, austin, tx, just after 10am\nit's after 10 - hope i don't get in trouble for my laundry isn't finished. went to cedar st last night to see the spazmatics - an 80s cover band - at the suggestion of the blond waitress at little woodrows. she remembered me. \"lone star?\" she asked when she saw me. \"yes.\" or \"yup.\" or \"yeah.\" i don't exactly remember, but that was nice - then later we talked about some of the different scenes around town - i asked where the beauty bar is, and told her where beerland is - both follow-ons to our conversation 2 nights prior.\ntalked w/a victim of ike a couple days ago in front of the library on guadalupe. he was looking for the post office. wasn't going back. had been in the convention center, now has a hotel auth until oct 14 - hispanic but didn't look it. found a job already in austin.\nloving the free coffee here at the hostel."}, {"type": "email", "time": "11:29AM", "place": "austin, tx", "description": "to \"Laura Sanda\" <laura@...> with subject \"Re: 10:00 here, going to bed\"", "content": {"to": "\"Laura Sanda\" <laura@...>", "subject": "Re: 10:00 here, going to bed", "body": "wow, thanks for the awesome email--for a sec when i saw it in my inbox i was like, hmm, what's koneiczcny got to say? then i remembered there's another laura sanda! ;)\ni'm def much looking forward to your arrival too. i scouted out some swimming holes around here today--that's something we could maybe do if we stick around for a day.\n!, w, l r hs\n--- On Wed, 9/24/08, Laura Sanda <laura@...> wrote:\n [omitting quoted text]"}}, {"type": "receipt", "time": "2:49PM", "place": "austin, tx", "description": "gatorade frost 32oz for $1.08 at cvs/pharmacy (520 w slaughter ln)"}, {"type": "call_out", "time": "3:07PM", "place": "Austin TX", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "3:08PM", "place": "Austin TX", "description": "to spoth for 3  minutes"}, {"type": "email", "time": "4:02PM", "place": "austin, tx", "description": "to \"The Narrow Channels\" <the narrow channels@...>, \"Q\" <aquino@...> with subject \"Re: message on our MySpace...gig in November\"", "content": {"to": "\"The Narrow Channels\" <the narrow channels@...>, \"Q\" <aquino@...>", "subject": "Re: message on our MySpace...gig in November", "body": "my loose plan is to be back on the night of sat nov 8. is this thing for real? i'm willing to do whatever, but am a little leery about selling our souls--hopefully we won't have to? i'm certainly interested... if i needed to get back sooner for something, i could probably reign it in by a week or so, but that would mean foregoing the opportunity to hang out w/rodney in alabama, and it would mean he'd be foregoing that too.\nhow are we going to get to an hour?! send me some instrumental tracks! post to the gmail account sean's demo and the rob/rodney jam from the day we recorded in sean's basement the last 2 demos (jul 13, i think).\nw!\n--- On Thu, 9/25/08, Q <aquino@...> wrote:\n [omitting quoted text]"}}, {"type": "call_in", "time": "6:15PM", "place": "Austin TX", "description": "from spoth for 3  minutes"}, {"type": "call_out", "time": "8:12PM", "place": "Austin TX", "description": "to laura for 4  minutes"}], "story": []}, {"day": 29, "day_of_week": "Friday", "date": "Friday, September 26", "place_range": "Austin, TX", "part": 3, "timeline": [{"type": "receipt", "time": "1:02AM", "place": "austin, tx 78745", "description": "atm withdrawal for $102.00 at little woodrows (520 w 5th st)"}, {"type": "call_out", "time": "9:4OAM", "place": "Austin TX", "description": "to spoth for 2  minutes"}, {"type": "call_out", "time": "10:02AM", "place": "Austin TX", "description": "to spoth for 2  minutes"}, {"type": "call_in", "time": "10:56AM", "place": "Austin TX", "description": "from spoth for 1  minute"}, {"type": "call_in", "time": "10:57AM", "place": "Austin TX", "description": "from spoth for 1  minute"}, {"type": "call_out", "time": "11:21AM", "place": "Austin TX", "description": "to spoth for 1  minute"}, {"type": "call_out", "time": "11:30AM", "place": "Austin TX", "description": "to spoth for 3  minutes"}, {"t m 665)"}, {"type": "call_out", "time": "2:52PM", "place": "Ricardo TX", "description": "to laura for 24  minutes"}, {"type": "call_out", "time": "6:37PM", "place": "South Padr TX", "description": "to laura for 7  minutes"}, {"type": "call_out", "time": "7:38PM", "place": "South Padr TX", "description": "to voice mail for 2  minutes"}, {"type": "journal", "time": "~8:00PM", "place": "south padre island, tx", "description": "written at pelican pub and grill (padre blvd)", "content": "m 8 29 08 pelican pub + grill, south padre island, tx\nhi. welcome back - susan, tia, and alberta - halloween weekend - willie nelson, los lonely boys, foghat... sara hickman... steward mann + the statesboro revue... paula nelson band... \nstrong short haired waiter dude charged me for 1 (i got 3 shiner bochs)... !"}], "story": []}, {"day": 33, "day_of_week": "Tuesday", "date": "Tuesday, September 30", "place_range": "South Padre Island, TX", "part": 3, "timeline": [{"type": "journal", "time": "~12:45PM", "place": "south padre island, tx", "description": "written at internet cafe and deli (padre blvd)", "content": "tu 9 30 08 internet cafe + deli, south padre island, tx\n\"i think a regulatory structure that is far more restrictive of financial innovation is a good idea - justin fox (also - \"swedish solution\")"}, {"type": "email", "time": "12:52PM", "place": "south padre island, tx", "description": "to rodney@... with subject \"Fw: Disc golf on Boston.com\"", "content": {"to": "rodney@...", "subject": "Fw: Disc golf on Boston.com", "body": "--- On Mon, 9/29/08, Matthew Ruxton <rux@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "12:58PM", "place": "south padre island, tx", "description": "to \"Stephen O'Keefe\" <steveo@...> with subject \"Re: Fwd: ITA Software\"", "content": {"to": "\"Stephen O'Keefe\" <steveo@...>", "subject": "Re: Fwd: ITA Software", "body": "acl was sweet--saw a bunch of good bands, good time, good hanging out. laura doesn't get here til friday, so i'm hanging around south padre island right now. ... w, r hs\n--- On Mon, 9/29/08, Stephen O'Keefe <steveo@...> wrote:\n [omitting quoted text]"}}, {"type": "receipt", "time": "1:44PM", "place": "port isabel, tx 78578", "description": "soap, shampoo, cereal and soy milk, reusable bag for $14.08 at heb (1679 highway 100)"}, {"type": "call_out", "time": "5:25PM", "place": "SOU1h Padr TX", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "5:26PM", "place": "South Padr TX", "description": "to steveo for 13  minutes"}, {"type": "call_in", "time": "7:03PM", "place": "South Padr TX", "description": "from greg for 18  minutes"}, {"type": "call_in", "time": "8:35PM", "place": "South Padr TX", "description": "from laura for 31  minutes"}], "story": []}, {"day": 34, "day_of_week": "Wednesday", "date": "Wednesday, October 1", "place_range": "South Padre Island, TX to Austin, TX", "part": 3, "timeline": [{"type": "receipt", "time": "", "place": "", "description": "shrimp, ice, bottles of sauces for $16.83 at cuevas seafood market"}, {"type": "journal", "time": "~11:00AM", "place": "brownsville, tx", "description": "written at los sauces lavandaria (boca chica blvd and co rd 511)", "content": "w 10/1/08 lavandaria laundry \"los sauces\", brownsville, tx\n\"hola.\" \"hola.\" i responded in spanish! do you think she suspects i hardly know any? i'm on boca chica boulevard at the end near where 802 ends in the east - doing two loads of laundry. stayed in a motel the last two nights - motel 6 on south padre island - it was good to live in luxury for a day. i paid 39 a night, but the digital sign out front was down to 29 by the first morning. ate at the pelican pub and grill - nice guy only charged me for 1 of 3 beers. slept in my car for a while at walmart after asking customer service what the manager's policy on sleeping in a car in the parking lot was. \"one night\" was the ready answer. only lasted a few hours - by 1230 i was checked into the motel... afternoon throwing on the beach - wind in from the north (perfect - absolutely perfect conditions) - avoiding walker-bys, but def enough room - went to heb first - got soap, shampoo (forgot my stuff in the hostel again!), and cereal and milk (soy) - already finished the soy milk and one box of cereal - cheap eats! - watch for pelicans when flashing - actually saw some pelicans, flying parallel to the bridge, and standing on a wooden wall in the water on the mainland side of the bridge w/a lot of other smaller birds - texas something birding trail - texas tropical trail. sea swept sand sheets, vegetation creeping from the land to the water haphazardly arranged, those rickety wooden sticks planted in the ground to hold a set of 3 or 4 barbed wires, the fence traversing water, sand, scrub brush, dotted w/chip cactuses and short one-flourish palms. 700b bailout failed, rumor is they'll try again soon - stocks rebounded yesterday up 485 after down 777 the day before - lou dobbs - campbell brown - james carvel - anderson cooper - cnn - twins-w sox one game playoff, 1-0 white sox on thome's omb to center field - susan, tia, alberta: drug cartels - don't travel alone to mexico - don't mess around and you'll be fine - don't go to mex at night - 95% hispanic - english in schools, spanish at home for most kids - beach used to be out to there - talked to greg - he's having a baby - laptop use in coffee shop - only 32? - lots of mexican radio - ciento y uno punto uno - tecano music - cleaned out cooler + did dishes -stopped at cuera's (seafood market/shop) - sore from throwing - talked to steveo - he's getting phone screened by judy next week. talked to laura - excited/anxious to see each other - she can't see past the airport scene - there was a food show on the tv when i walked in here, in spanish - now it's off - the fans are really loud. - i had some troubles while fading off to sleep last night - some time warp stuff, like could i really make it another month, then maybe even could i really make it two more days, then worse, what if laura and massachusetts couldn't spell my anxiety? that seems silly now, in the middle of a day, beautiful sea-affected landscape racing by, and the opportunity to share it w/friends on a short horizon. had a dream filled w/destruction - can't remember exactly what it was now - did it involve a bridge? - car in the parking lot is from mexico. i was surprised at just about all populations posted on city limit signs in south texas: corpus christi as high as 287k? some suburb at 83? then a town in the hundreds, then the thousands, then the 10 thousands - port isabel as high as 4k? south padre island as low as 1k something? brownsville as high as 120k? crazy. talked to mom in a corpus christi mall - she's kind of pushing the come home early agenda, and i was getting kind of irritated, though i'm considering it more seriously than others probably think, though it seems i have support the rest of the way, plus a hard date in florence for nov 5, though i could probably blow that off. in the end, i like the way the story looks to get back on nov 8, w/stops on the way back in colorado at amy's, santa fe at sarah april's maybe, through louisiana and mississippi, at florida w/allison and family, plus mom, then florence, then nc, then dc, then home. future interstate corridor (i-69). reminiscent of travelling charlotte to wilmington on the future i-76 corridor, especially considering both seem out of place in the numbering scheme. steveo said the politics and the economy and the baseball were fun - a lot is happening. i've occasionally thought during this trip that the world is going my way, and that my state of mind has something to do w/it, particulalary big things, like wall street tanking and the politics moving appropriately. ... 16 more minutes. bob hall pier - that's where the kid in corpus christi told me to go - used to be a parking lot there , before ike - still a small parking lot near the boarded up service building - that's where i parked - and plenty of room on the beach for the lack of patrons. super warm water. a washed up full small tree, roots and all."}, {"type": "journal", "time": "~3:00PM", "place": "brownsville, tx", "description": "written at from the car outside las casuelitas (952 east adams street)", "content": "las cazvelitas"}, {"type": "receipt", "time": "3:12PM", "place": "brownsville, tx", "description": "gas for $21.07 at stripes #9875 (515 central blvd)"}, {"type": "receipt", "time": "11:30PM", "place": "austin, tx 78701", "description": "3 lone stars for $6.00 at little woodrows (520 w 6th st)"}], "story": []}, {"day": 35, "day_of_week": "Thursday", "date": "Thursday, October 2", "place_range": "Austin, TX", "part": 3, "timeline": [{"type": "receipt", "time": "6:18AM", "place": "austin, tx", "description": "gas for $37.87 at tetco #78 (2819 guadalupe st)"}, {"type": "receipt", "time": "7:26AM", "place": "austin, tx 78705", "description": "atm withdrawal for $101.75 at tetco #78 (2819 guadalupe)"}, {"type": "call_out", "time": "8:26AM", "place": "Austin TX", "description": "to laura for 2  minutes"}, {"type": "call_in", "time": "8:41AM", "place": "Austin TX", "description": "from laura for 4  minutes"}, {"type": "call_out", "time": "9:40AM", "place": "Austin TX", "description": "to 800-373-**** for 3  minutes"}, {"type": "call_out", "time": "9:43AM", "place": "Austin TX", "description": "to 617-551-**** for 3  minutes"}, {"type": "journal", "time": "~10:00AM", "place": "austin, tx", "description": "written at austin public library (800 guadalupe st)", "content": "th 10 2 08 outside library on guadalupe, austin, tx\nslept in the car up by some university housing last night - my spot. had 3 distinct and powerful dreams - one i was somewhere on the map near arkansas or kansas or missouri, and i was weighing the red sox love from the locals against the interstate grid, somewhere between i40 and i70, no doubt the result of watching game 1 of the alds w/a bunch of red sox fans in little woodrow's last night. in another , myself, andy d, and one other person had figured out how to fly using mind power, and we were appointed the leaders of a brave new world because of our higher minds - it was the second significant andy d appearance in my dreams this trip - thirdly, i was w/laura and j, and we invited bill to come over by phone, and i called j's cell from his house phone as a joke, and we were all gearing up to hang out on an otherwise uninteresting weekend. my mom was around too, and it may have been her house we were using, perhaps a shout out to younger days, in this my professed passage to adulthood - oh yeah - in the dream, my mom had taken up painting, and to practice she had painted flesh colors over the faces of a big portrait of all the kids, leaving shadows and lines for a darker color - she used shades of blue, and i told her i liked using blue for facial shadows, as if that was a technique i had used in the past more than a few times.\nlaura fax: ...\n10:52 - at 11:45 i have a reservation at internet workstation 12. ah, crap, my phone just started announcing its death. laura's coming tomorrow - i drew a connection or analogy between getting to i-37 just before dusk to laura coming just before my sanity fails. it sounds harsh to put it in those terms, but i did have a little anxious period driving back to austin after dark last night - it came and went, but i had some interesting thoughts. i was quite fine by the time i was drinking lone stars in front of the red sox game at little woodrow's last night. anyways, i was thinking that my spirit is a bit of a loose cannon right now, that the relative magnitudes of things in my world are unusual right now, so my spirit contributes more to big world things like the financial economy and the political climate than to the people around me - what people? maybe that's why. my emotional/egotistical fulfillment is scarce - i'm deflated, but my sense of self hasn't changed, so i can't really tell to the degree i logically believe it to be true, based on past experience and just hints of feelings."}, {"type": "email", "time": "11:15AM", "place": "austin, tx", "description": "to rux@... with subject \"Re: ESPN Fantasy Football: Trade Proposal\"", "content": {"to": "rux@...", "subject": "Re: ESPN Fantasy Football: Trade Proposal", "body": "hm, that's a pretty cool idea, a q upgrade for a receiver, but i'm a little happier with delhomme/bulger now than i was a couple weeks ago, and i love roddy white! this one was closer, though. w, r hs\n--- On Thu, 10/2/08, rux@... <rux@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "11:16AM", "place": "austin, tx", "description": "to trav@... with subject \"Re: ESPN Fantasy Football: Trade Proposal\"", "content": {"to": "trav@...", "subject": "Re: ESPN Fantasy Football: Trade Proposal", "body": "hmm... johnson looks good lately, and i'd like to get rid of addai, but i'm starting to like delhomme--he's coming into a good situation, and eli is losing plax at least for a week, plus i'm sure he's remorseful, and that affex his play :(\n--- On Tue, 9/30/08, trav@... <trav@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "12:56PM", "place": "austin, tx", "description": "to laura@..., mom and dad@..., the narrow channels@... with subject \"austin and points south, part 1 of 2\"", "content": {"to": "laura@..., mom and dad@..., the narrow channels@...", "subject": "austin and points south, part 1 of 2", "body": "on a monday afternoon i arrived in austin, texas from the north. i left the highway just in advance of downtown, and parked one street over from guadalupe by the university campus. i was intent on staying for up to two weeks--that was a week and a half ago.\ni walked up and down the street contemplating how to find inexpensive quarter, even considering a short stay in a rooming apartment. i eventually ducked into a cooperative supermarket and asked one of the employees, who was surprisingly helpful--she went to ask another employee who had done something similar in the past, and came back with names of cooperative housing groups, plus an alternate suggestion to contact hostelling international in austin.\ni found a phone book in a gas station and took down a few numbers, then went back to my parked car to make a few calls. i decided to go with the hostel, and to skip the first night to mitigate the expense. they were booked friday too, so i had options for friday, the fifth night. i knew spoth would be in town with some friends for the austin city limits music festival, staying at a motel. i was planning to attend the festival sunday, but they were to attend all three days, friday through sunday. if i stayed in austin, i could probably steal a night with them, but i also wanted to get to a texas gulf coast beach, so i considered an overnight trip to corpus christi or south padre island.\nwith help i ascertained the location of the public library--my go-to spot in every city, for the internet access, of course. the walk down guadalupe to find it oriented the university area to downtown for me, and so i began to revive my sense for the austin layout, obtained intially during two visits to the city almost a decade ago.\ni spent that first night in a few different bars, moving slowly at first, but after monday night football ended i just straight asked the help where to go to get a sense of the city. she pointed me further down 6th st, between congress and red river, and so i spent the rest of the night there, stopping into several bars with live music and somebody out on the sidewalk announcing \"no cover.\" later i walked back up guadalupe and slept in my car where it was parked.\ntuesday i was up early - it's hard to get good sleep in a car - so after wasting time walking around i went down to the hostel to check in and clean up. spent the rest of the day hanging around the library, walking around, and playing a couple rounds of disc golf, first at zilker park, then at pease park, where i caught up with two other players, parker and mike. they were very friendly, and told me about the course and other disc golf in the area.\nthat night, as intended, i paid to see live music, in order to see bands playing exclusively they're own music. i did no research, so i went to a place i saw an ad for in the local paper: emo's. the venue was fantastic--they were using the outdoor stage, which felt quite indoors on account of all the canopies. i was trying to compensate for drinking so much the previous night by not drinking, so i took a sprite and sat down on the floor alone by a pole.\neventually a younger kid came up and sat next to me to introduce himself--that was nice. his name was hugh, he was originally from santa cruz, california, but had moved to austin a month ago. he was kinda homesick, and so he was psyched to see three california bands, particularly the expendables, who were from his hometown. eh, so i got myself into a reggae/punk/surf show... oh well. turned out to be not so bad--the first band was opm, who were hip hop with some heavy guitar chords--i was really into it. the next band was a straight up, slow jam reggae band called revolution, which i didn't think i would like, but the lead singer was so compelling i was enthralled by the end. the expendables were last, they had a ton of energy, and i loved the heavy metal reggae they played, but i got tired towards the end, maybe i'm just too old.\nwednesday i took a day trip to san antonio, 80 miles or so to the south. unlike in most cities i've visited so far, i was very content to do the touristy things: the alamo and the riverwalk. i overheard part of a few different tours at the alamo, but i mostly just read all the info posted everywhere and walked through the structures. it was fun to learn about some local history. it was also fun to think about pee-wee herman asking the tour guide to see the basement. and let it be known that i loved the riverwalk--somebody told me long ago they were disappointed with it, so i had low expectations, but the integration of engineering, nature, and utility was overwhelmingly awesome to me. plus, i love fountains--i really do.\nthat night i went back to the bar where i had watched monday night football, hoping to see some baseball games. when i got there the same bar tendress that had told me where to go monday night was there again. \"lone star?\" she asked me, remembering me and what i was drinking from two nights prior--that made me quite happy.\n\"yes.\"\nlater we got to talking more about other places to go--she admitted the 6th street scene was not where she spent her time anymore, now that she was almost 30. she mentioned a few other places she liked to go, and suggested i go to see the spazmatics play at cedar street. they were an 80s cover band, and though she didn't want to admit it, she seemed to think they were actually a corporation and that there were other versions of the spazmatics in other cities.\nso i went to see them, and i enjoyed them. i even got to dancing a bit--more than i had yet on this trip, since i hadn't really danced at all, except maybe to nod my head repeatedly at some other live bands.\nthursday i played another round of disc golf at yet a different park, one a little further away and a little nicer. then i checked my phone mail to find out spoth was already in town--i had forgotten he was getting in in the morning. by the time i called him back they were kinda sleeping off the early flight, so i made my way back to the library and waited for the word to meet at threadgill's for dinner.\ni met him there, and also his friends kipp, zach, and scott. we tried a few different local beers over dinner, and then moved on to 6th east of congress for bar hopping. we played a bit of foosball, and saw some live acts.\nkipp, zach, and scott all had military experience in different branches. i told scott, who was in the air force, that i had actually gone to the air force academy for a year. he said he went there too. another sentence or two and we figured out we were in the same class, which led to more talk that kind of blew both of our minds.\nspoth at different points hinted that they could probably get me a ticket to the rest of the music festival if i wanted it. i waited until friday morning to call him and take him up on it. if i was going to hang around austin, what the heck else was i going to do? spend more time playing disc golf alone, walking around the city and hanging out in the library until they got out at 10 each night? i postponed my trip to the texas beaches until after sunday--i had until friday the following week - which is now tomorrow - to pick up laura at the austin airport, so i would travel to the beaches after the festival.\nthe music festival was great, even though it was super hot and dusty. i got to see a lot of bands that spoth told me were good, and so i got to decide for myself: bands like fleet foxes, spiritualized, and band of horses i definitely enjoyed. i also go to see the bands i kinda wanted to see, like the raconteurs, flyleaf, and silversun pickups.\nfriday night i stayed at their motel, in a room with spoth and leith, who had joined the party the second day. saturday night my phone died right at the end of the festival, so i didn't catch up with them for the afterparty. sunday night we were all kinda beat, so after driving around for a while with them, we said our goodbyes and i set off on foot for my last night in the hostel. in the morning, bright and early, i got on the road southbound for corpus christi and the gulf coast beaches, something i had been dreaming about doing in the earliest phases of planning the whole trip."}}, {"type": "receipt", "time": "1:13PM", "place": "austin, tx 78744", "description": "camping for $28.00 at austin lone star rv resort (7009 s ih-35)"}, {"type": "call_out", "time": "2:41PM", "place": "Austin TX", "descriptio
