threshold was right then, but I definitely didn't clear it. My only recourse was to play it off like I was being serious too, holding my ground because I truly didn't want to interrupt anything. Thankfully, not much time elapsed before the huddle erupted into pregame intensity, at which point a member or two motioned me in, suggesting all was clear.", "I walked over to join the team in the wake of the huddle, scoring a few quick hellos and an arm around from my good friend JY, who pulled me in to the subsequent team discussion. I was glad he and they included me. Apparently I'd arrived just in time for the first game; perfect. The weather couldn't have been better, and as I had nowhere to be but at that tournament with my Quiet friends, I could not have been happier.", "The discussion broke and players took their places. Noticing my old smoking buddy Maxel was looking for a few extra warm up throws, I gave him the sign, and he threw me in. Again, I was happy to be included, even more so for throwing in honest warm ups; finally, after all those years, I felt almost legitimized as a player.", "As the first game began, I made connections with the rest of my friends on the sideline, including Ryan. UMassers from back in the day in attendance that weekend were \"old man\" Cobbett - younger than me, but older than most Coyotes - and Josh Shea, my kindred spirit on the team. Shea used to ditch the team pregame activities to do his own thing, but somehow nobody ever seemed to mind. Occasionally, \"his own thing\" meant throwing the disc to himself, something I could obviously get behind.", "I got a big hug from Erin, a friend with a penchant for expressing genuine interest in my exploits, particularly this trip I was on. I told her about my experience the previous night in Indianapolis, discovering it made for a pretty good story... or at least, true to form, she made me feel that way.", "JY asked what my plan for the day was. I told him I was planning to stay all day, and was perhaps going to \"practice\" sleeping in my car at the fields, given the apparent safety; others had set up tents for the overnight by the parking lot. He responded by offering to let me stay in their hotel room, and I told him I'd consider it.", "I checked in with Eric the Redshirt. He went to my high school, but much later than I did, at about the same time my youngest brothers did; only later did we meet through ultimate. As far as the sport goes, he was my favorite to watch, and easy to root for; just a skinny kid making amazing plays while seeming to despise the sport. I liked that persona.", "Tall man Redburn was there too; it was good to see him back at the game. We talked about an MIT connection we had, a guy I used to work with that I knew he was friends with, and he offered me Doritos and trail mix, which I took him up on. In fact, that was all I ate for most of the day.", "When I had arrived at the field, I was outfitted in jeans and carrying my journal - Roy, another friend on the team, amusedly asked, \"was that math?\" after catching a glimpse of my Dupont Circle diagram - after being at the field for a bit, however, it became clear that athletic shorts would better suit the occasion, and that I wouldn't be spending much time writing. As such, I jogged back to my car to change, drop off the journal, and, since I was there, write my name in marker on the back of my new disc.", "Back at the playing field, I settled in on the Coyote sideline, enjoying the games immensely; more than I normally would, likely for not having a care in the world but to be exactly where I was. Quiet was playing on the level, beating the teams they were supposed to beat while struggling against teams with higher seeds. Inevitably, they weren't quite satisfied with their performance, though it didn't diminish their capacity to hang out.", "Throughout the day, I found myself sprinting around and throwing as much as possible; it felt really good to be active in that atmosphere, with hundreds of people around, blue sky above, and brilliant sunshine everywhere. Between points and games, I threw with whichever Coyote wanted it, and of course, when nobody was interested, I threw to myself.", "Throwing to myself that day, at that tournament, between Coyote games, was exactly how it was supposed to be. The wind was consistent - light, but present - almost straight up the field toward the wall of trees protecting Frisbee central. The best play in those conditions is a full strength backhand, slightly outside in, running across and barely leaning into the face of the wind, which for left-handed me that day meant throwing from about the middle of the goal line on the Frisbee central end of the field out over the middle of the Coyote sideline on the right, causing the disc to float gently back onto the playing field.", "There was an extra half a field length or so between the back of the end zone and the trees, affording me a decent overhead buffer, but I had to be careful not to lose a disc to the in-use playing fields on either side. To that end, I took a little something off the throws, compensating with extra concentration to great effect. The longer I went without an errant throw, the closer I crept to throwing full strength, beating back the blue sky one throw at a time. After each close call, tracking the disc in a full sprint to the limits of my open space, I reeled it in a bit.", "By late afternoon, Quiet was 2-1 on the day, though headed for 2-2. During that fourth and final game, the highly anticipated beer garden began to form by Frisbee central.", "\"You should go get some beers,\" Shea said with a smile.", "\"Is it only for players?\"", "\"You're a player,\" he insisted, fortifying the insinuation with, \"there's no way they turn you away.\"", "I mulled it over for a bit before another idea struck him suddently:", "\"Use my team shirt!\"", "He had it in a bag, and hadn't worn it all day, opting instead to use his own white jersey, another testament to the drum that bangs out a different beat. I pulled off the shirt I was wearing and replaced it with the tight Coyote longsleeve. Now I was in.", "I walked over to the table on which beers drawn into plastic cups had been laid out for the taking. A simple exchange about which of the three flavors I wanted and I was walking back to the Coyote sideline with a drink in my hand.", "Players took notice of my new attire, with Ryan reacting, \"Whoa... you look good when... you look... good.\" I knew it was a joke, for being caught off guard by the uniform, but I also took it as validation of what I'd been feeling for most of the day, if not the whole trip: I was in the best shape I had been in for a very long time. That included my playing time with Quiet, and with an open team before that. I got one last chance to exercise my shape that day following a return trip to the beer table...", "\"Do you have a mark on your hand?\" the woman asked. It was not the same person I'd dealt with before.", "\"No.\"", "\"Do you have a license?\"", "\"I've already been here once,\" I told her, holding up the empty plastic cup while trying to stay nice.", "\"I'm sorry, I'm really not supposed to give out drinks unless you've got a license or a mark on your hand. Sorry...\"", "I could tell she was uncomfortable, and so I relieved her with an \"alright, no problem,\" walking away a few steps before breaking into a decent sprint towards my car. I grabbed my license and, while I was there, grabbed my cell phone and wall charger. It was rediculous that I didn't have a car charger, considering my life had become a road trip, but it was an old phone, and I'd had trouble finding a replacement for the orignal I'd lost.", "I caught up with the Coyotes before heading back for a refill. The shadows were getting long, and the first day of the tournament was in the books. I asked JY if he knew where I could find an outlet to charge my phone.", "\"Yeah, I know the guy over at the music tent,\" he told me, then realizing the opportunity for a joke, added, \"yeah, I'm connected,\" a line of talk that devolved into Ron Burgundy quotes.", "We walked over to the tent, where he introduced me to a nice guy who went on to show me the power outlet complex they were running off of while plugging my phone into it. \"Just come back here and grab it whenever you want... don't forget it, though,\" he warned.", "From there, JY and I went over to get beers, which we brought back to the improvised Coyote camp near where their sideline had been. I camped out next to Shea, with whom I talked mostly music for the next half hour or so. I complemented him for the recordings he'd posted online, of him singing long-running, thought-provoking lines over a sensual, acoustic guitar, and he asked me about our band's most recent show.", "Later, Erin joined us, and the three of us continued to converse until it was just about dark. Nearby, some of the Coyotes I didn't know so well were having their own conversation, and one of them began playing music on a cell phone. It was \"American Boy,\" by Estelle, which was all over the radio at the time.", "\"Oh, man, this song is so good,\" I admitted aloud.", "\"What is it?\" asked Shea.", "\"American Boy, by Estelle. With Kanye.\"", "The two groups convened for a full length listen. Shea hadn't heard it until then, but he picked right up on it.", "\"This is gonna be a jam at the BAD party this year,\" he said, referring to JY's holiday dance party, named for the Bishop Allen Drive address in Cambridge at which the party was held annually.", "JY came by to inform us that the team was heading for Carrabbas for dinner, back in the direction of the hotel. We discussed for a bit the plan to get all people and cars to the site, and by agreeing to go, I was basically committing to stay in their hotel, which I decided I was fine with. In the course of that conversation, JY introduced me to the magic of the iPhone; I had seen plenty of television commercials for the device, but it was not until I watched with my own eyes as JY touched the screen with two fingers and drew them apart to zoom in on the local map that my world was completely shaken.", "The passenger seat was free in my car, and so I took Maxel with me. I knew he appreciated the trip I was on, for he had recently done something similar, and so we compared notes for most of the half hour or so it took to get to the restaurant. I told him I had a Garmin but hadn't yet used it. I had borrowed it from my mother, who suggested I could return it when I caught up to her in Florida. Maxel described his own experience using a GPS, coloring with what he did and didn't like about it.", "The restaurant was crowded when we arrived, but thinning out, and so despite the size of our party, we were seated fairly quickly. Our setup was four tables joined end to end, and I took the end seat farthest from the door. Shortly after establishing my position and ordering a beer, I stepped outside to call Laura, where I found a few other Coyotes making calls.", "Near my end of the table was Redshirt, plus a few others I didn't know so well, though I got to know them better for our time there. Redshirt, even after playing ultimate all day, ordered only a salad; no wonder he stayed so skinny. As a group, we were definitely loud, and so I felt kind of bad for our server, a young male with a regular haircut who managed our enthusiasm with amazing poise. We informed we were from Boston, and that we were likely an appropriate caricature of our culture, while complementing him for representing Chicago so well.", "Some time after we'd ordered, JY called for my attention from about half way down the table. Bearing a tone of competing distress and hilarity, he said he had just gotten off the phone with Ryan, whose car had apparently gone to the wrong Carrabbas. That turned out to be nowhere near where we were, but supposedly they were on their way.", "Knowing Ryan and Erin were champions of their own negativity, this news had stomach sink impact. Their arrival would prove uneasy, but, until then, we gave in to anxious amusement. When they did show up, they took seats at the opposite end of the table from me, and by that time, the rest of us were almost done eating. I got up to walk over and catch up with them.", "\"You guys can't be happy,\" I smiled apologetically.", "\"Well, you know us, we're negative anyway,\" said Ryan, supposedly unhappy, though he didn't seem too different. Still, it almost came off as a warning about engaging them, compelling me to respond:", "\"You know, I kinda think I mesh well with your negativity.\"", "I hoped they recognized the sincerity. As the conversation continued, it struck me to ask:", "\"Hey, you want my leftovers?\"", "\"Hmm... maybe; what was it?\" asked Erin.", "\"Pasta, red sauce, sausage, goat cheese on top... I'm done with it if you want it.\"", "They consented, and I went to retrieve them.", "As our time at the restaurant wound down, we moved to exit. Outside, perhaps a bit inebreated, a few of us were throwing fistfuls of mints stolen from inside across the parking lot. I picked up as many as I could conveniently.", "Maxel joined me again for the trip to the hotel. He was a little drunk at this point, and had a hankering for some cigarettes, despite that he'd told me earlier he was kind of off of them; I suppose that's just how they work. He and others had stayed at the hotel the night before, and so as soon as we got close enough that we could defect from the caravan without getting lost, he forced me to find a gas station so he could buy a pack.", "Of course I obliged.", "The hotel was clearly host to many ultimate players that night; everybody in the parking lot and the hallways had the look. I was crashing pretty bad by the time we got to the room, where about four others were in line for the shower ahead of me. I sat by the foot of one of the beds with my eyes glazing over in front of the TV until it was my turn, then took a quick shower and settled into a sleeping spot on the floor.", "\"Do you want a blanket or something?\" JY asked. I resisted for a bit, saying I didn't want to put out anybody who had to sleep well in order to play well the next day, but he insisted it was not a problem, and so I took one of the comforters. The lights went out almost immediately thereafter, and I had no trouble falling asleep."]}, {"day": 10, "day_of_week": "Sunday", "date": "Sunday, September 7", "place_range": "Naperville, IL to Holland, MI", "part": 1, "timeline": [{"type": "receipt", "time": "", "place": "", "description": "camping for $54.00 at Park: HOLLAND STATE PARK / Camp: LAKE MACATAWA WOODSTOCK LOOP (2008)"}, {"type": "receipt", "time": "7:57AM", "place": "MOKENA, IL", "description": "gas for $43.13 at BP CONNECT 2638"}, {"type": "receipt", "time": "8:35AM", "place": "", "description": "coffee for $2.30 at STARBUCKS COFFEE / LINCOLN OASIS TRAVEL PLAZA"}, {"type": "call_out", "time": "11:08AM", "place": "Michigan C IN", "description": "to laura for 2  minutes"}, {"type": "call_in", "time": "2:03PM", "place": "Saint Jose MI", "description": "from laura for 4  minutes"}, {"type": "call_out", "time": "3:52PM", "place": "Three Oaks MI", "description": "to 800-828-**** for 3  minutes"}, {"type": "call_out", "time": "3:57PM", "place": "Three Oaks MI", "description": "to 616-399-**** for 1  minute"}, {"type": "call_out", "time": "3:58PM", "place": "Three Oaks MI", "description": "to 616-399-**** for 1  minute"}, {"type": "call_out", "time": "5:14PM", "place": "Zeeland MI", "description": "to 616-399-**** for 2  minutes"}, {"type": "receipt", "time": "6:10PM", "place": "HOLLAND, MI 49424", "description": "park access for $16.00 at STATE HOLLAND PK (2215 OTTAWA BEACH RD)"}], "story": ["Others were stirring as I came to in the morning. I lifted my head to scan the room. On one of the hotel room beds, a tall Coyote I'd just met the day before was curled up and desperately trying to squeeze warmth out of the only thin sheet I had left him with.", "Now I felt bad for accepting the comforter.", "I lay back down, not nearly feeling rested, but never quite fell back to sleep. One by one, Coyotes slipped quietly out the door, with JY being the last of them. He turned as he was exiting and offered in a low voice:", "\"Hey... stay as long as you want.\"", "\"Cool, thanks man. I think I'm right behind you though. Good luck; thanks for letting me stay.\"", "JY and the others were gone for good, planning to drive straight from the fields to the airport at the end of the day, and because they weren't coming back, I didn't quite feel comfortable sticking around, even though I could have used more rest. I gathered my stuff and walked out of the room, letting the door lock behind me as I continued down the hall, down the elevator, out the side door, and across the parking lot to my car. Without much fanfare or forethought, I was back on the road.", "I stepped Interstate to Interstate across suburban Chicago, retracing the route I'd taken the day before, making my way back to I-80 eastbound. My loose plan was to get to Michigan, and, because it was the first Sunday of the NFL season, to find a place to watch football. I was figuring to break north shortly after crossing into Indiana.", "In the meantime, I was unpleasantly tired, and bearing a heading to compete with the morning sun only exacerbated my discomfort. Before I even got to Indiana, I sought retreat and coffee at the South Holland rest area built over the highway. I took my time walking to and from the Starbucks inside, stopping to peer out the glass wall and down the Interstate while sipping coffee, purposefully delaying a return to the road.", "Pressing on, I was shortly in Indiana. Signs for the Indiana Dunes National Lakeshore sparked memories of the conversation from two nights prior with Scotty and Jenny in Indianapolis, and ultimately I decided it would be foolish to squander the opportunity to see the dunes. I left the highway perhaps a little earlier than I should have, forcing me to run parallel to the Interstate on US-12 for a bit while following signs to the Dorothy Buell Visitor's Center. It was still quite early by the time I got there, and the parking lot was all but empty, causing me to question whether they were even open. Rather than look into it, I pulled the lever on my seat and leaned back to sleep for a spell.", "After about forty five minutes I came to slowly, feeling suprisingly refreshed. Hearing the voices of a father and young daughter outside, I peered around to notice a scattering of cars now sparsely covering the lot; the visitor's center was open, apparently. I got out of the car and stretched, shaking off the morning, then went inside to learn about the shifting landscape at the south end of Lake Michigan.", "It was not all that crowded inside, but there were a few others, plus a few staff. I took my time examining the displays, reading about the flora and fauna involved in the local natural dance. After a short, self-guided tour, I approached the counter, behind which a white-haired woman gave a smile, eager to help. I told her I only had an hour or two to take it all in, and that I sought her advice on how best to take advantage of that time, adding that I intended to climb Mount Baldy.", "Taking no offense to the insinuation that I was giving her natural treasure so little time, she unfolded a pamphlet and began marking the map with a pen, explaining as she went. She advised me to take a short hike along a loop through the forest before climbing Mount Baldy, pointing to the loop on the map. While providing directions from there to Mount Baldy, she suggested I check out the historic beach houses along the way, drawing a line over the road along the lakeshore. And when that road appeared to reach a dead end, she drew a line that cut over to the main road, imploring me to take a road that \"doesn't look like it's there, but it's there.\"", "She went on to explain that Mount Baldy was a one hundred twenty five foot \"living\" dune, which meant that it was moving, albeit slowly. I had already learned that from the video, though. I thanked her, and she thanked me for stopping into her visitor's center, phrasing it in such a way that I thought to ask whether she was Dorothy Buell, for whom the center was named.", "Alas, I refrained.", "I left the visitor's center, pulling up a short stretch of road and into the access lot for the walking loop. Confused by a no parking sign, I parked most of the way across the lot from where the path cut into the woods, despite that the lot was empty. And there I sat, in the car, door ajar, lacing up my new sneakers to prepare for the short hike.", "The path led by a small clearing at the outset, where rows of benches improvised from fallen logs created a small outdoor venue amid the trees. Just beyond the clearing, the path diverged to form two ends of a loop. I took the rightmost path, beginning a counter-clockwise circuit, moving among the trees and brush over moderate fluctuations in elevation. Occasional plaques explained how the vegetation was indicative of, and particular to, the story of the landscape, which made more interesting what was otherwise a quiet, lonely walk in the woods.", "After completing the loop, I returned to my car, a little surprised at how much difficulty I had with what seemed like a simple hike. Next up: Mount Baldy.", "Shortly after pulling out of the lot, the road turned right to parallel the beach, immediately granting my first view of the impressive lake. There were sporadic sets of angled parking slots, much pedestrian activity, and sparsely placed pastel-colored houses of no easy classification, some along the beach, others pressed into the trees opposite. The houses were composed of either wood or concrete and creatively infused with glass, like art projects from an ancient, industrial America.", "Compelled, I pulled over, jumping out of the car disc in hand. I quickly learned, however, the beach was no good for throwing. It was a narrow stretch of sand, crowded with people, and littered with pebbles and shell pieces as if they'd been crushed and strewn about purposefully. Small waves crashed onto the shore, in a regular pattern and in rapid succession. I dipped my feet in the water then made a quick return to the car.", "Shortly I was following signs to Mount Baldy. Its parking lot was set beyond a winding access road and adjacent to the dune that was clearly visible on the approach. Once in the lot, it was obvious the dune was literally spilling onto it, completely enveloping the bases of trees that presumably marked the original edge of the pavement.", "I parked, got out, and surmised I had a choice between either making the full climb or short circuiting half of it on wooden stairs. I opted for the former. Signs led me down a sandy path towards the beach through a patch of trees obscuring the left end of the dune.", "At about half way to the beach, still protected by the forest, I broke right up an incline, the ascent on soft footing proving difficult. Once the terrain leveled off, the trees broke to reveal a vast and slightly concave stretch of sand I could not have thrown a disc across if I tried. To the left, the sand fell on a gentle slope all the way to the beach. The right side culminated in a sensual ridge.", "Completely fascinated, I stepped along the ridge while peering over it. Sand fell steeply and smoothly down the other side, swallowing trees by the trunks and cascading onto the parking lot. At first I doubted I was permitted to walk across, for fear of disturbing the natural balance, but there were no fences or signs, and human tracks suggested the contrary. I walked out into the sandy space while favoring the ridge, marveling at how the dune crested just above the tallest trees, providing for fantastic views of the surrounding area, including a clear shot at the industrial stack looming over Michigan City just up the beach.", "I had been to that city once before while traveling with Laura. I studied its waterfront features as I walked along the ridge towards them, using the alternate vantage to piece together memories. Close to the far end of the dune, where the surface turned up to its highest point, I pulled out my phone to call Laura.", "\"I'm at the top of Mount Baldy! It's the biggest dune in the Indiana Dunes, at the end of Lake Michigan... remember when we camped near here on our way back from the Southwest?\"", "\"Hmm... maybe...\"", "\"I can see Michigan City from here; I drove into that town the morning after we camped here, to get coffee while you were still sleeping.\"", "She didn't remember that. I tried to explain how cool the dune was, but didn't do a very good job, and sadly, she didn't seem as excited as I wanted her to be.", "When the conversation ended I sprinted down the hill, leaping in great bounds, plowing deep into the soft sand with each step. Upon reaching the seam between the dune and the beach, I broke down to a walk, alternately peering out over the water and scanning the edge of the forest for the path to the parking lot. At first sight of the path I made for the car, pleased for having decided to stop.", "I returned to the main road, US-12, intent on using it to cross into Michigan. Excitement was peak as I rolled through Michigan City, reaquainting myself with the downtown scene I'd spent a single morning immersed in some four years prior. Some of it came back to me. On exit from town, US-12 divided and cut into the woods, paralleling railroad tracks along which large steel and wooden structures built over the tracks came and went. They appeared to be train servicing apparatuses of some kind, but I couldn't figure how they were used, or whether they still were.", "I watched eagerly for the sign that would herald my arrival in the fifth to last state I needed to visit, wondering how far I'd have to go to break the plane, or more interestingly, how close I had come four years prior to rendering the segment of the trip I was just beginning unnecessary. It took longer than I expected, but eventually passage was confirmed by a finely crafted sign carved of wood and painted blue.", "Once in Michigan, I had one goal: find a place to watch football. It was just after noon, and I was hoping to be seated in front of a television in time for kickoff. I tuned into the AM dial, expecting to find some pregame hype, but instead discovered a broadcast of early scores for games that had already started. I had forgotten to adjust for the time change!", "Almost immediately I was upon a town called New Buffalo. It appeared to have substance, and so I broke left off US-12 onto one of its main roads, trying to scope out a place to catch the action. As I moved towards the water, quaint shops and nice restaurants gave way to canal bridges and boat slips, all of which turned out to be nicer than what I was looking for.", "I backtracked out of town and began making my way up the eastern shore of Lake Michigan, trading back and forth between highways and other parallel roads of significance, occasionally sidestepping through lakeshore town centers but finding nothing to suit me along the waterfronts. I bided my time for an hour or so, following football as best I could on the radio before chancing upon a nice looking bar along a primary drive. The building stood alone and two stories high, set across from streets leading into town towards the water, and as such, parking was easy.", "I entered by the front door. My eyes adjusted to the indoor light to reveal a cavernous space of wooden construction, with patrons spread thinly across the entire layout. Separate areas were distinguished by short walls, posts, and in some cases short flights of stairs or ramps. To the left was the bar, extending away from the entrance and enclosed by paneled walls above and below. I pulled up a stool at the end nearest the door.", "There were two televisions behind the bar; the Lions game was on the big screen, and the Tigers were on the small TV closer to where I was sitting. It was still early in the afternoon, but I ordered a beer anyway, and Atlanta was already up on the Lions, 21-0. I wanted so badly for that to mean Roddy White had already scored a touchdown or two, since he was my starting wideout, but alas, the first touchdown, which they showed repeatedly, was a 63-yard pass to Michael Jenkins, on Matt Ryan's first NFL pass attempt; the others were Michael Turner scores. I enjoyed listening to the folks at the bar joking about \"maybe next year\" for the Lions. It was only the second quarter of the season!", "With the Falcons up by so much, I didn't see the offense giving White many more chances, and so I began strategizing how to take in alternate football action. I thought about Vegas and its sports books, with many televisions broadcasting a variety of games... that's what I really wanted, and so it struck me:", "\"Perhaps Michigan had casinos with similar set ups?\"", "The young bar tendress told me there were four or five casinos in Michigan, and that the closest one was in New Buffalo, which I had passed about an hour ago. Over a second beer I weighed my options, and ultimately decided that, even though I'd be backtracking all the way to the Indiana border, it would be worth it to catch multiple games at once. I had no designs on where to be anyway, except for to be in Michigan, which of course I would be regardless. The next time she came by, I asked for directions, then paid my small tab and got back on the road.", "I was upon New Buffalo again in about an hour. The directions off the highway led me eastward, away from the center, to where the casino was the only viable complex in the area. I left my car most of the way across the enormous lot from the building, making my way inside.", "For most of my life, I'd been a fan of casinos, favoring the slots and mindless table games like blackjack, sucking down the cigarette smoke without problem, occasionally smoking myself. Something about this place, however, felt ugly and sad. Perhaps my opinion was warped by my frustration in finding football, or for being so alone. In any event, I started across the labyrinthine indoor expanse, ringing slot machines barely obfuscating the din of a sea of voices, on a mission to find the best place to watch the games.", "I passed a central bar area with a few TVs suspended inside a canopy above, but decided to pass on it; the TVs were small and it was fairly crowded anyway. Later, I asked a staff member where the best place to watch the games was, and he suggested that same island bar I had just visited.", "I was defeated. I went back to that bar, hoping somehow it was better than my initial impression suggested, but it wasn't. Reluctantly, I abandoned hope for catching the first round of games, slightly disappointed that I was so quick to dismiss the first bar I'd found that day; I could have at least watched the ticker across the bottom for stat updates. I left the casino and went back to the highway, my focus on the mission at hand deteriorating.", "Retracing the highway run I'd done twice that day offered no excitement. I listened to the radio, foregoing football updates in favor of music. I heard \"Levon\" by Elton John, calling to mind the West Virginia radio station that earlier in the trip posed a trivia question about one of its lyrics:", "\"He was born a pauper to a pawn on a Christmas day.\"", "I hadn't known the exact words before then.", "It occurred to me while pointed north on that Michigan highway that my trip would not be one continuously positive span of ten weeks. I was subject to ups and downs, just like in ordinary life, and at present, I was down. I had already struggled while alone, finding places to sleep in both West Virginia and Indiana, and also in finding a place to watch football that day, which made the part of the trip I was just beginning, potentially representing up to three weeks alone, seem rather daunting.", "\"Daunting.\" I repeated the word in my head.", "My impression of the trip before I'd left was to most look forward to the empty spans: the periods of no agenda, to explore as I pleased, to follow wherever the wind would take me. While struggling that day, however, the picture began to reverse. I began to project the empty spans as the most difficult times, and began to look forward more to connections with familiar people. The immediate effect was that I was more seriously considering a stopover at Reed's place in Minnesota before heading south to Austin. It was a shift in perspective I wasn't quite prepared for. And then things got worse.", "Before remaking the time I'd lost, I noticed my check engine light had come on. The only time I had seen the check engine light before was eight years prior, in Montana, during my first ever cross-country trip. Back then, the instant I'd noticed, the engine shut down for having run out of coolant. I certainly didn't want that to happen again, but feared that it would at any moment, and so my mind began racing to assess what might be happening:", "\"Could I possibly be out of coolant? It usually gets topped off during an oil change; my last oil change was at a garage in Paterson, New Jersey; I bet they didn't top it off.\"", "I pulled over to check. I got off the road as far as I could, remaining partially in the breakdown lane to avoid falling off the embankment. Outside, with the air as hot as it had been all day, and with the sky coalescing in a swirl of blue and gray cloud cover, I propped open the hood, the smell and the heat off the engine compounding the surreal sensation.", "I removed the coolant cap. Sure enough, the bottom of the chamber was visible from the inside. I poured in some water, hoping it would be enough to get me to the next gas station, at which point I could buy coolant and let the car rest.", "Fortunately, that's how it went. I got off the highway at the first hint of a blue sign for services and found them at the bottom of the ramp. I parked away from the station, purposefully lengthening the walk inside and in turn the duration of the stop. I filled the chamber the rest of the way with coolant, then checked the Michigan directory in my campground guide while turning my focus to a new mission: finding a place to stay. For two nights, I was thinking, to slow down the pace a bit.", "According to the map, Holland, Michigan looked like the next legitimate destination, and according to the directory, there were a few different campgrounds in the area. I called Holland State Park to confirm availability, relieved to learn they had tent sites and would be open for a while.", "It was between five and six by the time I got close, which was later than I'd anticipated. I managed to find the campground nestled in the woods beyond an access road parallel the main road, train tracks separating the two. Indeed, a lot of sites were open, but the office appeared closed.", "I was confused. I called the number again, and the same attendant answered. She sounded like a young girl, and reiterated that they were open until ten. I described my whereabouts, but my description didn't make sense to her.", "\"Did you leave town on Ottawa Beach Road?\" she asked.", "Then it clicked: I had followed directions to a different camp than I'd called. Yet another act to bear frustration. I politely ended the conversation, reviewed the map, and made my way back towards Holland, passing through it to reach my destination.", "The drive through Holland captured my imagination. There were nice houses and pretty parks, all beset by an industrial backdrop. At the end of the central grid, a formidable steel bridge sat low across a marshy river. I contemplated a return visit the next day, given that I'd be camping nearby for two nights.", "Across the bridge I turned left, westward, onto Douglas Ave, which as expected became Ottawa Beach Road. A few miles and minutes later, I was face to face with the attendant I had spoken to on the phone, standing in the booth by the entrance to the park.", "She asked if I wanted a site by the water. I had seen the water sites on the way in; they appeared as if wide open parking squares, good for RVs perhaps, but not for me. I wanted shelter. At her suggestion, I drove through the nigh empty campground to choose my own site, settling on a perimeter site that backed up to the forest. I left my car there and returned to the booth on foot.", "An elderly couple had arrived in the interrim, and because the booth was only big enough for one customer at a time, I was forced to wait outside. It had already cooled considerably, and a light rain had begun to fall, forcing me to wonder whether my tent was still waterproof, and to hope it wouldn't rain much harder.", "When I finally got to pay, I was disappointed to find a hidden state park fee brought the total cost to almost as much as my West Virginia campsite. Had camping really become so expensive?", "I set up my tent, collected myself, then set out on a mission to catch the Sunday night game. I wanted to find another Chili's, or some similar form of Americana, and so I returned to the main thoroughfare I had used to approach Holland. Leaving the highway in favor of a parallel divided strip, I quickly settled on a Texas Roadhouse. I had never been to a Texas Roadhouse before, and so I was pleasantly surprised to see the game on the big screen and plenty of room to sit; I grabbed a table in the bar area. When the waitress came by to bring the menu, I ordered a beer, or at least I tried to, to which she responded:", "\"I'm sorry, we don't serve beer on Sundays.\"", "\"Nooo!\" I yelled jokingly. \"Really?\"", "\"Yeah, we're not allowed to,\" she said empathetically. \"It's this stupid local law. They're gonna change it I think, which would be better for us,\" she laughed, \"but yeah.\"", "She seemed almost as put out as I was. \"Oh well,\" I admitted. Then she offered hope:", "\"What you could do, if you wanted a drink, is go to the next county over.\" She said. \"The line isn't that far, but yeah, that's what you have to do. Sorry.\"", "I accepted her gracious offer to bow out, and attempted to follow her directions to the next settlement. However, in rolling southbound along the highway I missed the prescribed exit, not thinking much of it until helplessly watching the lights of civilization pass by without the highway providing another chance to get off.", "At that point, I simply gave up on the day. The game wasn't that important. I was back at my tent site by about ten, where I cut open a can of red beans and ate them cold, mixed with shredded cheese and salsa. It tasted terrible, but at least it was nourishment.", "I had trouble falling asleep that night. Every time I almost made it, achieving such a depth forced a sudden awareness, as if the final door to sleep was guarded. In that unpleasant state, I recall doting on the sound of a single falling leaf as it touched down on my canvas roof. The last thing I remember was turning onto my back, believing that, somehow, facing up was my best chance to lose the day."]}, {"day": 11, "day_of_week": "Monday", "date": "Monday, September 8", "place_range": "Holland, MI", "part": 1, "timeline": [{"type": "call_out", "time": "10:32AM", "place": "Holland MI", "description": "to voice mail for 1  minute"}, {"type": "journal", "time": "~11:00AM", "place": "holland, mi", "description": "written at jp's coffee (57 e 8th st)", "content": "mon 9/8/08 holland, mi (jp's coffee)\nwhatever. i'm in michigan now. drove around a lot yesterday looking for a place to watch football but it wasn't quite as satisfying as i wanted it to be. headed for the public library now, w/directions from the barista.\ni wonder if i should make this book more about my feelings. and lyrics. what should i do w/the next few weeks before austin? a loop around superior would kill at least a week, leaving me only 2 weeks to get to austin from about minnesota. what do i want to do on the ride from winnipeg to austin? do i want to shade east and go to memphis? tomorrow i get up and head out and jog around grand rapids. later today i head back to the site and run on the paths along ottawa beach rd. i want to check out the local map on the internet. i've been having up and down feelings just like in normal life during this trip. it's not just one big awesome thing. last night i had some odd experiences on the way to sleep - it was like that last door was guarded, like it used to be back when i couldn't fall asleep, shocked to awake each time i got close. i remember turning over onto my back and thinking that was my best chance at falling asleep. slept in good this morning - didn't crawl out of the tent until 1030. maybe this book should be about planning to.\ntue night - near st sault marie\nwed - same\nthu - thunder bay / duluth\nfri - winnipeg\nsat\nsun\nthink i kinda need the map for this one.\ni think i hope this trip makes me realize how awesome my life in ma is. i guess i'm getting feelings like this much time on the road is almost daunting. it's hard to do it alone, i think. it's good that there's no compromise on what i want to do or where i want to go, but it's lonely. i feel like an outsider everywhere. maybe it's my hair. i think i was more naive in 2000, which helped - now i'm more nervous. ... i think my fantasy team played poorly yesterday. oh well... find out shortly. i need a good map of michigan."}, {"type": "email", "time": "12:55PM", "place": "holland, mi 49423", "description": "to \"tom spoth\" <spoth@...> with subject \"Re: acl\"", "content": {"to": "\"tom spoth\" <spoth@...>", "subject": "Re: acl", "body": "i bought a ticket for sunday, though now that i think of it, i never got emailed a ticket... hmm. i do have an electronic version of the receipt, maybe i'll see if i can follow up w/that.\nthe trip is going good. i just began the three weeks without any real plans part--i'm in holland, mi, and will be heading to sault ste marie tomorrow. so far i haven't kept up as well as i've wanted to with taking notes, but now that i have all this extra time, maybe i can catch up. it's also hard when you only get like 1-2 hours of internet a day.\nmy fantasy team is a joke!\nw, r hs\n--- On Mon, 9/8/08, tom spoth <spoth@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "12:58PM", "place": "holland, mi 49423", "description": "to \"Laura Sanda\" <laura@...> with subject \"Re: Day Three\"", "content": {"to": "\"Laura Sanda\" <laura@...>", "subject": "Re: Day Three", "body": "word, baby--i saw that you called this morning--thanks--by the time i went to call back i had temporarily misplaced my phone, but i'll find it and call you back. i'm in the public library in holland, mi right now, and i have a tent set up from yesterday that i'm going to use again tonight in holland state park. tomorrow i will head for somewhere near sault ste marie, which is where the bridges in the michigan licence plate are, and which is where all the robots went at the end of irobot, if you remember that weird scene.\nwhatevs, i miss and love you. talk soon, hopefully before you even get this email, but whatevs, w, r hs\n--- On Mon, 9/1/08, Laura Sanda <laura@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "1:02PM", "place": "holland, mi 49423", "description": "to austin city limits@... with subject \"receipt but no ticket emailed\"", "content": {"to": "austin city limits@...", "subject": "receipt but no ticket emailed", "body": "hello, i purchased a ticket to austin city limits 2008 for sunday, 9/28, but recieved no email ticket--do i need one? my order number is:\n#4728975\nmy email is:\nme@...\nplease let me know if i need to do anything before showing up sunday, 9/28.\nthanks!\nrich sanda"}}, {"type": "call_out", "time": "3:43PM", "place": "Holland MI", "description": "to laura for 12  minutes"}, {"type": "journal", "time": "~5:00PM", "place": "grand haven, mi", "description": "written at jumpin java coffee house (215 Washington Ave)", "content": "mon 9/8/08 ~5pm jumpin java coffee house, grand haven, mi\ndave (i believe i overheard his name) in guitar haven asked me if i was on a quest when i walked in. \"yeah, i'm looking for a guitar pick.\" he probably asked because i had the look, cap pulled down tight and little book tucked under my arm. \"rock on\" he said as i left. there were a few others in there, some kids, coming for or leaving from lessons. it's raining slightly. the rivers and dune walls running up and down lake michigan are compelling. i keep thinking of two things: \"summertime in northern michigan\" - kid rock, and \"we got a house by the lake\" from american pie 2. this \"spicy java\" is their coffee of the day, and maybe the best so far on the trip. damn, it's delicious! it tastes like fall, and it feels like fall around here. last night i doted on the sound of a single fallen leaf hitting the canvas atop the tent. the deciduous around here are showing signs. gonna go watch some football in a bit. gonna try to find chili's in wyoming, mi, near grand rapids. i love chili's. more now than way back when steveo worked there. i got the garmin working - this is gonna change the feel of the trip. i also got the audio recorder working. gees, the coffee + the atmosphere in here are making me real happy i decided to take lakeshore av 19 miles to grand haven. it's obvious this place hops much more in the summer than it does in... very late summer, technically. the ottawa beach general store sign said \"open today at times\" ha! they closed up right behind me at like 2pm, saying their season was waning. it's gray outside. drizzling. weather update in the car said 58 and rain. and i'm camping. ! started thinking today that i might try to rent a room for two weeks in austin. that'd be fun, different, and potentially economically sensible. wonder if i should post on craig's list. wouldn't that be cool? i wanna watch a sunday's worth of football in vegas."}, {"type": "call_in", "time": "5:33PM", "place": "Grand Have MI", "description": "from laura for 11  minutes"}, {"type": "call_in", "time": "5:44PM", "place": "Grand Have MI", "description": "from laura for 6  minutes"}, {"type": "call_in", "time": "5:54PM", "place": "Grand Have MI", "description": "from laura for 18  minutes"}, {"type": "receipt", "time": "6:25PM", "place": "MUSKEGON, MI", "description": "gas for $33.37 at NORTON SHORES EZ MART"}, {"type": "call_out", "time": "7:39PM", "place": "Muskegon MI", "description": "to bill t for 8  minutes"}, {"type": "receipt", "time": "7:54PM", "place": "Norton Shores, MI 49441", "description": "1 23oz miller lite for $4.51 at Chilis #1500 (3583 Henry St)"}], "story": []}, {"day": 12, "day_of_week": "Tuesday", "date": "Tuesday, September 9", "place_range": "Holland, MI to Sault Saint Marie, MI", "part": 1, "timeline": [{"type": "email", "time": "11:27AM", "place": "holland, mi 49423", "description": "to \"Q\" <aquino@...>, \"Rodney Daughtrey\" <rodney@...> with subject \"Re: [thenarrowchannels] Fwd: The Narrow Channels wants to book a gig at the Middle East!\"", "content": {"to": "\"Q\" <aquino@...>, \"Rodney Daughtrey\" <rodney@...>", "subject": "Re: [thenarrowchannels] Fwd: The Narrow Channels wants to book a gig at the Middle East!", "body": "hey, call me or something. is one of you thinking about filling this out? my internet/computer time is scarce :( i'm up for playing anything, even a monday night to zero people, so i'm sure whatever you come up with will work for me, but call anyway if you want.\nw, r hs\n--- On Mon, 9/8/08, Rodney Daughtrey <rodney@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "11:53AM", "place": "holland, mi 49423", "description": "to laura@... with subject \"safe \"sleeping in a car\" traveling\"", "content": {"to": "laura@...", "subject": "safe \"sleeping in a car\" traveling", "body": "that was the search i did, turned up a lot of talk on doing exactly what i'm doing--trying to save money on a long road trip. looks like hospital p-lots and wal-marts and maybe 24 hr shopping centers are good, maybe even nice residential areas between two houses, but hotel/motel p-lots are bad, unguarded rest areas are bad, truck stops like luvs and flying j are good, campgrounds are good and may be worth the money.\nword, whatever, got my austin city limits pass printed--w!\nheaded for the bridges between the lakes and the michigans after i get some coffee now...\nw, l r hs"}}, {"type": "call_in", "time": "12:08PM", "place": "Holland MI", "description": "from laura for 2  minutes"}, {"type": "receipt", "time": "4:46PM", "place": "MACKINAW CITY, MI", "description": "gas for $48.85 at VALDI'S CITGO (14992 N MACKINAW H)"}, {"type": "receipt", "time": "6:50PM", "place": "SAULT STE MARIE, MI 49783", "description": "quarter for $53.41 at LONG SHIPS MOTEL (427 W PORTAGE AVE)"}, {"type": "call_out", "time": "6:54PM", "place": "Escanaba/B MI", "description": "to laura for 2  minutes"}, {"type": "call_in", "time": "6:55PM", "place": "Escanaba/B MI", "description": "from unavailable for 7  minutes"}, {"type": "receipt", "time": "8:15PM", "place": "Sault Ste. Marie, MI 49783", "description": "guiness, bowl of chili, small guacamole for $9.05 at Palace Saloon (200 West Portage Ave.)"}], "story": []}, {"day": 13, "day_of_week": "Wednesday", "date": "Wednesday, September 10", "place_range": "Sault Saint Marie, MI to Thunder Bay, ON", "part": 1, "timeline": [{"type": "receipt", "time": "2:36PM", "place": "WAWA, ON P0S1K0", "description": "gas for $32.00 at Esso / YOUNGS GENERAL STORE (MISSION RD HWY 11)"}, {"type": "receipt", "time": "8:52PM", "place": "thunder bay, on", "description": "oc maple e / oc almond e for $5.94 at walmart / st# 3124 (777 memorial ave)"}, {"type": "receipt", "time": "9:02PM", "place": "Thunder Bay, ON P7B 327", "description": "usa map for $5.60 at Chapters (797 Memorial Ave)"}, {"type": "receipt", "time": "9:04PM", "place": "THUNDER BAY, ON P7B 3Z7", "description": "pumpkin spice latte for $5.14 at STARBUCKS CAFE #950 (797 MEMORIAL AVENUE)"}, {"type": "journal", "time": "~9:05PM", "place": "thunder bay, on", "description": "written at starbucks (797 Memorial Ave)", "content": "w 9/10/08 sitting in starbucks adjacent to chapters - the divider just went up, starbucks stays open 1 hr later (it's 9:05pm or so). gonna look at my map now, drink my pumpkin spice latte, oh, shoot, my cell doesn't work here - i gotta find a pay phone. i gotta find some canadian coins :("}, {"type": "receipt", "time": "9:35PM", "place": "", "description": "atm withdrawal for $100.00 at canada trust / machine # td7143"}, {"type": "receipt", "time": "9:51PM", "place": "", "description": "the dark knight / auditorium 3 / wed 9:55p show  for $7.50 at silver city thunder bay"}], "story": []}, {"day": 14, "day_of_week": "Thursday", "date": "Thursday, September 11", "place_range": "Thunder Bay, ON to Winnipeg, MB", "part": 1, "timeline": [{"type": "receipt", "time": "", "place": "", "description": "camping for $37.80 at TRAVELLER'S R.V. PARK & CAMPGROUND"}, {"type": "receipt", "time": "6:37AM", "place": "thunder bay, on p7b 5k5", "description": "silk soy milk for $3.99 at shoppers drug mart (1186 memorial ave)"}, {"type": "receipt", "time": "6:39AM", "place": "", "description": "for $40.00 at mac's / store 01436"}, {"type": "receipt", "time": "7:21AM", "place": "thunder bay, on", "description": "bottle of water for $1.37 at walmart / st# 3124 (777 memorial ave)"}, {"type": "receipt", "time": "10:32AM", "place": "IGNACE, ON P0T 1T0", "description": "gas for $37.00 at ESSO VOYAGEURS SERVICE CENTRE (HWY #17)"}, {"type": "receipt", "time": "3:58PM", "place": "winnipeg, mb", "description": "camping for $37.80 at traveller's rv resort inc (murdoch rd)"}, {"type": "call_out", "time": "4:32PM", "place": "Winnipegl Z1", "description": "to laura for 2  minutes"}, {"type": "receipt", "time": "8:02PM", "place": "WINNIPEG, MB R2J2M8", "description": "a grill surface for $16.77 at ZELLERS STORE 348 (35 LAKEWOOD BLVD )"}], "story": []}]}, {"id": 2, "title": "Winnipeg to Austin", "time_range": "September 12 - September 22, 2008", "place_range": "Winnipeg, MB to Austin, TX", "days": [{"day": 15, "day_of_week": "Friday", "date": "Friday, September 12", "place_range": "Winnipeg, MB", "part": 2, "timeline": [{"type": "journal", "time": "~1:00PM", "place": "winnipeg, mb", "description": "written at second cup (river ave and osborne st)", "content": "f 9/12/08 second cup, osborne villiage,\nwinnipeg, mb\nthis is it. this is the focal pt of the trip. the turning point. and this is the neighborhood i've been looking for - this is the urban off-center center. this is where for me to jump bar to bar at night. my car is around the corner in front of an apartment complex - didn't see any no parking signs. hopefully it's safe to leave there - i still intend to head downtown again, to the forks, the baseball stadium, and the french quarter. river ave is the cross street here. seems like a real cultural mix here. i know there's a chinatown on the other end (up north) of town. got my running shoes on, + jeans and my courtside karaoke t shirt. i feel less cool than the people around me right now. had some cool dreams last night - one involving multiple cars, but this time, instead of not having all the keys, all cars were accounted for, even the odd old green or brown large, heavy, clunky car with rounded edges we had the key for. mark parsons was involved - maybe he gave the car to me? greg explained what all the other cars were - we had just had some kind of big party the night before. ...\n[picture]\nside\nback view\nthis is the 3-wheeler i saw on the road into here from the south.\nhad an sl baseball dream - i was maybe gonna get a chance to hit later in the game. ...\nnickelback's on the radio. actually, the santana collaboration song. i wonder if people aren't afraid to like them here!\ngirl w/a piercing of the nose bridge outside on the patio right now. cool!\nconstruction workers working hard to push around some coarse concrete getting poured down a chute into a rectangular depression cut out of the street - they're standing in it wearing knee high rubber boots\nsince bolingbrook, il:\nindiana dunes / michigan city in\nnew buffalo, mi\nsouth haven, mi\nholland, mi\ngrand haven, mi\nmuskegon / norton shores, mi\ngrand rapids, mi\nrte 131 n, northern michigan\nsault ste marie, mi\n\" \" \", on\nrte 17 w, on\nsand river, on\nthunder bay, on\nkenora, on\nwinnipeg, mb\nmeals since morgantown morning:\n- chili's near huntington mall - chips + salsa, beer, habanero chicken tenders\n-\n- pulled pork sandwich at indianapolis texas place\n- 3 soft tacos at lafayette taco bell\n- denny's chicken fried steak + eggs in bolingbrook, il\n- doritos, etc at ultimate\n- starbucks coffee\n- linguine, red sauce, sausage, + goat cheese special at carrabba's near plainfield\n- starbucks at south holland il plaza above highway on 80\n- beer in south haven, lions/falcons game\n- kidney beans, cheese, salsa at holland st pk\n- jp coffee - dark indonesian\n- jumpin java - grand haven pumpkin spice - best of the trip!\n- chili's norton shores - texas cheese fries, beer\nmore in a few pages ->\n-> meals cont\n- jp coffee on the way out of holland\n- bought whitefish smoked at gas station just before mackinaw bridge\nsongs:\ntapes\n- your rocky spine - great lake swimmers\n- indianapolis - ?\n- american boy - estelle\n- ohio - csny + harrisburg band\n- don't you want me - brooklyn club\n- situation - brooklyn club\n- listen to recordings!\n- carey - jm"}, {"type": "journal", "time": "~2:30PM", "place": "winnipeg, mb", "description": "written at manitoba legislative building (450 broadway)", "content": "[drawing]\n8 sided dome\ndark metal,\nlike patterson"}, {"type": "email", "time": "3:13PM", "place": "winnipeg, mb R3C 3P5", "description": "to \"McCarthy, Laura\" <laura@...> with subject \"Re: FW: saturday night in harvard?\"", "content": {"to": "\"McCarthy, Laura\" <laura@...>", "subject": "Re: FW: saturday night in harvard?", "body": "cool--that sounds awesome! have fun... i'm gonna try to find some local (winnipeg) music tonight too, but it won't be as free ;)\nw, l r hs\n--- On Wed, 9/10/08, McCarthy, Laura <laura@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "3:16PM", "place": "winnipeg, mb R3C 3P5", "description": "to \"Stephen O'Keefe\" <steveo@...> with subject \"Re: ita position\"", "content": {"to": "\"Stephen O'Keefe\" <steveo@...>", "subject": "Re: ita position", "body": "here's my best advice--tell 'em i referenced you! ... :)\n... call if you want to chat... w, r hs\n--- On Thu, 9/11/08, Stephen O'Keefe <steveo@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "3:20PM", "place": "winnipeg, mb R3C 3P5", "description": "to \"'The Narrow Channels'\" <the narrow channels@...>, \"Sean MacArthur\" <sean@...>, \"Rodney Daughtrey\" <rodney@...>, aquino@... with subject \"Re: [thenarrowchannels] assignments\"", "content": {"to": "\"'The Narrow Channels'\" <the narrow channels@...>, \"Sean MacArthur\" <sean@...>, \"Rodney Daughtrey\" <rodney@...>, aquino@...", "subject": "Re: [thenarrowchannels] assignments", "body": "w--i'm on the express computer, so not much time--i have an appt for a computer from 4-445, ie in ~30 mins--hopefully i'll have more time, def not enough to write something comprehensive, though. i'm at a turning point--winnipeg--so i've been outlining ideas for how to organize the story, but in the short term it'll probably be just a list of 25-35 cities/towns with 1-3 stars for how storyable the experience was.\npsyched that you guys are getting together to do stuff--w!\nw, r hs\n--- On Fri, 9/12/08, Rob Aquino <aquino@...> wrote:\n [omitting quoted text]"}}, {"type": "journal", "time": "~3:30PM", "place": "winnipeg, mb", "description": "written at millenium library (251 donald street)", "content": "9 12 08 millenium library, winnipeg\nthis library is fantastic and beautiful - huge glass windows w/a long 4 story staircase and library tables angling down.\ni can't believe i can only get 99 tracks on my audio recorder. ! i'm contemplating how to transfer them, maybe to paper... then reserve use of the recorder for notes and mostly song ideas.\ni can't believe it's already 3:30ish...\nwhen laura and i meet in austin, it'll be after the longest we probably will ever go again w/o seeing each other.\ni think i saw 22 at 547 on a digital sign last night. i think it got down to 9 or so last night - quite cold. now it's awesomely warm again - summer's back! at least during the day.\nshowered today. did laundry too. feels good to be clean, even if the shower water smelled like mud straight from the bottom of the red river!\nneed to call reed - psyched at opportunities to use the internet, watch football, and beat his ass in ping pong!\ntomorrow head for the eastern n dakota towns - grand forks + fargo."}, {"type": "email", "time": "4:09PM", "place": "winnipeg, mb R3C 3P5", "description": "to \"JonTom Kittredge\" <ita@...> with subject \"Re: Hey! Remember me?\"", "content": {"to": "\"JonTom Kittredge\" <ita@...>", "subject": "Re: Hey! Remember me?", "body": "hi jt! i don't have much time on this library computer, so i can't tell the whole story, but i'm in winnipeg right now, and if i get a chance to write something more substantial, i'll keep you posted!\n...\nhope this helps, let me know if it doesn't--i'll try to check back again this weekend. hope otherwise things are going ok!\nrich\n--- On Fri, 9/12/08, JonTom Kittredge <ita@...> wrote:\n [omitting quoted text]"}}, {"type": "email", "time": "4:44PM", "place": "winnipeg, mb R3C 3P5", "description": "to the narrow channels@..., the narrow channels@... with subject \"very quick recap (1/2 hr)--post if you want\"", "content": {"to": "the narrow channels@..., the narrow channels@...", "subject": "very quick recap (1/2 hr)--post if you want", "body": "here's a quick chronological listing of cities/towns in which i've had experiences worth remembering since leaving home almost exactly 2 weeks ago (almost to the hour!). the stars indicate how memorable. the top 20 are numbered, again, only chronologically (just to make them stand out). i could write a lot more... this is just the boring facts--i'll become a better storyteller later!\n1. brooklyn, ny *** - bar hopping in williamsburg with john and sarah at first, then john, sarah, and bernard, then just john and bernard, practically closing the place out - slept on john's couch - breakfast at acapulcos (or however you spell it) was fantastic\n2. patterson, nj * - oil change! tried to buy running shoes too, on the main street w/several street vendors and a lot of pedestrian traffic - the nikes just weren't comfortable enough\n->. east stroudsburg, pa - supermarket supply stop in a cute river divided town\n3. pocono manor, pa *** - linda and vogel's wedding weekend - lots of fun, lots of friendly faces, disc golf, drinking, hanging out, nice wedding, good food, on and on\n4. harrisburg, pa * - stopped to walk around, found an arts festival on the river, live bands playing, walked out onto one of the pedestrian bridges\n5. alexandria, va *** - met my brother mike in a park on the patomac (?) river, played disc and bocce w/him and his friends fred and mary - fun hanging out - stayed on mike's couch - walked up and down king st, took coffee into a small city square at the end\n6. washington, dc *** - walked a lot - around the white house, but mostly around du pont and up and down 18th, adams morgan and business triangle - ate lunch w/spoth, steveo joined us for a bit - hung out w/spoth and steveo on steveo's roof deck, sox on the box in the living room, fantastic scene\n->. silver spring, md - ice and other supplies\n7. hagerstown, md * - got out and walked about 2 miles through the old town center\n->. martinville, wv - drive-by of the dense town center, just beyond the super-sized americana strip from the highway to the entry (most towns seem to follow that blueprint)\n8. harpers ferry, wv * - talked to people in the visitors center, drive-by of the old town by the river, drive by of the shenandoah river - wanted to swim but didn't get my act together\n->. winchester, va - the town literally smelled like apples - found a farm stand and bought apple cider\n9. morgantown, wv ** - jogged down one side of the river, across it, and all through town, from college campus to nice houses up the hill to downtown - did laundry - went bar hopping, one college bar, then went to see live music at 1 2 3 pleasant but i had to leave before they started playing about an hour and a half after they were supposed to start - watched the closed-captioned palin speech in the bar - stayed at emily's on a mattress in the big second floor front room - she was just moving in\n->. charleston, wv - drive-by - bigger than i expected\n10. huntington, wv ** - went to the biggest mall in wv - watched football in chili's - ran all through town, down by the river wall and up to near the college arena - stayed in a nearby campground\n11. shelbyville, ky * - bought whiskey in a small booze store with built in bar\n-->. louisville, ky - drive by, light rain, rush hour\n12. indianapolis, in *** - long run all through downtown - bar hopping w/a couple i met, scotty and jenny - wore my old harbaugh jersey, which earned me some comments\n13. lafayette, in ** - slept for about an hour in a parking lot in my car, got too loud, drove around looking for another spot, saw some good late night scenes, got drive through taco bell, moved on to a rest area\n->. bolingbrook, il - breakfast and coffee\n14. plainfield, il *** - hung out at the ultimate frisbee tournament w/quiet coyote all day, had dinner with them, stayed in their hotel room, lots of fun\n15. michigan city, in * - went to the dunes - surprised at how cool they were, particularly baldy mtn, which scotty and jenny had told me about\n->. new buffalo, mi - driveby of the downtown shops and marina, visited the casino looking for football, but the tvs weren't all that\n16. south haven, mi * - watched the lions/falcons game at a great local bar\n17. holland, mi *** - stayed at a campground for a couple nights - felt like fall - threw disc to myself in the winds off lake michigan - took coffee - jogged all through town\n->. grand haven, mi * - walked through town - got coffee - bought guitar picks\n18. sault sainte marie, mi *** - bar hopped mostly alone, until i got to the karaoke bar - made friends with pat and gail, and mike the hat, sault ste marie's answer to mark the shark, plus allison the dj - had a lot of fun\n19. thunder bay, on ** - drove around a lot - saw the dark knight - slept in my car\nkenora, on - walked around a bit, down to the lake of the woods dock, ate lunch\n20. winnipeg, mb *** - walked and ran a lot so far - taken coffee - looking for something fun to do tonight - have a campsite already"}}, {"type": "journal", "time": "~6:00PM", "place": "winnipeg, mb", "description": "written at north winnipeg parkway to saint bonaface", "content": "- married couple getting pictures taken in north winnipeg parkway\n- riverboat tour guide in the bg canadian accent male\n- odd black metal lattice bridge w/ extra structure and exposed gears - how does it work?\n[drawing]\nfinally found it! college universitaire de saint-bon...\nbells ringing - walking through residential neighborhood trying to overhear french speaking"}, {"type": "receipt", "time": "6:41PM", "place": "", "description": "atm withdrawal for $80.00 at Canada Trust"}, {"type": "journal", "time": "~7:00PM", "place": "winnipeg, mb", "description": "written at billabong (121 Osborne Street)", "content": "pumpkin soup w/cranberry swirl + crushed black pepper at billabong australian bar + bistro\nroyal albert is cool apparently... so is the toad in the hole and the cavern across the st from here. they'll have live music later tonight\nowen + allastair"}, {"type": "call_out", "time": "7:41PM", "place": "Winnipegl Z1", "description": "to reed for 3  minutes"}, {"type": "call_out", "time": "9:02PM", "place": "Winnipegl Z1", "description": "to aquino for 15  minutes"}], "story": []}, {"day": 16, "day_of_week": "Saturday", "date": "Saturday, September 13", "place_range": "Winnipeg, MB to Fargo, ND", "part": 2, "timeline": [{"type": "call_out", "time": "1:47PM", "place": "Grand Fork ND", "description": "to laura for 2  minutes"}, {"type": "call_in", "time": "1:55PM", "place": "Grand Fork ND", "description": "from laura for 9  minutes"}, {"type": "call_in", "time": "2:06PM", "place": "Grand Fork ND", "description": "from laura for 7  minutes"}, {"type": "journal", "time": "~5:45PM", "place": "fargo, nd", "description": "written at juano's mexican american restaurant (402 broadway)", "content": "sat 9 13 08 juano's mexican american restaurant\nfargo, nd\nabout to ask the waitress where the live music or karaoke is."}, {"type": "receipt", "time": "6:07PM", "place": "fargo, nd", "description": "dinner for $22.07 at juano's broadway (402 broadway)"}, {"type": "call_out", "time": "6:21PM", "place": "Fargo NO", "description": "to voice mail for 4  minutes"}, {"type": "call_out", "time": "6:24PM", "place": "Fargo NO", "description": "to mom for 30  minutes"}, {"type": "journal", "time": "~7:00PM", "place": "fargo, nd", "description": "written at babb's coffee house (604 main avenue)", "content": "sat 9 13 08 ~7pm babb's coffee house\nfargo, nd\nafter strolling up and down broadway, talking to my mom, decided to grab this book and hide out in a coffee shop til it closes at 8. live string jazz - 2 guys when i walked in. lied to my mom about where i'm staying - didn't want to tell her i'm sleeping in the car - didn't want to call her 'cause i knew it'd come up, but she left me a couple messages in the last few days come to find out, so i figured what the hell.\n- farm lakes formed on the right of the highway, their color matching the sky for the reflection, periwinkle and gray.\n- trains running through downtown - just heard one roll by, bells ringing\n- hippies talking to the musicians, talking technical music\n- coffee's pretty good - it's dark, but apparently not as dark as the only other selection\n- oh yeah, i can see the train\n- 604 main ave\n- heard \"godless\" on the ride from grand forks to here - took a sec of familiarity w/o clarity to figure out why it was familiar\n- did i just overhear that hippie say donnie darko isn't good?\n- winnipeg was awesome - takes the cake so far.\n- i'm a little surprised at how big fargo seems from its downtown - i wondered after grand forks if it would actually be noticeably bigger - it is\n- been wondering where the meeting point of the arctic, atlantic, and pacific watersheds is...\n[drawing]\ni guess it's somewhere in or north of montana... but what about carribean vs atlantic? gotta be somewhere around minneapolis\nbillabong - owen + allastair\nroyal albert arms - carol, jackie, peter, jay/jake, larry (played pool)\n- we are wolves\n- sleepercar\nyoung couple walking out behind me - overheard him say they sounded pretty good for being sick - they'd seen them some other winnipeg place w/good acoustics, said they sounded awesome - said the lineup was like the best of texas\n- two high fives for having cool hair\n- dark haired katharine mcfee lookalike w plunging neckline black dress walked by twice\n- chicago phil's pizza - bacon and pepper(oni)\n- shaved head guy in bathroom line - interested in how my night was going for no reason - at toad in the hole\n- sleeveless shirt guy hitting on tall girl in front of me - making conversation - got interested when my quick conversation w/allastair behind the bar revealed i was from massachusetts\n- hippies are changing up the 2 of who plays\n- is that a lute?\n- i think they're students, w/teacher looking on\n- live music would be the right thing to do tonight - not so much in the karaoke mood\n- fellow w/dreds is about to play - looks like boy george\n\"in jazz, you play a wrong note, play it again\"\n- funny how sitting here in this low key env is changing the complexion of the evening and what i want to do - it doesn't have to be bars - what if i just want to walk all night? sleep on the stairs of town hall? do something creative to do w/the city...\n- digging this jazzy jam!\nthis coffee house is seattle themed - there is a neon \"public market center\" sign above the counter\ni wonder if i could find another place to catch up on my note taking... start trying to form a more cohesive story\ni want to have kids\nanother train! the trains must be a staple of this town.\nwith laura :)"}, {"type": "call_in", "time": "7:40PM", "place": "Fargo NO", "description": "from laura for 24  minutes"}, {"type": "receipt", "time": "8:08PM", "place": "fargo, nd", "description": "atm withdrawal for $102.00 at state bank & trust (51 broadway)"}], "story": []}, {"day": 17, "day_of_week": "Sunday", "date": "Sunday, September 14", "place_range": "Fargo, ND to Saint Louis Park, MN", "part": 2, "timeline": [{"type": "receipt", "time": "4:40AM", "place": "fargo, nd 58103", "description": "for $30.00 at petro shopping center (4510 19th ave sw)"}, {"type": "receipt", "time": "4:47AM", "place": "", "description": "prepaid receipt for $30.00"}, {"type": "journal", "time": "~5:15AM", "place": "moorhead, mn", "description": "written at perkins (3005 Highway 10 E)", "content": "sun 9 14 08 ~515am perkins, near moorhead, mn\nslept in the car - walmart p lot - well lit, very windy, some rain.\nfargo. alright. not a bad night at all...\n- ate at juanos - asked the waitress about live music / karaoke - she suggested dempsey's, \"the place with all the people outside smoking.\" she described the location by starting w/telling me her address - maybe she just wanted me to know what a cool locale she had?\n- walked up and down broadway a few times first - talked to mom on the phone\n- spent time in babb's coffeehouse, intent on killing time til it closed at 8 - cool jazz guitarists playing in a round 2 at a time\n- took laura's call outside, eventually settled on a bench at the corner of broadway and main ave\n- when done, dropped off this book in the car, then into dempsey's\n- 5 ohio vs 1 usc on tv to my left - usc blew them out the whole way\n- twins vs orioles on tv at the end of bar to my right a little - twins led 9-2, 10-3, 10-6, 12-6 - basically a high-scoring blowout\n- bar tender in green t shirt w/sort of scally cap forward\n- older guys drinking pitchers of cheap stuff w/little plastic cups at end of bar to my right - dissed the bar tender when he tried to pick up the 2 bucks change that they left out for a long time - he gave it back, they only dropped 1, dickheads.\n- funny skinny kid in yellow tshirt walked behind the bar and said \"i quit.\" then he retracted. seemed everybody was an employee in there, at least early\n- the place just came alive around me\n- drinking dempsey's house ale, 3$/glass\n- looking forward to the live music, half debating whether i should just go to the atomic coffee instead\n- same forward guy ordering a drink asked me how my night was going - what would make it better? - superpowers monologue - left his friend isaac who introduced himself - he'd just moved back to fargo from minneapolis - we talked about \"wandering\" - he said it can be really good or really bad - said he's done it - sounded like he had a story - i wasn't really into hearing it - sounded like he wanted to keep up the mystique anyway\n_________ mistake - this is from 9/14 am...\n- crowd of 11 or so crowded around me - cute blonde in elaborate white top ordered 12 \"so do mo fo\"s, or south dakota mother fuckers\n- she expected so co, lime, and oj, but they used amoretto instead of oj - i guess it's a north dakota drink for south dakotans like them\n-before that, got to talking to the young blonde help about the twins, the size of fargo, vs grand forks, etc - she said 150k, and maybe not twice the size of gf\n(*) - woops! - see page early in the book near sin/cos math\nfantastic conversation with tony - he was with the sd 11, and originally from south dakota, but has been living in fargo for 5 years - he tried explaining the small town feel / big town presence dichotomy fargo was trying to present - said dempsey's was the best bar, that he'd been to 80% of them, and kinda likes some of the other ones, but this is the one he frequents ... - really responded to my explanation of my trip - either i'm getting better at explaining it or he's just really tuned in - his little blond wife - they were all at a \"wedding dance\" - a reception? i asked - yeah... with a smile - had glasses, short cropped hair - kinda resembled zack of zack and jessie\n- first act was a guy by himself w a guitar, little hefty, cap, half handlebar moustache, sort of aggressive folk - one song \"about baseball,\" w/lyrics \"fuck it, let's get drunk and watch the twins in vain, (something about the fall, then something about next spring\" entertaining\n- the hot button played next - holy shit. awesome. long haired blond - kinda crazy looking singer w/guitar - skinny dorky guy w/glasses and red guitar - short haired blond bassist - true showman, super talented - drummer may have been the best of them all - extra drum pieces for extra sounds - almost nirvana, or super hard blind melon - aggressive as punk but more melodic, w/ starts/stops\n- left before \"clint and the great divide\" i guess clint used to work there\n...\n- tony told me that his friend upon moving to kansas city found out they're mostly st louis fans - i told him how during my trip i've been finding out interesting things about fan bases by geography\n- he's a truck driver - hasn't done the longish runs yet, but has driving to illinois, iowa, and even alberta in the west"}, {"type": "call_out", "time": "11:21AM", "place": "Minneapoli MN", "description": "to reed for 2  minutes"}, {"type": "call_out", "time": "12:04PM", "place": "Minneapoli MN", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "12:18PM", "place": "Minneapoli MN", "description": "to voice mail for 1  minute"}, {"type": "call_out", "time": "12:19PM", "place": "Minneapoli MN", "description": "to reed for 2  minutes"}, {"type": "call_in", "time": "1:06PM", "place": "Minneapoli MN", "description": "from reed for 4  minutes"}, {"type": "call_out", "time": "1:48PM", "place": "Richfield MN", "description": "to reed for 1  minute"}, {"type": "call_in", "time": "6:58PM", "place": "Minneapoli MN", "description": "from reed for 3  minutes"}, {"type": "call_out", "time": "7:01PM", "place": "Minneapoli MN", "description": "to laura for 1  minute"}, {"type": "call_out", "time": "7:20PM", "place": "Minneapoli MN", "description": "to reed for 2  minutes"}, {"type": "call_out", "time": "7:27PM", "place": "Minneapoli MN", "description": "to laura for 3  minutes"}, {"type": "call_out", "time": "8:40PM", "place": "Minneapoli MN", "description": "to laura for 7  minutes"}], "story": []}, {"day": 18, "day_of_week": "Monday", "date": "Monday, September 15", "place_range": "Saint Louis Park, MN", "part": 2, "timeline": [{"type": "call_out", "time": "11:02AM", "place": "Minneapoli MN", "description": "to mom for 1  minute"}, {"type": "call_out", "time": "11:11AM", "place": "Minneapoli MN", "description": "to reed for 2  minutes"}, {"type": "call_out", "time": "11:15AM", "place": "Minneapoli MN", "description": "to mom for 7  minutes"}, {"type": "call_out", "time": "12:04PM", "place": "Saint Paul MN", "description": "to reed for 2  minutes"}, {"type": "call_out", "time": "9:17PM", "place": "Minneapoli MN", "description": "to voice mail for 2  minutes"}, {"type": "call_out", "time": "9:43PM", "place": "Minneapoli MN", "description": "to laura for 2  minutes"}], "story": []}, {"day": 19, "day_of_week": "Tuesday", "date": "Tuesday, September 16", "place_range": "Saint Louis Park, MN to Kansas City, KS", "part": 2, "timeline": [{"type": "email", "time": "9:50AM", "place": "st louis park, mn", "description": "to chad from minnesota@... with subject \"nice playing with you yesterday\"", "content": {"to": "chad from minnesota@...", "subject": "nice playing with you yesterday", "body": "hey chad, nice meeting you yesterday, and thanks for showing me the course at kaposia! if you're ever in massachusetts and looking for a game or whatever, send me an email at this address.\nrich"}}, {"type": "journal", "time": "~1:30PM", "place": "des moines, ia", "description": "written at house of bricks (525 east grand avenue)", "content": "9/16/08 house of bricks, des moines, ia\njust ordered a mushroom swiss burger. just ran around downtown. been debating whether to head to kc or omaha - think it's gonna be kc. guess they have live music here.\nlast 2 nights at reed + meghans in st louis park, mn, near minneapolis. very fun. after leaving fargo very early got to near minneapolis by about 10-1030. decided at a rest stop looking at the map about where i wanted to go for a jog, just off the first exit once 94 breaks south from 494 - that put me in some neighborhood / town called brooklyn center. asked guy at golf course how to get downtown - ended up meandering through a residential grid to a bathroom in a park where some asian fellows were playing cricket i think, all dressed up in colors bright, a greenish and a reddish.\n- reed said all restaurants have atms. this little one does. is that true in ma?\n- gospel black church in brooklyn center"}, {"type": "call_out", "time": "2:06PM", "place": "Des Moines IA", "description": "to laura for 2  minutes"}, {"type": "receipt", "time": "5:03PM", "place": "decatur, ia 500
